<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MT Scouting · U17 World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F4EE; --panel:#FFFFFF; --panel-2:#FBFAF5; --panel-3:#F0ECE3;
  --line:#E7E2D6; --line-soft:#EFEBE1;
  --text:#2F333B; --muted:#747C88; --muted-2:#A0A6B0;
  --clay:#C5824E; --clay-deep:#A96A38; --clay-soft:#F2E4D4;
  --sage:#6FA39B; --good:#6E9F6A; --warn:#C6755B;
  --parch:#FBF4E4; --parch-2:#F5EAD2; --parch-line:#E7DBBE; --ink-note:#4A4234;
  --disp:"Saira Condensed","Oswald",system-ui,sans-serif;
  --body:"IBM Plex Sans",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --r:13px; --maxw:1180px;
  --shadow:0 1px 2px rgba(47,51,59,.04); --shadow-lift:0 10px 28px rgba(47,51,59,.10);
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:
    radial-gradient(1100px 520px at 86% -14%, rgba(197,130,78,.07), transparent 62%),
    var(--bg);
  color:var(--text); font-family:var(--body); font-size:15px; line-height:1.45;
  -webkit-font-smoothing:antialiased; min-height:100vh;
}
button{font-family:inherit; cursor:pointer}
input,textarea{font-family:inherit}
::selection{background:rgba(197,130,78,.22)}

/* top bar */
.top{position:sticky; top:0; z-index:30; background:rgba(246,244,238,.82);
  backdrop-filter:blur(10px); border-bottom:1px solid var(--line)}
.top-in{max-width:var(--maxw); margin:0 auto; padding:14px 20px; display:flex; align-items:center; gap:18px; flex-wrap:wrap}
.brand{display:flex; align-items:center; gap:11px; min-width:0}
.brand .brand-logo{width:32px; height:32px; border-radius:8px; display:block; flex:none}
.brand .mark{font-family:var(--disp); font-weight:800; font-size:26px; letter-spacing:.04em; color:var(--text); line-height:1; white-space:nowrap}
.brand .mark b{color:var(--clay)}
.brand .sub{color:var(--muted); font-size:12px; letter-spacing:.12em; text-transform:uppercase}
.top-meta{margin-left:auto; display:flex; align-items:center; gap:14px}
.evt{display:flex; flex-direction:column; align-items:flex-end; line-height:1.2}
.evt .a{font-family:var(--disp); font-weight:600; font-size:15px; letter-spacing:.05em; text-transform:uppercase}
.evt .b{color:var(--muted-2); font-size:11px; font-family:var(--mono)}

.search{position:relative}
.search input{width:230px; max-width:46vw; background:var(--panel); border:1px solid var(--line);
  color:var(--text); border-radius:999px; padding:9px 14px 9px 34px; font-size:14px; outline:none;
  box-shadow:var(--shadow); transition:border-color .15s, box-shadow .15s}
.search input:focus{border-color:var(--clay); box-shadow:0 0 0 3px rgba(197,130,78,.15)}
.search svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted-2)}

.io{display:flex; gap:8px}
.btn{background:var(--panel); border:1px solid var(--line); color:var(--text); border-radius:9px;
  padding:8px 12px; font-size:13px; font-weight:500; display:inline-flex; align-items:center; gap:7px;
  box-shadow:var(--shadow); transition:background .15s,border-color .15s}
.btn:hover{background:var(--panel-2); border-color:#D9D2C4}
.btn svg{color:var(--muted)}

/* filters */
.wrap{max-width:var(--maxw); margin:0 auto; padding:22px 20px 80px}
.groups{display:flex; gap:22px; flex-wrap:wrap; margin-bottom:8px}
.grp{flex:1 1 200px; min-width:170px}
.grp h3{font-family:var(--disp); font-weight:700; letter-spacing:.14em; font-size:12px; color:var(--muted);
  text-transform:uppercase; margin:0 0 8px; display:flex; align-items:center; gap:8px}
.grp h3::before{content:""; width:18px; height:2px; background:var(--clay); display:inline-block}
.teamrow{display:flex; flex-direction:column; gap:5px}
.team{display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:transparent;
  border:1px solid transparent; color:var(--muted); padding:7px 9px; border-radius:9px; font-size:14px; transition:.13s}
.team:hover{background:var(--panel); color:var(--text); box-shadow:var(--shadow)}
.team.active{background:var(--panel); border-color:var(--clay); color:var(--text); box-shadow:var(--shadow)}
.team .code{font-family:var(--mono); font-size:11px; font-weight:600; color:#5C636E; background:#ECE7DC;
  border-radius:5px; padding:2px 5px; letter-spacing:.02em; min-width:38px; text-align:center}
.team.active .code{background:var(--clay); color:#fff}
.team .nm{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.team .ct{font-family:var(--mono); font-size:11px; color:var(--muted-2)}

.divider{height:1px; background:var(--line-soft); margin:22px 0 18px}

/* section head */
.sechead{display:flex; align-items:flex-end; gap:14px; margin-bottom:16px; flex-wrap:wrap}
.sechead .t{font-family:var(--disp); font-weight:700; font-size:30px; letter-spacing:.02em; line-height:1; color:var(--text)}
.sechead .c{font-family:var(--mono); font-size:11px; color:#fff; background:var(--clay); padding:3px 7px; border-radius:5px; letter-spacing:.03em}
.sechead .meta{color:var(--muted); font-size:13px; margin-left:auto}
.sechead .meta a{color:var(--clay-deep); text-decoration:none}
.sechead .meta a:hover{text-decoration:underline}

/* grid */
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(248px,1fr)); gap:12px}
.card{position:relative; text-align:left; background:var(--panel); border:1px solid var(--line);
  border-radius:var(--r); padding:14px; box-shadow:var(--shadow); transition:.15s; overflow:hidden}
.card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:transparent; transition:.15s}
.card:hover{border-color:#DCD4C5; transform:translateY(-2px); box-shadow:var(--shadow-lift)}
.card:hover::before{background:var(--clay)}
.card-top{display:flex; align-items:flex-start; gap:12px}
.num{font-family:var(--disp); font-weight:800; font-size:40px; line-height:.85; color:var(--text); min-width:46px; letter-spacing:-.01em}
.num .tbd,.dr-num .tbd{color:var(--muted-2); font-weight:600}
.poolnote{font-family:var(--mono); font-size:11px; color:var(--sage); border:1px solid rgba(111,163,155,.45);
  border-radius:5px; padding:2px 7px; margin-left:2px; cursor:help}
.card .pname{font-family:var(--disp); font-weight:600; font-size:19px; letter-spacing:.01em; line-height:1.05}
.card .pmeta{color:var(--muted); font-size:12px; margin-top:3px; font-family:var(--mono)}
.card .pmeta .dot{color:var(--muted-2); padding:0 5px}
.statline{display:flex; gap:0; margin-top:13px; border-top:1px solid var(--line-soft); padding-top:11px}
.statline .s{flex:1; text-align:center; border-right:1px solid var(--line-soft)}
.statline .s:last-child{border-right:0}
.statline .v{font-family:var(--mono); font-weight:600; font-size:16px; color:var(--text)}
.statline .k{font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted-2); margin-top:2px}
.badges{position:absolute; top:12px; right:12px; display:flex; gap:6px; align-items:center}
.notedot{width:9px; height:9px; border-radius:50%; background:var(--sage); box-shadow:0 0 0 3px rgba(111,163,155,.18)}
.rate-chip{font-family:var(--mono); font-size:11px; font-weight:600; color:var(--clay-deep); display:flex; align-items:center; gap:2px}
.sample-tag{font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--warn); border:1px solid var(--warn); border-radius:4px; padding:1px 4px}

.empty{border:1px dashed var(--line); border-radius:var(--r); padding:38px 24px; text-align:center; color:var(--muted); background:var(--panel)}
.empty .big{font-family:var(--disp); font-weight:600; font-size:22px; color:var(--text); margin-bottom:6px}
.empty code{font-family:var(--mono); font-size:12px; background:var(--panel-3); padding:2px 6px; border-radius:5px; color:var(--clay-deep)}

/* drawer */
.scrim{position:fixed; inset:0; background:rgba(60,55,46,.32); opacity:0; pointer-events:none; transition:.2s; z-index:40}
.scrim.on{opacity:1; pointer-events:auto}
.drawer{position:fixed; top:0; right:0; height:100%; width:680px; max-width:96vw; z-index:50;
  background:var(--bg); border-left:1px solid var(--line); transform:translateX(100%);
  transition:transform .26s cubic-bezier(.2,.7,.2,1); display:flex; flex-direction:column;
  box-shadow:-30px 0 60px rgba(47,51,59,.14)}
.drawer.on{transform:translateX(0)}
.dr-scroll{overflow-y:auto; padding:0 0 40px}
.dr-head{position:relative; padding:22px 24px 20px; background:linear-gradient(165deg,#FBF6EE,#FFFFFF); border-bottom:1px solid var(--line)}
.dr-close{position:absolute; top:16px; right:16px; width:34px; height:34px; border-radius:9px;
  background:var(--panel); border:1px solid var(--line); color:var(--muted); display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow)}
.dr-close:hover{color:var(--text); background:var(--panel-2)}
.dr-num-name{display:flex; align-items:center; gap:16px}
.dr-num{font-family:var(--disp); font-weight:800; font-size:66px; line-height:.8; color:var(--clay)}
.dr-name{font-family:var(--disp); font-weight:700; font-size:32px; line-height:1; letter-spacing:.01em; color:var(--text)}
.dr-tags{display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; align-items:center}
.chip{font-family:var(--mono); font-size:12px; color:var(--text); background:var(--panel); border:1px solid var(--line); border-radius:7px; padding:4px 9px}
.chip b{color:var(--clay-deep); font-weight:600}

.dr-sec{padding:20px 24px; border-bottom:1px solid var(--line-soft)}
.dr-sec h4{font-family:var(--disp); font-weight:700; letter-spacing:.14em; font-size:12px; text-transform:uppercase; color:var(--muted); margin:0 0 14px; display:flex; align-items:center; gap:9px}
.dr-sec h4::before{content:""; width:16px; height:2px; background:var(--clay)}
.shotwrap{margin-top:2px}
.shotsvg{display:block;width:100%;max-width:460px;height:auto;margin:0 auto}
.shotsvg text{font-family:var(--disp),'Segoe UI',Arial,sans-serif}
.shotfoot{display:flex;align-items:center;gap:8px;justify-content:center;font-size:11px;color:var(--muted);margin-top:10px;flex-wrap:wrap}
.legramp{height:10px;width:130px;border-radius:6px;background:linear-gradient(90deg,#f4ece0,#c9864e,#784221)}
.shottot{margin-left:auto;font-weight:600;color:var(--text)}
.diet{margin-top:16px}
.diet .dlabel{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted-2);margin-bottom:7px}
.diet .dbar{display:flex;height:15px;border-radius:8px;overflow:hidden;border:1px solid var(--line-soft)}
.diet .seg{height:100%}
.diet .dleg{display:flex;gap:16px;margin-top:8px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.diet .dleg b{color:var(--text)}
.diet .sw{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle}
.icards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.icards .ic{flex:1;min-width:92px;background:var(--panel-2);border:1px solid var(--line-soft);border-radius:10px;padding:11px 12px;text-align:center}
.icards .ic .v{font-family:var(--mono);font-weight:700;font-size:18px;color:var(--text)}
.icards .ic .k{font-size:10px;letter-spacing:.04em;color:var(--muted);margin-top:4px;text-transform:uppercase}
.icards .ic .k .sub{display:block;text-transform:none;letter-spacing:0;color:var(--muted-2);font-size:10px;margin-top:2px}
.anet{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:16px}
.anet .acol{flex:1;min-width:130px}
.al{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted-2);margin-bottom:8px}
.achips{display:flex;flex-wrap:wrap;gap:6px}
.achip{background:var(--clay-soft);color:var(--text);border-radius:999px;padding:4px 10px;font-size:12px}
.achip i{color:var(--clay-deep);font-style:normal;font-weight:700;margin-left:3px}
.lus{margin-top:2px}
.lurow{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line-soft);font-size:13px}
.lurow .lp{flex:1;color:var(--text)}
.lurow .lm{color:var(--muted-2);font-family:var(--mono);font-size:12px;white-space:nowrap}
.lurow .ln{font-family:var(--mono);min-width:62px;text-align:right;white-space:nowrap}
.caveat{margin-top:14px;font-size:11px;color:var(--muted-2);font-style:italic;line-height:1.55}

.avg{display:grid; grid-template-columns:repeat(6,1fr); gap:1px; background:var(--line-soft); border:1px solid var(--line-soft); border-radius:11px; overflow:hidden}
.avg .a{background:var(--panel); padding:11px 6px; text-align:center}
.avg .a .v{font-family:var(--mono); font-weight:600; font-size:19px; color:var(--text)}
.avg .a .k{font-size:9.5px; letter-spacing:.09em; text-transform:uppercase; color:var(--muted-2); margin-top:2px}
.shoot{display:flex; gap:10px; margin-top:10px}
.shoot .a{flex:1; background:var(--panel); border:1px solid var(--line-soft); border-radius:9px; padding:9px; text-align:center}
.shoot .a .v{font-family:var(--mono); font-weight:600; font-size:16px; color:var(--text)}
.shoot .a .k{font-size:10px; letter-spacing:.06em; color:var(--muted-2); margin-top:2px}

.bars{margin-top:16px; display:flex; flex-direction:column; gap:9px}
.bar{display:grid; grid-template-columns:42px 1fr 40px; align-items:center; gap:10px}
.bar .lab{font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted)}
.bar .track{height:7px; background:var(--panel-3); border-radius:99px; overflow:hidden}
.bar .fill{height:100%; background:linear-gradient(90deg,var(--clay-deep),var(--clay)); border-radius:99px}
.bar .val{font-family:var(--mono); font-size:12px; color:var(--text); text-align:right}

.logwrap{overflow-x:auto; margin:0 -4px}
table.log{width:100%; border-collapse:collapse; font-family:var(--mono); font-size:12px}
table.log th{text-align:right; color:var(--muted-2); font-weight:500; font-size:10px; letter-spacing:.04em; text-transform:uppercase; padding:0 6px 8px; border-bottom:1px solid var(--line); white-space:nowrap}
table.log th:first-child,table.log td:first-child{text-align:left}
table.log td{text-align:right; padding:8px 6px; border-bottom:1px solid var(--line-soft); white-space:nowrap; color:var(--text)}
table.log tr:last-child td{border-bottom:0}
table.log .pts{color:var(--clay-deep); font-weight:600}
table.log .res-w{color:var(--good)}
table.log .res-l{color:var(--warn)}

/* notes (parchment) */
.notes{background:var(--parch); color:var(--ink-note); padding:20px 24px 24px; border-top:1px solid var(--parch-line)}
.notes h4{color:#8A754A}
.notes h4::before{background:var(--clay-deep)}
.rate{display:flex; align-items:center; gap:10px; margin-bottom:14px}
.rate .lbl{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#8A754A; font-weight:600}
.stars{display:flex; gap:4px}
.star{width:26px; height:26px; border:0; background:transparent; padding:0; color:#DCCDA9; line-height:0; transition:transform .1s}
.star.on{color:var(--clay-deep)}
.star:hover{transform:scale(1.12)}
.rate .clr{margin-left:4px; font-size:11px; color:#A8946A; background:transparent; border:0; text-decoration:underline; padding:2px}

.tags-in{width:100%; background:rgba(255,255,255,.7); border:1px solid var(--parch-line); color:var(--ink-note); border-radius:9px; padding:9px 11px; font-size:13px; margin-bottom:12px; outline:none}
.tags-in::placeholder{color:#A8946A}
.tags-in:focus{border-color:var(--clay-deep); background:#fff}
.taglist{display:flex; flex-wrap:wrap; gap:6px; margin:-4px 0 12px}
.tg{font-size:11px; font-family:var(--mono); background:rgba(197,130,78,.14); color:#8A5A28; border:1px solid rgba(197,130,78,.32); padding:2px 8px; border-radius:99px; cursor:pointer}

.note-area{width:100%; min-height:150px; resize:vertical; background:rgba(255,255,255,.72); border:1px solid var(--parch-line);
  border-radius:11px; padding:13px 15px; font-size:14.5px; line-height:1.55; color:var(--ink-note); outline:none;
  background-image:repeating-linear-gradient(transparent,transparent 27px,rgba(74,66,52,.08) 28px)}
.note-area:focus{border-color:var(--clay-deep); background-color:#fff}
.note-area::placeholder{color:#A8946A}
.note-foot{display:flex; align-items:center; justify-content:space-between; margin-top:9px; font-size:11px; color:#9A865C}
.authbtn .av{width:18px;height:18px;border-radius:50%;object-fit:cover;margin-right:5px;vertical-align:middle}
.authbtn.in{border-color:var(--clay);color:var(--clay-deep)}
.synchint{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--muted-2);margin:2px 0 10px}
.synchint .dot{width:6px;height:6px;border-radius:50%;background:#C6755B;flex:none}
.synchint.on .dot{background:#5E9E5E}
.saved{display:inline-flex; align-items:center; gap:5px; font-family:var(--mono)}
.saved .d{width:7px; height:7px; border-radius:50%; background:var(--good)}
.saved.dirty .d{background:var(--clay-deep)}

/* toast */
.toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--panel); border:1px solid var(--line); color:var(--text); padding:11px 18px; border-radius:11px;
  font-size:13px; opacity:0; pointer-events:none; transition:.2s; z-index:60; box-shadow:var(--shadow-lift)}
.toast.on{opacity:1; transform:translateX(-50%) translateY(0)}

@media (max-width:640px){
  .sechead .t{font-size:24px}
  .dr-num{font-size:52px} .dr-name{font-size:26px}
  .avg{grid-template-columns:repeat(3,1fr)}
  .top-meta{width:100%; justify-content:space-between}
  .search input{max-width:none; width:100%}
  .search{flex:1}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}

/* brand as button */
button.brand{background:none;border:0;padding:0;cursor:pointer;align-items:center}
button.brand:hover .mark b{color:var(--clay-deep)}

/* avatars */
.avatar{width:46px;height:46px;border-radius:11px;object-fit:cover;object-position:top center;background:var(--panel-3);border:1px solid var(--line);flex:none}
.card-top{align-items:center}
.dr-avatar{width:80px;height:80px;border-radius:16px;object-fit:cover;object-position:top center;background:var(--panel-3);border:1px solid var(--line);flex:none}
.dr-num-name{align-items:center}

/* team panel: standings + results */
.teampanel{display:grid;grid-template-columns:minmax(210px,1fr) minmax(230px,1.3fr);gap:14px;margin-bottom:20px}
@media (max-width:700px){.teampanel{grid-template-columns:1fr}}
.panelcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow)}
.panelcard h5{margin:0 0 10px;font-family:var(--disp);font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px}
.panelcard h5::before{content:"";width:14px;height:2px;background:var(--clay)}
.stand{width:100%;border-collapse:collapse;font-size:13px}
.stand th{font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted-2);font-weight:500;border-bottom:1px solid var(--line-soft);padding:0 6px 6px;text-align:right}
.stand td{padding:6px;text-align:right;border-bottom:1px solid var(--line-soft);font-family:var(--mono)}
.stand tr:last-child td{border-bottom:0}
.stand td:nth-child(2),.stand th:nth-child(2){text-align:left;font-family:var(--body)}
.stand td:first-child{color:var(--muted-2)}
.stand tr.me td{background:var(--clay-soft);color:var(--clay-deep);font-weight:600}
.gamerow{display:flex;align-items:center;gap:10px;padding:9px 6px;border-bottom:1px solid var(--line-soft);text-decoration:none;color:var(--text);border-radius:7px;transition:background .12s}
.gamerow:last-child{border-bottom:0}
.gamerow:hover{background:var(--clay-soft)}
.gamerow .gdate{font-family:var(--mono);font-size:11px;color:var(--muted-2);min-width:40px}
.gamerow .opp{flex:1;min-width:0;font-size:14px}
.gamerow .opp b{font-family:var(--disp);font-weight:600;font-size:15px}
.gamerow .glink{font-size:11px;color:var(--clay);opacity:0;transition:opacity .12s}
.gamerow:hover .glink{opacity:1}
.cd{font-family:var(--mono);font-size:11px;color:var(--muted-2)}
.sc{font-family:var(--mono);font-weight:600;font-size:14px;color:var(--text)}
.gst{font-size:9px;letter-spacing:.07em;text-transform:uppercase;padding:2px 6px;border-radius:5px;font-weight:700}
.gst.final{background:var(--panel-3);color:var(--muted)}
.gst.live{background:#FBE7DF;color:var(--warn)}
.gst.upcoming{background:#E7F0EE;color:var(--sage)}
.gst.win{background:rgba(110,159,106,.18);color:var(--good)}
.gst.loss{background:#FBE7DF;color:var(--warn)}
.muted-note{color:var(--muted);font-size:13px;margin:0}
.home-note{color:var(--muted);font-size:13px;margin:0 0 14px;font-family:var(--mono)}
.home-results{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:12px}
.gamecard .gc-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.gamecard .gc-teams{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px;font-family:var(--disp);font-size:16px}
.win-name{font-weight:700;color:var(--text)}
.lose-name{font-weight:500;color:var(--muted)}
a.gamecard{text-decoration:none;color:inherit;display:block;transition:border-color .12s,transform .12s}
a.gamecard:hover{border-color:var(--clay);transform:translateY(-1px)}
.day-block{margin-bottom:18px}
.day-label{font-family:var(--disp);font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:12px;color:var(--muted);margin:0 0 10px;display:flex;align-items:center;gap:9px}
.day-label::before{content:"";width:16px;height:2px;background:var(--clay)}
a.logopp{text-decoration:none}
a.logopp:hover{text-decoration:underline}

/* stats button active + sortable stats table */
.btn.on{background:var(--clay);border-color:var(--clay);color:#fff}
.btn.on svg{stroke:#fff}
.statswrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:var(--panel)}
.statstable{width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap}
.statstable thead th{position:sticky;top:0;background:var(--panel);z-index:2;font-family:var(--disp);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;text-align:right;padding:12px 10px;border-bottom:2px solid var(--line)}
.statstable th.sortable{cursor:pointer;user-select:none;transition:color .12s}
.statstable th.sortable:hover,.statstable th.sortable.on{color:var(--clay-deep)}
.statstable th.rk{text-align:right;width:34px;color:var(--muted-2)}
.statstable th.pl{text-align:left;min-width:160px}
.sortar{font-size:8px;margin-left:3px;vertical-align:middle}
.statstable td{text-align:right;padding:9px 10px;border-bottom:1px solid var(--line-soft);font-family:var(--mono);color:var(--text)}
.statstable tbody tr:last-child td{border-bottom:0}
.statstable td.rk{color:var(--muted-2);font-size:12px}
.statstable td.pl{text-align:left;font-family:var(--body);font-weight:500}
.statstable td.pl .snum{font-family:var(--mono);font-size:11px;color:var(--muted-2);margin-right:4px}
.statstable td.tm{text-align:left;font-family:var(--mono);font-size:11px;color:var(--muted)}
.statstable td.hi{color:var(--clay-deep);font-weight:700;background:var(--clay-soft)}
.statstable tbody tr{cursor:pointer;transition:background .1s}
.statstable tbody tr:hover td{background:var(--clay-soft)}
.statstable tbody tr:hover td.hi{background:var(--clay);color:#fff}
.statsubtabs{display:inline-flex;gap:4px;background:var(--panel-3);border:1px solid var(--line);border-radius:9px;padding:3px;margin-bottom:14px}
.statsubtabs .subtab{font-family:var(--disp);font-size:12px;font-weight:600;letter-spacing:.03em;color:var(--muted);background:none;border:0;border-radius:6px;padding:6px 15px;cursor:pointer;transition:.12s}
.statsubtabs .subtab:hover{color:var(--clay-deep)}
.statsubtabs .subtab.on{background:var(--panel);color:var(--clay-deep);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.adv-note{margin-top:12px;font-size:11px;line-height:1.55;max-width:760px}

/* clickable filter chips */
.chip-btn{cursor:pointer;font-family:var(--mono);font-size:12px;color:var(--text);background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:4px 9px;transition:.12s;line-height:1.3}
.chip-btn:hover{border-color:var(--clay);background:var(--clay-soft);color:var(--clay-deep)}
.chip-btn b{color:var(--clay-deep);font-weight:600}

/* percentile + average bars */
.bar2{display:grid;grid-template-columns:38px 1fr 38px 30px;align-items:center;gap:10px}
.bar2 .lab{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.track2{position:relative;height:8px;background:var(--panel-3);border-radius:99px}
.fill2{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--clay-deep),var(--clay));border-radius:99px}
.avgmark{position:absolute;top:-3px;width:2px;height:14px;background:var(--text);opacity:.5;transform:translateX(-1px);border-radius:1px}
.bar2 .val2{font-family:var(--mono);font-size:12px;color:var(--text);text-align:right}
.pctl{font-family:var(--mono);font-size:11px;font-weight:700;color:#fff;text-align:center;border-radius:6px;padding:2px 0;min-width:26px}
.barkey{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:10px;color:var(--muted-2);flex-wrap:wrap}
.barswitch{margin:18px 0 0}
.barpane .bars{margin-top:10px}
.barpane.bp-hide{display:none}
.barkey .mk{width:2px;height:11px;background:var(--text);opacity:.5;display:inline-block}
.barkey .sw{width:11px;height:11px;border-radius:3px;display:inline-block}

</style>
</head>

<script>
const D = window.HOOPDATA || {event:{},groups:{},teams:[],players:[]};
const NOTE_KEY = "hoopscout:notes:v1";
const $ = (s,r=document)=>r.querySelector(s);

/* ---------- notes store ---------- */
function loadNotes(){ try{return JSON.parse(localStorage.getItem(NOTE_KEY))||{}}catch{return{}} }
function saveNotes(n){ try{localStorage.setItem(NOTE_KEY,JSON.stringify(n))}catch{toast("Couldn't save — storage blocked")} }
let NOTES = loadNotes();
let cloudUser=null;
function noteFor(id){ return NOTES[id] || {text:"",rating:0,tags:[]} }

/* ---------- helpers ---------- */
const teamById = id => D.teams.find(t=>t.id===id) || {name:"?",code:"?"};
const fmt = (v,d=1)=> (v==null||isNaN(v)) ? "–" : Number(v).toFixed(d);
const pct = v => (v==null||isNaN(v)) ? "–" : (Number(v)*100).toFixed(1)+"%";
function hasContent(n){ return !!(n && (n.text?.trim() || n.rating>0 || (n.tags&&n.tags.length))) }

/* ---------- images / games / standings ---------- */
const IMG = pid => pid ? `https://assets.fiba.basketball/image/upload/c_fill,g_face,w_200,h_200/q_auto/f_auto/.headshot--person_${pid}--competition_208545` : "";
const avatarHTML = (p,cls)=>{ const u=IMG(p.pid); return u?`<img class="${cls}" loading="lazy" src="${u}" alt="" onerror="this.remove()">`:""; };
const codeToTeam = code => D.teams.find(t=>t.code===code);

const GAME_BASE = (D.event && D.event.url ? D.event.url : "") + "/games/";
function gameUrl(g){ return GAME_BASE + g.id + "-" + g.a + "-" + g.b; }
const MON3=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtDate(iso){ const p=String(iso||"").split("-"); return p.length<3 ? (iso||"") : (+p[2])+" "+MON3[(+p[1])-1]; }
function gameTime(g){
  if(!g || !g.time) return "Scheduled";
  const d=new Date(g.time); if(isNaN(d)) return "Scheduled";
  try{ return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}); }catch(e){ return "Scheduled"; }
}

function standings(group, meId){
  const ts=(D.groups[group]||[]).map(teamById).filter(t=>t.record)
    .sort((a,b)=> b.record.pts-a.record.pts || (b.record.diff||0)-(a.record.diff||0) || (b.record.w-a.record.w));
  if(!ts.length) return "";
  const rows=ts.map((t,i)=>`<tr class="${t.id===meId?'me':''}"><td>${i+1}</td><td>${t.name}</td><td>${t.record.w}-${t.record.l}</td><td>${t.record.pts}</td></tr>`).join("");
  return `<table class="stand"><thead><tr><th>#</th><th>Team</th><th>W-L</th><th>Pts</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function teamGames(teamId){
  const t=teamById(teamId);
  const gs=(D.games||[]).filter(g=>g.a===t.code||g.b===t.code).slice().sort((x,y)=>(x.date||"").localeCompare(y.date||""));
  if(!gs.length) return `<p class="muted-note">No games scheduled yet.</p>`;
  return gs.map(g=>{
    const home=g.a===t.code, oppCode=home?g.b:g.a, opp=codeToTeam(oppCode);
    const us=home?g.sa:g.sb, them=home?g.sb:g.sa;
    let right;
    if(g.status==='final'){ const win=us>them; right=`<span class="gst ${win?'win':'loss'}">${win?'W':'L'}</span><span class="sc">${us}–${them}</span>`; }
    else right=`<span class="gst upcoming">${gameTime(g)}</span>`;
    return `<a class="gamerow" href="${gameUrl(g)}" target="_blank" rel="noopener" title="Open full game stats on FIBA ↗"><span class="gdate">${fmtDate(g.date)}</span><span class="opp"><span class="cd">vs</span> <b>${opp?opp.name:oppCode}</b></span>${right}<span class="glink">↗</span></a>`;
  }).join("");
}
function teamPanel(teamId){
  const t=teamById(teamId);
  return `<div class="teampanel">
    <div class="panelcard"><h5>Group ${t.group} standings</h5>${standings(t.group,teamId)||'<p class="muted-note">No standings yet.</p>'}</div>
    <div class="panelcard"><h5>${t.name} · results</h5>${teamGames(teamId)}</div>
  </div>`;
}
function neutralGameCard(g){
  const A=codeToTeam(g.a),B=codeToTeam(g.b);
  let badge;
  if(g.status==='final') badge=`<span class="sc">${g.sa}–${g.sb}</span> <span class="gst final">Final</span>`;
  else badge=`<span class="gst upcoming">${gameTime(g)}</span>`;
  const aw=g.status==='final'&&g.sa>g.sb, bw=g.status==='final'&&g.sb>g.sa;
  return `<a class="panelcard gamecard" href="${gameUrl(g)}" target="_blank" rel="noopener" title="Open full game stats on FIBA ↗">
    <div class="gc-top"><span class="cd">Group ${g.group}</span>${badge}</div>
    <div class="gc-teams"><span class="${aw?'win-name':'lose-name'}">${A?A.name:g.a}</span><span class="cd">vs</span><span class="${bw?'win-name':'lose-name'}">${B?B.name:g.b}</span></div>
  </a>`;
}
function homeNote(){
  const upd=D.updated?new Date(D.updated).toUTCString().replace('GMT','UTC'):'';
  return `Group-phase schedule & results — tap a game for full stats${upd?` · snapshot ${upd}`:''}`;
}
function homeView(){
  const games=(D.games||[]).slice().sort((a,b)=>(a.date||"").localeCompare(b.date||"")||(a.group||"").localeCompare(b.group||""));
  const byDate={}; games.forEach(g=>{(byDate[g.date]=byDate[g.date]||[]).push(g);});
  const blocks=Object.keys(byDate).sort().map(d=>
    `<div class="day-block"><div class="day-label">${fmtDate(d)}</div><div class="home-results">${byDate[d].map(neutralGameCard).join("")}</div></div>`).join("");
  return `<div class="home-note">${homeNote()}</div>
    ${blocks}
    <p class="muted-note" style="margin-top:16px">Pick any of the 16 teams above for its roster, per-player event averages, photos and your scouting notes.</p>`;
}
function goHome(){ state.team=null; state.query=""; state.filter=null; state.view="board"; const s=$("#search"); if(s) s.value=""; if(activeId) closeDrawer(); else render(); }


let state = { team:null, query:"", filter:null, view:"board", statsTab:"basic", sortKey:"ppg", sortDir:"desc" };

/* ---------- tournament averages & percentiles ---------- */
const QUALIFIED = (D.players||[]).filter(p=>p.stats && p.stats.gp>0);
const LEAGUE = {};
["ppg","rpg","apg","spg","bpg","mpg"].forEach(k=>{
  const vals = QUALIFIED.map(p=>p.stats[k]).filter(v=>v!=null && !isNaN(v)).sort((a,b)=>a-b);
  const n = vals.length;
  LEAGUE[k] = { vals, n, mean: n?vals.reduce((a,b)=>a+b,0)/n:0, max: n?vals[n-1]:0 };
});
function percentile(key,v){
  const L=LEAGUE[key]; if(!L||!L.n||v==null||isNaN(v)) return null;
  let below=0, equal=0;
  for(const x of L.vals){ if(x<v) below++; else if(x===v) equal++; }
  return Math.round((below + equal/2) / L.n * 100);
}
const pctlColor = p => p>=67 ? "#5E9E5E" : p>=34 ? "#C99A3C" : "#C6755B";
function ordinal(n){ const s=["th","st","nd","rd"], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }

/* ---------- play-by-play advanced: usage + shot diet ---------- */
const TEAMAGG = {};
(D.players||[]).forEach(p=>{ const s=p.stats; if(!s||!s.gp) return; const t=p.teamId;
  const a=TEAMAGG[t]||(TEAMAGG[t]={fga:0,fta:0,tov:0,mp:0});
  a.fga+=(s.fga||0)*s.gp; a.fta+=(s.fta||0)*s.gp; a.tov+=(s.tpg||0)*s.gp; a.mp+=(s.mpg||0)*s.gp;
});
function usgVal(p){ const s=p.stats||{}; const gp=s.gp||0; if(!gp||!s.mpg) return null;
  const T=TEAMAGG[p.teamId]; if(!T) return null; const pMP=s.mpg*gp; if(pMP<20) return null;
  const den=pMP*(T.fga+0.44*T.fta+T.tov); if(den<=0) return null;
  return 100*((s.fga||0)*gp+0.44*(s.fta||0)*gp+(s.tpg||0)*gp)*(T.mp/5)/den;
}
function shotDiet(p){ const S=window.SHOTS; if(!S||!S.players) return null;
  const z=S.players[String(p.pid)]; if(!z) return null;
  const a=k=>z[k]?z[k][1]:0, m=k=>z[k]?z[k][0]:0;
  const rimA=a('rim'), midA=a('midLeft')+a('midCenter')+a('midRight'),

function filterBy(type,value,label){

function clearFilter(){ state.filter=null; render(); }
function matchesFilter(p,f){
  if(f.type==="group") return teamById(p.teamId).group===f.value;

  if(f.type==="birthYear") return "Born "+f.value;

/* ---------- play-by-play advanced (Phase B): assisted%, on/off, assist network, lineups ---------- */
const PA = window.PBPADV || {P:{},net:[],lu:[]};
function pbpRow(p){ const r=PA.P&&PA.P[p.pid]; if(!r) return null; return {am:r[0],tm:r[1],onPF:r[2],onPA:r[3],onSec:r[4],tmPF:r[5],tmPA:r[6],gSec:r[7]}; }

(PA.net||[]).forEach(function(x){ (FEEDS[x[0]]||(FEEDS[x[0]]=[])).push([x[1],x[2]]); (FEDBY[x[1]]||(FEDBY[x[1]]=[])).push([x[0],x[2]]); });
Object.keys(FEEDS).forEach(function(k){ FEEDS[k].sort(function(a,b){return b[1]-a[1];}); });
Object.keys(FEDBY).forEach(function(k){ FEDBY[k].sort(function(a,b){return b[1]-a[1];}); });

function lineupsFor(p){ const pid=String(p.pid); return (PA.lu||[]).filter(function(e){ return e[0].split("-").indexOf(pid)>=0; }).sort(function(a,b){return b[2]-a[2];}); }
function netSpan(v){ const s=(v>0?"+":"")+v.toFixed(1); const c=v>0.5?"#5E9E5E":v<-0.5?"#C6755B":"var(--muted)"; return '<b style="color:'+c+'">'+s+'</b>'; }
function lastName(nm){ return String(nm||"").split(" ").slice(-1)[0]; }
function pbpBlock(p){
  const ap=assistedPct(p), oo=onOffVal(p);

    if(oo.diff!=null) cards+='<div class="ic"><div class="v">'+netSpan(oo.diff)+'</div><div class="k">On/off swing<span class="sub">net impact</span></div></div>'; }

  function netList(arr){ return arr.map(function(e){ const pl=pidPlayer(e[0]); return '<span class="achip">'+(pl?pl.name:'#'+e[0])+' <i>'+e[1]+'</i></span>'; }).join(''); }

    if(feeds.length) h+='<div class="acol"><div class="al">Sets up</div><div class="achips">'+netList(feeds)+'</div></div>';
    if(fedby.length) h+='<div class="acol"><div class="al">Set up by</div><div class="achips">'+netList(fedby)+'</div></div>';

  if(lus.length){ h+='<div class="lus"><div class="al">Most-used lineups with '+lastName(p.name)+'</div>';
    lus.forEach(function(e){ const partners=e[0].split("-").filter(function(x){return x!==String(p.pid);}).map(function(x){ const pl=pidPlayer(x); return pl?lastName(pl.name):'#'+x; }).join(" + ");
      h+='<div class="lurow"><span class="lp">'+partners+'</span><span class="lm">'+(e[2]/60).toFixed(0)+' min</span><span class="ln">'+netSpan((e[3]-e[4])/e[2]*2400)+' /40</span></div>'; });

const STAT_COLS = {
  basic: [["pos","POS","Position"],["gp","GP","Games played"],["mpg","MIN","Minutes per game"],["ppg","PTS","Points per game"],["rpg","REB","Rebounds per game"],["apg","AST","Assists per game"],["spg","STL","Steals per game"],["bpg","BLK","Blocks per game"],["tpg","TO","Turnovers per game"],["fgPct","FG%","Field-goal %"],["tpPct","3P%","Three-point %"],["ftPct","FT%","Free-throw %"]],
  advanced: [["pos","POS","Position"],["gp","GP","Games played"],["mpg","MIN","Minutes per game"],["ts","TS%","True Shooting %: PTS / (2·(FGA + 0.44·FTA)) — scoring efficiency across 2s, 3s and FTs. Shown for ≥6 FGA."],["efg","eFG%","Effective FG %: (FGM + 0.5·3PM) / FGA — credits the extra point on threes. Shown for ≥6 FGA."],["p36","P36","Points per 36 minutes (rate-normalised)"],["r36","R36","Rebounds per 36 minutes"],["a36","A36","Assists per 36 minutes"],["astto","A/TO","Assists per turnover — playmaking control"],["stk","STK","Stocks: steals + blocks per game"],["prod","PROD","Box production: PTS+REB+AST+STL+BLK − TO"],["usg","USG%","Usage rate — share of team possessions a player uses (FGA + 0.44·FTA + TOV), minute-adjusted. Needs ≥20 total minutes."],["rimrate","RIM%","Shot diet — share of a player's field-goal attempts taken at the rim, from play-by-play. Needs ≥8 FGA."],["threerate","3PA%","Shot diet — share of field-goal attempts that are threes, from play-by-play. Needs ≥8 FGA."],["astpct","AST%","Assisted field-goal rate — share of a player's made field goals that came off a teammate's pass (from play-by-play). Needs ≥5 makes."],["onoff","ON/OFF","On/off net rating per 40 — team net rating with the player on court minus off court. Small single-tournament samples; read with caution. Needs ≥10 on-court minutes."]]
};
function tsDen(s){ return 2*((s.fga||0)+0.44*(s.fta||0)); }
function tsQual(s){ return (s.fga||0)*(s.gp||0) >= 6; }  // require a real shot sample
function metric(p,key){
  const s=p.stats||{}; const m=s.mpg||0;
  switch(key){
    case "p36": return m>0 ? s.ppg/m*36 : 0;
    case "r36": return m>0 ? s.rpg/m*36 : 0;
    case "a36": return m>0 ? s.apg/m*36 : 0;
    case "astto": return s.tpg>0 ? s.apg/s.tpg : (s.apg>0 ? Infinity : 0);
    case "stk": return (s.spg||0)+(s.bpg||0);
    case "prod": return (s.ppg||0)+(s.rpg||0)+(s.apg||0)+(s.spg||0)+(s.bpg||0)-(s.tpg||0);
    case "ts": return (tsQual(s)&&tsDen(s)>0) ? s.ppg/tsDen(s) : -Infinity;
    case "efg": return (tsQual(s)&&s.fga>0) ? (s.fgm+0.5*s.tpm)/s.fga : -Infinity;
    case "usg": { const v=usgVal(p); return v==null?-Infinity:v; }
    case "rimrate": { const d=shotDiet(p); return (d&&d.tot>=8)?d.rimA/d.tot:-Infinity; }
    case "threerate": { const d=shotDiet(p); return (d&&d.tot>=8)?d.threeA/d.tot:-Infinity; }
    case "astpct": { const r=PA.P&&PA.P[p.pid]; return (r&&r[1]>=5)? Math.min(100,r[0]/r[1]*100) : -Infinity; }
    case "onoff": { const o=onOffVal(p); return (o&&o.diff!=null)? o.diff : -Infinity; }
    case "onnet": { const o=onOffVal(p); return o? o.onNet : -Infinity; }
    default: return (s[key]!=null ? s[key] : -Infinity);
  }
}
function statCell(p,key){
  const s=p.stats||{};
  if(key==="pos") return p.pos||"–";
  if(key==="gp") return s.gp??"–";
  if(key==="ts"||key==="efg"){ const v=metric(p,key); return v===-Infinity ? "–" : pct(v); }
  if(key==="usg"){ const v=metric(p,"usg"); return v===-Infinity ? "–" : v.toFixed(1); }
  if(key==="rimrate"||key==="threerate"){ const v=metric(p,key); return v===-Infinity ? "–" : pct(v); }
  if(key==="astpct"){ const v=metric(p,"astpct"); return v===-Infinity ? "–" : Math.round(v)+"%"; }
  if(key==="onoff"||key==="onnet"){ const v=metric(p,key); return v===-Infinity ? "–" : (v>0?"+":"")+v.toFixed(1); }
  if(key==="fgPct") return s.fga ? `<span title="${s.fgm}/${s.fga} FG per game">${pct(s.fgPct)}</span>` : pct(s.fgPct);
  if(key==="tpPct") return s.tpa ? `<span title="${s.tpm}/${s.tpa} 3PT per game">${pct(s.tpPct)}</span>` : pct(s.tpPct);
  if(key==="ftPct") return s.fta ? `<span title="${s.ftm}/${s.fta} FT per game">${pct(s.ftPct)}</span>` : pct(s.ftPct);
  if(key==="astto"){ const v=metric(p,"astto"); return isFinite(v) ? v.toFixed(2) : (s.apg>0?"∞":"–"); }
  return fmt(metric(p,key));
}
function sortedPlayers(){
  const key=state.sortKey||"ppg", dir=state.sortDir||"desc";
  const list=D.players.filter(p=>p.stats && p.stats.gp>0).slice();
  const val=p=> key==="name" ? p.name.toLowerCase()
            : key==="team" ? teamById(p.teamId).name.toLowerCase()
            : key==="pos"  ? (p.pos||"")
            : metric(p,key);
  list.sort((a,b)=>{
    const x=val(a), y=val(b);
    if(typeof x==="string"){ return dir==="asc" ? x.localeCompare(y) : y.localeCompare(x); }
    if(x===y) return 0;
    return dir==="asc" ? (x-y) : (y-x);
  });
  return list;
}
function statsView(){

let activeId=null, dirtyTimer=null;

/* advanced percentile bars (Basic/Advanced toggle in profile) */
function pctOf(L,v){ if(!L||!L.n||v==null||!isFinite(v)) return null; let below=0,equal=0; for(const x of L.vals){ if(x<v)below++; else if(x===v)equal++; } return Math.round((below+equal/2)/L.n*100); }
const ADV = [
  ["TS%","ts",    v=>pct(v)],
  ["USG%","usg",  v=>v.toFixed(1)],
  ["A/TO","astto",v=> isFinite(v)?v.toFixed(2):"\u221e"],

  ["STK","stk",   v=>fmt(v)]
];
const LEAGUE_ADV = {};
ADV.forEach(([lab,key])=>{
  const vals = QUALIFIED.map(p=>metric(p,key)).filter(v=>v!=null && isFinite(v)).sort((a,b)=>a-b);
  const n=vals.length;
  LEAGUE_ADV[key]={vals,n,mean:n?vals.reduce((a,b)=>a+b,0)/n:0};
});
function advBars(p){
  const rows = ADV.map(([lab,key,vfmt])=>{
    let v=metric(p,key); const L=LEAGUE_ADV[key];
    let pl, disp;
    if(v===Infinity){ pl=100; disp=vfmt(v); }
    else if(v==null || v===-Infinity || isNaN(v)){ pl=null; disp="\u2013"; v=null; }
    else { pl=pctOf(L,v); disp=vfmt(v); }
    const w = pl==null?0:pl;
    const avgPos = (L&&L.n)? pctOf(L,L.mean) : 50;
    const col = pl==null?"var(--muted-2)":pctlColor(pl);
    return `<div class="bar2">
      <span class="lab">${lab}</span>
      <span class="track2"><span class="fill2" style="width:${w}%"></span><span class="avgmark" style="left:${avgPos!=null?avgPos:50}%" title="Tournament avg: ${(L&&L.n)?vfmt(L.mean):'\u2013'}"></span></span>
      <span class="val2">${disp}</span>
      <span class="pctl" style="background:${col}" title="${pl!=null?ordinal(pl)+' percentile at the event':'not enough data'}">${pl!=null?pl:"\u2013"}</span>
    </div>`;
  }).join("");
  return `<div class="bars">${rows}
    <div class="barkey"><span class="mk"></span> tournament avg &nbsp;\u00b7&nbsp; percentile
      <span class="sw" style="background:#C6755B"></span><span class="sw" style="background:#C99A3C"></span><span class="sw" style="background:#5E9E5E"></span> low\u2192high (100 = best)</div>
  </div>`;
}

function statBars(s){
  const defs=[["PTS","ppg"],["REB","rpg"],["AST","apg"],["STL","spg"],["BLK","bpg"]];
  const rows = defs.map(([lab,key])=>{
    const v=s[key]; const L=LEAGUE[key]||{mean:0,max:0};
    const pl = (v==null||isNaN(v)) ? null : percentile(key,v);
    const w = pl==null ? 0 : pl;                       // bar fills to the percentile (100 = full)
    const avgPos = percentile(key, L.mean);            // marker sits where the tournament avg ranks
    const col = pl==null ? "var(--muted-2)" : pctlColor(pl);
    return `<div class="bar2">
      <span class="lab">${lab}</span>
      <span class="track2"><span class="fill2" style="width:${w}%"></span><span class="avgmark" style="left:${avgPos!=null?avgPos:50}%" title="Tournament avg: ${fmt(L.mean)}"></span></span>
      <span class="val2">${fmt(v)}</span>
      <span class="pctl" style="background:${col}" title="${pl!=null?ordinal(pl)+" percentile at the event":"no data"}">${pl!=null?pl:"–"}</span>
    </div>`;
  }).join("");
  return `<div class="bars">${rows}
    <div class="barkey"><span class="mk"></span> tournament avg &nbsp;·&nbsp; percentile
      <span class="sw" style="background:#C6755B"></span><span class="sw" style="background:#C99A3C"></span><span class="sw" style="background:#5E9E5E"></span> low→high (100 = best)</div>
  </div>`;
}

function gameLog(rows){
  if(!rows||!rows.length) return `<p class="muted-note">No game log available for this player yet.</p>`;
  const head=["Date","Opp","MIN","PTS","REB","AST","STL","BLK","TO","FG%","3P%","FT%"];
  const body=rows.map(g=>{
    const wl=(g.res||"").charAt(0).toUpperCase();
    const rc=wl==="W"?"res-w":wl==="L"?"res-l":"";
    const label=`${wl?wl+" ":""}${g.opp||g.oppName||""}`;
    const oppCell = g.url
      ? `<a class="logopp ${rc}" href="${g.url}" target="_blank" rel="noopener" title="Open full game stats on FIBA ↗">${label} ↗</a>`
      : `<span class="${rc}">${label}</span>`;
    return `<tr>
      <td>${g.date||"–"}</td>
      <td>${oppCell}</td>
      <td>${g.min??"–"}</td><td class="pts">${g.pts??"–"}</td><td>${g.reb??"–"}</td>
      <td>${g.ast??"–"}</td><td>${g.stl??"–"}</td><td>${g.blk??"–"}</td><td>${g.to??"–"}</td>
      <td>${pct(g.fgPct)}</td><td>${pct(g.tpPct)}</td><td>${pct(g.ftPct)}</td>
    </tr>`;
  }).join("");
  return `<div class="logwrap"><table class="log"><thead><tr>${head.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${body}</tbody></table></div>`;
}


/* ---------- shot chart (play-by-play zones) ---------- */
function szFill(m,a){ if(a===0) return '#eae3d6';
  const lp=(x,y,t)=>x+(y-x)*t, p=m/a, t=Math.max(0,Math.min(1,(p-0.20)/0.45)),
    lo=[244,236,224],mid=[201,134,82],hi=[120,66,33]; let c;
  if(t<.5){const u=t/.5;c=[lp(lo[0],mid[0],u),lp(lo[1],mid[1],u),lp(lo[2],mid[2],u)];}
  else{const u=(t-.5)/.5;c=[lp(mid[0],hi[0],u),lp(mid[1],hi[1],u),lp(mid[2],hi[2],u)];}
  return 'rgb('+c.map(Math.round).join(',')+')'; }
function szText(m,a){ if(a===0) return '#9a8f7b'; return (m/a>0.45)?'#fff':'#3a3027'; }
function shotChartSVG(z,g){
  let s='';
  g.zones.forEach(k=>{ const v=z[k]||[0,0]; s+=`<polygon points="${g.poly[k]}" fill="${szFill(v[0],v[1])}" stroke="${g.line}" stroke-width="1.9" stroke-linejoin="round"/>`; });
  s+=g.detail;
  g.zones.forEach(k=>{ const v=z[k]||[0,0],m=v[0],a=v[1],pc=a?Math.round(m/a*100)+'%':'–',ma=a?(m+' – '+a):'';
    if(k==='cornerL'||k==='cornerR'){ const c=g.call[k],col='#3a3027',dot=a?szFill(m,a):g.line;
      s+=`<line x1="${c.lx0}" y1="${c.ty-4}" x2="${c.t[0]}" y2="${c.t[1]}" stroke="${g.line}" stroke-width="1.3"/>`
        +`<circle cx="${c.t[0]}" cy="${c.t[1]}" r="2.2" fill="${dot}"/>`
        +`<text x="${c.tx}" y="${c.ty}" text-anchor="${c.anchor}" font-size="19" font-weight="800" fill="${col}">${pc}</text>`
        +(a?`<text x="${c.tx}" y="${c.ty+13}" text-anchor="${c.anchor}" font-size="11" font-weight="600" fill="${col}" opacity=".92">${ma}</text>`:'');
    } else { const f=g.fs[k],col=szText(m,a),x=g.cen[k][0],y=g.cen[k][1];
      s+=`<text x="${x}" y="${y}" text-anchor="middle" font-size="${f}" font-weight="800" fill="${col}">${pc}</text>`
        +(a?`<text x="${x}" y="${y+f*0.8}" text-anchor="middle" font-size="${(f*0.58).toFixed(1)}" font-weight="600" fill="${col}" opacity=".92">${ma}</text>`:'');
    }});
  return `<svg viewBox="${g.vb}" class="shotsvg" xmlns="http://www.w3.org/2000/svg">${s}</svg>`;
}
function shotChartBlock(p){
  const S=window.SHOTS;
  if(!S||!S.geo) return `<p class="muted-note">Shot-location data isn't loaded.</p>`;
  const z = S.players ? S.players[String(p.pid)] : null;
  let att=0,mk=0; if(z) S.geo.zones.forEach(k=>{ const v=z[k]; if(v){att+=v[1];mk+=v[0];} });
  if(!z||!att) return `<p class="muted-note">No shot-location data for ${p.name} yet — no field-goal attempts recorded in the games parsed so far.</p>`;
  const games=(p.stats&&p.stats.gp)||(S.meta&&S.meta.games)||1;
  return `<div class="shotwrap">${shotChartSVG(z,S.geo)}</div>
    <div class="shotfoot"><span>cold</span><span class="legramp"></span><span>hot · FG%</span><span class="shottot">${mk}/${att} FG · ${games} game${games>1?'s':''}</span></div>`;
}

function paintStars(){

  $("#stars").querySelectorAll(".star").forEach(b=> b.classList.toggle("on", +b.dataset.v<=r));

function renderTags(){

  list.querySelectorAll(".tg").forEach(el=> el.onclick=()=>{
    const tags=noteFor(activeId).tags.slice(); tags.splice(+el.dataset.i,1); setNote(activeId,{tags}); renderTags();
  });

function updateCharInfo(){
  const t = $("#noteArea")?.value||""; const ci=$("#charInfo");
  if(ci) ci.textContent = t.trim()? t.trim().split(/\s+/).length+" words" : "";
}

function setNote(id, patch){
  const cur = noteFor(id);
  NOTES[id] = {text:cur.text||"", rating:cur.rating||0, tags:cur.tags||[], ...patch, updated:Date.now()};
  saveNotes(NOTES);
  pushCloud();
}
function markDirty(){ const f=$("#savedFlag"); if(f){ f.classList.add("dirty"); $("#savedTxt").textContent="Saving…"; } updateCharInfo(); }
let saveTimer=null;
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    setNote(activeId,{text:$("#noteArea").value});
    const f=$("#savedFlag"); if(f){ f.classList.remove("dirty"); $("#savedTxt").textContent="Saved"; }
    render();
  },450);
}
function closeDrawer(){
  // flush any pending text

  $("#scrim").classList.remove("on"); activeId=null; render();
}

/* ---------- cloud sync (Firebase) glue ---------- */
function pushCloud(){ if(window.CloudSync && window.CloudSync.enabled && cloudUser) window.CloudSync.pushNotes(NOTES); }
function applyRemoteNotes(cloud){
  if(!cloud) return; let changed=false;
  for(const id in cloud){ const c=cloud[id]; if(!c) continue; const l=NOTES[id];
    if(!l || (c.updated||0) > (l.updated||0)){ NOTES[id]=c; changed=true; } }
  if(changed){ saveNotes(NOTES);
    if(activeId){ const ta=$("#noteArea"); if(ta){ if(document.activeElement!==ta) ta.value=noteFor(activeId).text||"";
      if($("#stars")&&typeof paintStars==="function") paintStars();
      if($("#tagList")&&typeof renderTags==="function") renderTags(); } }
    render(); }
}
function updateAuthUI(user){
  cloudUser = user || null;
  const b=$("#authBtn"), lab=$("#authLabel");
  if(b && lab){
    if(user){ b.classList.add("in"); b.title="Synced as "+(user.email||"your account")+" — click to sign out";
      const nm=(user.displayName||user.email||"Account").split(" ")[0];
      lab.innerHTML=(user.photoURL?('<img class="av" referrerpolicy="no-referrer" src="'+user.photoURL+'" alt="">'):"")+nm; }
    else { b.classList.remove("in"); b.title="Sign in to sync your notes across devices"; lab.textContent="Sign in"; }
  }
  const hh=$("#syncHint"); if(hh){ hh.className="synchint"+(user?" on":""); hh.innerHTML='<span class="dot"></span>'+(user?("Synced to "+(user.email||"your account")):"Saved on this device · sign in to sync across devices"); }
}
if($("#authBtn")) $("#authBtn").onclick=()=>{
  if(!(window.CloudSync && window.CloudSync.enabled)){ toast("Cloud sync isn't set up yet — paste your Firebase keys into index.html (see the CLOUD SYNC SETUP comment)."); return; }
  if(cloudUser){ if(confirm("Sign out of note sync?\nYour notes stay saved on this device.")) window.CloudSync.signOut(); }
  else window.CloudSync.signIn();
};
function wireCloud(cs){
  if(!cs || !cs.enabled){ updateAuthUI(null); return; }
  cs.onAuth(user=>{ updateAuthUI(user); if(user) setTimeout(pushCloud, 1200); });
  cs.onRemote(cloud=>applyRemoteNotes(cloud));
}
if(window.CloudSync) wireCloud(window.CloudSync);
else window.addEventListener("cloud-ready", ()=>wireCloud(window.CloudSync), {once:true});
document.addEventListener("keydown", e=>{ if(e.key==="Escape" && activeId) closeDrawer(); });
