<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MT Scouting · U17 World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F4EE; --panel:#FFFFFF; --panel-2:#FBFAF5; --panel-3:#F0ECE3;
  --line:#E7E2D6; --line-soft:#EFEBE1;
  --text:#2F333B; --muted:#747C88; --muted-2:#A0A6B0;
  --clay:#C5824E; --clay-deep:#A96A38; --clay-soft:#F2E4D4;
  --sage:#6FA39B; --good:#6E9F6A; --warn:#C6755B;
  --parch:#FBF4E4; --parch-2:#F5EAD2; --parch-line:#E7DBBE; --ink-note:#4A4234;
  --disp:"Saira Condensed","Oswald",system-ui,sans-serif;
  --body:"IBM Plex Sans",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --r:13px; --maxw:1180px;
  --shadow:0 1px 2px rgba(47,51,59,.04); --shadow-lift:0 10px 28px rgba(47,51,59,.10);
}
html{color-scheme:light}
html[data-theme="dark"]{
  color-scheme:dark;
  --bg:#16181C; --panel:#202329; --panel-2:#1B1E23; --panel-3:#2A2E35;
  --line:#33373F; --line-soft:#2A2E35;
  --text:#E7E4DD; --muted:#9AA1AC; --muted-2:#727A86;
  --clay:#D2925E; --clay-deep:#E1A877; --clay-soft:#37291C;
  --sage:#7FB3AB; --good:#83BA7E; --warn:#DD8C72;
  --parch:#272320; --parch-2:#2F2920; --parch-line:#43392A; --ink-note:#E2D8C5;
  --shadow:0 1px 2px rgba(0,0,0,.45); --shadow-lift:0 12px 30px rgba(0,0,0,.6);
}
html[data-theme="dark"] .team .code{background:#2A2E35;color:#A7AEB9}
html[data-theme="dark"] .dr-head{background:linear-gradient(165deg,#24272E,#1B1E23)}
html[data-theme="dark"] .tags-in:focus{background:var(--panel)}
html[data-theme="dark"] .note-area:focus{background-color:var(--panel)}
html[data-theme="dark"] .card:hover{border-color:#474C56}
html[data-theme="dark"] .bbrow:hover{border-color:#474C56}
html[data-theme="dark"] .gst.live,html[data-theme="dark"] .gst.loss{background:#3A241E}
html[data-theme="dark"] .gst.upcoming{background:#1D2E2B}
.iconbtn{padding:7px 9px}
.themeic{vertical-align:-2px}
.themeic.sun{display:none}
html[data-theme="dark"] .themeic.moon{display:none}
html[data-theme="dark"] .themeic.sun{display:inline}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:
    radial-gradient(1100px 520px at 86% -14%, rgba(197,130,78,.07), transparent 62%),
    var(--bg);
  color:var(--text); font-family:var(--body); font-size:15px; line-height:1.45;
  -webkit-font-smoothing:antialiased; min-height:100vh;
}
button{font-family:inherit; cursor:pointer}
input,textarea{font-family:inherit}
::selection{background:rgba(197,130,78,.22)}

/* top bar */
.top{position:sticky; top:0; z-index:30; background:rgba(246,244,238,.82);
  backdrop-filter:blur(10px); border-bottom:1px solid var(--line)}
.top-in{max-width:var(--maxw); margin:0 auto; padding:14px 20px; display:flex; align-items:center; gap:18px; flex-wrap:wrap}
.brand{display:flex; align-items:center; gap:11px; min-width:0}
.brand .brand-logo{width:32px; height:32px; border-radius:8px; display:block; flex:none}
.brand .mark{font-family:var(--disp); font-weight:800; font-size:26px; letter-spacing:.04em; color:var(--text); line-height:1; white-space:nowrap}
.brand .mark b{color:var(--clay)}
.brand .sub{color:var(--muted); font-size:12px; letter-spacing:.12em; text-transform:uppercase}
.top-meta{margin-left:auto; display:flex; align-items:center; gap:14px}
.evt{display:flex; flex-direction:column; align-items:flex-end; line-height:1.2}
.evt .a{font-family:var(--disp); font-weight:600; font-size:15px; letter-spacing:.05em; text-transform:uppercase}
.evt .b{color:var(--muted-2); font-size:11px; font-family:var(--mono)}

.search{position:relative}
.search input{width:230px; max-width:46vw; background:var(--panel); border:1px solid var(--line);
  color:var(--text); border-radius:999px; padding:9px 14px 9px 34px; font-size:14px; outline:none;
  box-shadow:var(--shadow); transition:border-color .15s, box-shadow .15s}
.search input:focus{border-color:var(--clay); box-shadow:0 0 0 3px rgba(197,130,78,.15)}
.search svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted-2)}

.io{display:flex; gap:8px}
.top-in.top-tabs{padding-top:2px}
.row1-right{margin-left:auto; display:flex; align-items:center; gap:14px; flex-wrap:wrap; justify-content:flex-end}
.top-tabs .top-meta{margin-left:0; width:100%; justify-content:space-between}
.matchup{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
.mlabel{font-family:var(--mono); font-size:11px; letter-spacing:.05em; text-transform:uppercase; color:var(--muted-2); white-space:nowrap}
.msel{height:32px; border:1px solid var(--line); background:var(--panel); color:var(--text); border-radius:8px; font:inherit; font-size:12px; padding:0 6px; max-width:150px; cursor:pointer; box-shadow:var(--shadow)}
.mflip{display:inline-flex; align-items:center; gap:6px}
.mchip{display:inline-flex; align-items:center; gap:5px; border:1px solid var(--line); background:var(--panel); color:var(--text); border-radius:999px; padding:4px 10px 4px 6px; font-size:12.5px; cursor:pointer; box-shadow:var(--shadow); transition:border-color .12s, background .12s}
.mchip img{width:18px; height:13px; border-radius:2px; display:block; object-fit:cover}
.mchip b{font-family:var(--mono); font-weight:700}
.mchip:hover{border-color:var(--clay)}
.mchip.on{background:var(--clay); color:#fff; border-color:var(--clay)}
.mchip.on img{outline:1px solid rgba(255,255,255,.6)}
.mvs{font-size:11px; color:var(--muted-2); font-family:var(--mono)}
.btn{background:var(--panel); border:1px solid var(--line); color:var(--text); border-radius:9px;
  padding:8px 12px; font-size:13px; font-weight:500; display:inline-flex; align-items:center; gap:7px;
  box-shadow:var(--shadow); transition:background .15s,border-color .15s}
.btn:hover{background:var(--panel-2); border-color:#D9D2C4}
.btn svg{color:var(--muted)}

/* filters */
.wrap{max-width:var(--maxw); margin:0 auto; padding:22px 20px 80px}
.groups{display:flex; gap:22px; flex-wrap:wrap; margin-bottom:8px}
.grp{flex:1 1 200px; min-width:170px}
.grp h3{font-family:var(--disp); font-weight:700; letter-spacing:.14em; font-size:12px; color:var(--muted);
  text-transform:uppercase; margin:0 0 8px; display:flex; align-items:center; gap:8px}
.grp h3::before{content:""; width:18px; height:2px; background:var(--clay); display:inline-block}
.teamrow{display:flex; flex-direction:column; gap:5px}
.team{display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:transparent;
  border:1px solid transparent; color:var(--muted); padding:7px 9px; border-radius:9px; font-size:14px; transition:.13s}
.team:hover{background:var(--panel); color:var(--text); box-shadow:var(--shadow)}
.team.active{background:var(--panel); border-color:var(--clay); color:var(--text); box-shadow:var(--shadow)}
.team .code{font-family:var(--mono); font-size:11px; font-weight:600; color:#5C636E; background:#ECE7DC;
  border-radius:5px; padding:2px 5px; letter-spacing:.02em; min-width:38px; text-align:center}
.team.active .code{background:var(--clay); color:#fff}
.team .nm{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.team .ct{font-family:var(--mono); font-size:11px; color:var(--muted-2)}

.divider{height:1px; background:var(--line-soft); margin:22px 0 18px}

/* section head */
.sechead{display:flex; align-items:flex-end; gap:14px; margin-bottom:16px; flex-wrap:wrap}
.sechead .t{font-family:var(--disp); font-weight:700; font-size:30px; letter-spacing:.02em; line-height:1; color:var(--text)}
.sechead .c{font-family:var(--mono); font-size:11px; color:#fff; background:var(--clay); padding:3px 7px; border-radius:5px; letter-spacing:.03em}
.sechead .meta{color:var(--muted); font-size:13px; margin-left:auto}
.sechead .meta a{color:var(--clay-deep); text-decoration:none}
.sechead .meta a:hover{text-decoration:underline}

/* grid */
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(248px,1fr)); gap:12px}
.card{position:relative; text-align:left; background:var(--panel); border:1px solid var(--line);
  border-radius:var(--r); padding:14px; box-shadow:var(--shadow); transition:.15s; overflow:hidden}
.card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:transparent; transition:.15s}
.card:hover{border-color:#DCD4C5; transform:translateY(-2px); box-shadow:var(--shadow-lift)}
.card:hover::before{background:var(--clay)}
.card-top{display:flex; align-items:flex-start; gap:12px}
.num{font-family:var(--disp); font-weight:800; font-size:40px; line-height:.85; color:var(--text); min-width:46px; letter-spacing:-.01em}
.num .tbd,.dr-num .tbd{color:var(--muted-2); font-weight:600}
.poolnote{font-family:var(--mono); font-size:11px; color:var(--sage); border:1px solid rgba(111,163,155,.45);
  border-radius:5px; padding:2px 7px; margin-left:2px; cursor:help}
.card .pname{font-family:var(--disp); font-weight:600; font-size:19px; letter-spacing:.01em; line-height:1.05}
.card .pmeta{color:var(--muted); font-size:12px; margin-top:3px; font-family:var(--mono)}
.card .pmeta .dot{color:var(--muted-2); padding:0 5px}
.statline{display:flex; gap:0; margin-top:13px; border-top:1px solid var(--line-soft); padding-top:11px}
.statline .s{flex:1; text-align:center; border-right:1px solid var(--line-soft)}
.statline .s:last-child{border-right:0}
.statline .v{font-family:var(--mono); font-weight:600; font-size:16px; color:var(--text)}
.statline .k{font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted-2); margin-top:2px}
.badges{position:absolute; top:42px; right:11px; display:flex; flex-direction:column; gap:5px; align-items:flex-end}
.notedot{width:9px; height:9px; border-radius:50%; background:var(--sage); box-shadow:0 0 0 3px rgba(111,163,155,.18)}
.rate-chip{font-family:var(--mono); font-size:11px; font-weight:600; color:var(--clay-deep); display:flex; align-items:center; gap:2px}
.sample-tag{font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--warn); border:1px solid var(--warn); border-radius:4px; padding:1px 4px}

.empty{border:1px dashed var(--line); border-radius:var(--r); padding:38px 24px; text-align:center; color:var(--muted); background:var(--panel)}
.empty .big{font-family:var(--disp); font-weight:600; font-size:22px; color:var(--text); margin-bottom:6px}
.empty code{font-family:var(--mono); font-size:12px; background:var(--panel-3); padding:2px 6px; border-radius:5px; color:var(--clay-deep)}

/* drawer */
.scrim{position:fixed; inset:0; background:rgba(60,55,46,.32); opacity:0; pointer-events:none; transition:.2s; z-index:40}
.scrim.on{opacity:1; pointer-events:auto}
.drawer{position:fixed; top:0; right:0; height:100%; width:680px; max-width:96vw; z-index:50;
  background:var(--bg); border-left:1px solid var(--line); transform:translateX(100%);
  transition:transform .26s cubic-bezier(.2,.7,.2,1); display:flex; flex-direction:column;
  box-shadow:-30px 0 60px rgba(47,51,59,.14)}
.drawer.on{transform:translateX(0)}
.dr-scroll{overflow-y:auto; padding:0 0 40px}
.dr-head{position:relative; padding:22px 24px 20px; background:linear-gradient(165deg,#FBF6EE,#FFFFFF); border-bottom:1px solid var(--line)}
.dr-close{position:absolute; top:16px; right:16px; width:34px; height:34px; border-radius:9px;
  background:var(--panel); border:1px solid var(--line); color:var(--muted); display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow)}
.dr-close:hover{color:var(--text); background:var(--panel-2)}
.dr-num-name{display:flex; align-items:center; gap:16px}
.dr-num{font-family:var(--disp); font-weight:800; font-size:66px; line-height:.8; color:var(--clay)}
.dr-name{font-family:var(--disp); font-weight:700; font-size:32px; line-height:1; letter-spacing:.01em; color:var(--text)}
.dr-tags{display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; align-items:center}
.chip{font-family:var(--mono); font-size:12px; color:var(--text); background:var(--panel); border:1px solid var(--line); border-radius:7px; padding:4px 9px}
.chip b{color:var(--clay-deep); font-weight:600}

.dr-sec{padding:20px 24px; border-bottom:1px solid var(--line-soft)}
.dr-sec h4{font-family:var(--disp); font-weight:700; letter-spacing:.14em; font-size:12px; text-transform:uppercase; color:var(--muted); margin:0 0 14px; display:flex; align-items:center; gap:9px}
.dr-sec h4::before{content:""; width:16px; height:2px; background:var(--clay)}
.shotwrap{margin-top:2px}
.shotsvg{display:block;width:100%;max-width:460px;height:auto;margin:0 auto}
.shotsvg text{font-family:var(--disp),'Segoe UI',Arial,sans-serif}
.shotfoot{display:flex;align-items:center;gap:8px;justify-content:center;font-size:11px;color:var(--muted);margin-top:10px;flex-wrap:wrap}
.legramp{height:10px;width:130px;border-radius:6px;background:linear-gradient(90deg,#f4ece0,#c9864e,#784221)}
.shottot{margin-left:auto;font-weight:600;color:var(--text)}
.diet{margin-top:16px}
.diet .dlabel{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted-2);margin-bottom:7px}
.diet .dbar{display:flex;height:15px;border-radius:8px;overflow:hidden;border:1px solid var(--line-soft)}
.diet .seg{height:100%}
.diet .dleg{display:flex;gap:16px;margin-top:8px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.diet .dleg b{color:var(--text)}
.diet .sw{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle}
.icards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.icards .ic{flex:1;min-width:92px;background:var(--panel-2);border:1px solid var(--line-soft);border-radius:10px;padding:11px 12px;text-align:center}
.icards .ic .v{font-family:var(--mono);font-weight:700;font-size:18px;color:var(--text)}
.icards .ic .k{font-size:10px;letter-spacing:.04em;color:var(--muted);margin-top:4px;text-transform:uppercase}
.icards .ic .k .sub{display:block;text-transform:none;letter-spacing:0;color:var(--muted-2);font-size:10px;margin-top:2px}
.anet{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:16px}
.anet .acol{flex:1;min-width:130px}
.al{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted-2);margin-bottom:8px}
.achips{display:flex;flex-wrap:wrap;gap:6px}
.achip{background:var(--clay-soft);color:var(--text);border-radius:999px;padding:4px 10px;font-size:12px}
.achip i{color:var(--clay-deep);font-style:normal;font-weight:700;margin-left:3px}
.lus{margin-top:2px}
.lurow{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line-soft);font-size:13px}
.lurow .lp{flex:1;color:var(--text)}
.lurow .lm{color:var(--muted-2);font-family:var(--mono);font-size:12px;white-space:nowrap}
.lurow .ln{font-family:var(--mono);min-width:62px;text-align:right;white-space:nowrap}
.caveat{margin-top:14px;font-size:11px;color:var(--muted-2);font-style:italic;line-height:1.55}

.avg{display:grid; grid-template-columns:repeat(6,1fr); gap:1px; background:var(--line-soft); border:1px solid var(--line-soft); border-radius:11px; overflow:hidden}
.avg .a{background:var(--panel); padding:11px 6px; text-align:center}
.avg .a .v{font-family:var(--mono); font-weight:600; font-size:19px; color:var(--text)}
.avg .a .k{font-size:9.5px; letter-spacing:.09em; text-transform:uppercase; color:var(--muted-2); margin-top:2px}
.shoot{display:flex; gap:10px; margin-top:10px}
.shoot .a{flex:1; background:var(--panel); border:1px solid var(--line-soft); border-radius:9px; padding:9px; text-align:center}
.shoot .a .v{font-family:var(--mono); font-weight:600; font-size:16px; color:var(--text)}
.shoot .a .k{font-size:10px; letter-spacing:.06em; color:var(--muted-2); margin-top:2px}

.bars{margin-top:16px; display:flex; flex-direction:column; gap:9px}
.bar{display:grid; grid-template-columns:42px 1fr 40px; align-items:center; gap:10px}
.bar .lab{font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted)}
.bar .track{height:7px; background:var(--panel-3); border-radius:99px; overflow:hidden}
.bar .fill{height:100%; background:linear-gradient(90deg,var(--clay-deep),var(--clay)); border-radius:99px}
.bar .val{font-family:var(--mono); font-size:12px; color:var(--text); text-align:right}

.logwrap{overflow-x:auto; margin:0 -4px}
table.log{width:100%; border-collapse:collapse; font-family:var(--mono); font-size:12px}
table.log th{text-align:right; color:var(--muted-2); font-weight:500; font-size:10px; letter-spacing:.04em; text-transform:uppercase; padding:0 6px 8px; border-bottom:1px solid var(--line); white-space:nowrap}
table.log th:first-child,table.log td:first-child{text-align:left}
table.log td{text-align:right; padding:8px 6px; border-bottom:1px solid var(--line-soft); white-space:nowrap; color:var(--text)}
table.log tr:last-child td{border-bottom:0}
table.log .pts{color:var(--clay-deep); font-weight:600}
table.log .res-w{color:var(--good)}
table.log .res-l{color:var(--warn)}

/* notes (parchment) */
.notes{background:var(--parch); color:var(--ink-note); padding:20px 24px 24px; border-top:1px solid var(--parch-line)}
.notes h4{color:#8A754A}
.notes h4::before{background:var(--clay-deep)}
.rate{display:flex; align-items:center; gap:10px; margin-bottom:14px}
.rate .lbl{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#8A754A; font-weight:600}
.stars{display:flex; gap:4px}
.star{width:26px; height:26px; border:0; background:transparent; padding:0; color:#DCCDA9; line-height:0; transition:transform .1s}
.star.on{color:var(--clay-deep)}
.star:hover{transform:scale(1.12)}
.rate .clr{margin-left:4px; font-size:11px; color:#A8946A; background:transparent; border:0; text-decoration:underline; padding:2px}

.tags-in{width:100%; background:rgba(255,255,255,.7); border:1px solid var(--parch-line); color:var(--ink-note); border-radius:9px; padding:9px 11px; font-size:13px; margin-bottom:12px; outline:none}
.tags-in::placeholder{color:#A8946A}
.tags-in:focus{border-color:var(--clay-deep); background:#fff}
.taglist{display:flex; flex-wrap:wrap; gap:6px; margin:-4px 0 12px}
.tg{font-size:11px; font-family:var(--mono); background:rgba(197,130,78,.14); color:#8A5A28; border:1px solid rgba(197,130,78,.32); padding:2px 8px; border-radius:99px; cursor:pointer}

.note-area{width:100%; min-height:150px; resize:vertical; background:rgba(255,255,255,.72); border:1px solid var(--parch-line);
  border-radius:11px; padding:13px 15px; font-size:14.5px; line-height:1.55; color:var(--ink-note); outline:none;
  background-image:repeating-linear-gradient(transparent,transparent 27px,rgba(74,66,52,.08) 28px)}
.note-area:focus{border-color:var(--clay-deep); background-color:#fff}
.note-area::placeholder{color:#A8946A}
.note-foot{display:flex; align-items:center; justify-content:space-between; margin-top:9px; font-size:11px; color:#9A865C}
.authbtn .av{width:18px;height:18px;border-radius:50%;object-fit:cover;margin-right:5px;vertical-align:middle}
.authbtn.in{border-color:var(--clay);color:var(--clay-deep)}
.synchint{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--muted-2);margin:2px 0 10px}
.synchint .dot{width:6px;height:6px;border-radius:50%;background:#C6755B;flex:none}
.synchint.on .dot{background:#5E9E5E}
.saved{display:inline-flex; align-items:center; gap:5px; font-family:var(--mono)}
.saved .d{width:7px; height:7px; border-radius:50%; background:var(--good)}
.saved.dirty .d{background:var(--clay-deep)}

/* toast */
.toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--panel); border:1px solid var(--line); color:var(--text); padding:11px 18px; border-radius:11px;
  font-size:13px; opacity:0; pointer-events:none; transition:.2s; z-index:60; box-shadow:var(--shadow-lift)}

<script>
const D = window.HOOPDATA || {event:{},groups:{},teams:[],players:[]};
const NOTE_KEY = "hoopscout:notes:v1";
const $ = (s,r=document)=>r.querySelector(s);

/* ---------- notes store ---------- */
function migrateNote(n){ if(n && n.text && n.text.trim() && !n.nAth && !n.nOff && !n.nDef){ n.nOff=n.text; delete n.text; } return n; }
function loadNotes(){ try{ const o=JSON.parse(localStorage.getItem(NOTE_KEY))||{}; for(const id in o){ if(id!=="__board") migrateNote(o[id]); } return o; }catch{return{}} }
function saveNotes(n){ try{localStorage.setItem(NOTE_KEY,JSON.stringify(n))}catch{toast("Couldn't save — storage blocked")} }
let NOTES = loadNotes();
let cloudUser=null;
function noteFor(id){ return NOTES[id] || {rating:0,tags:[],nAth:"",nOff:"",nDef:"",proj:"",qAth:[],qOff:[],qDef:[]} }

/* ---------- helpers ---------- */
const teamById = id => D.teams.find(t=>t.id===id) || {name:"?",code:"?"};
const fmt = (v,d=1)=> (v==null||isNaN(v)) ? "–" : Number(v).toFixed(d);
const pct = v => (v==null||isNaN(v)) ? "–" : (Number(v)*100).toFixed(1)+"%";
function hasContent(n){ return !!(n && ((n.nAth&&n.nAth.trim()) || (n.nOff&&n.nOff.trim()) || (n.nDef&&n.nDef.trim()) || (n.proj&&n.proj.trim()) || (n.text&&n.text.trim()) || n.rating>0 || (n.tags&&n.tags.length) || (n.qAth&&n.qAth.length) || (n.qOff&&n.qOff.length) || (n.qDef&&n.qDef.length))) }

/* ---------- images / games / standings ---------- */
const IMG = pid => pid ? `https://assets.fiba.basketball/image/upload/c_fill,g_face,w_200,h_200/q_auto/f_auto/.headshot--person_${pid}--competition_208545` : "";
const avatarHTML = (p,cls)=>{ const u=IMG(p.pid); return u?`<img class="${cls}" loading="lazy" src="${u}" alt="" onerror="this.remove()">`:""; };
const codeToTeam = code => D.teams.find(t=>t.code===code);
const TEAM_ISO={ITA:'it',USA:'us',FRA:'fr',JPN:'jp',CMR:'cm',CAN:'ca',LTU:'lt',CHN:'cn',NZL:'nz',SLO:'si',PUR:'pr',TUR:'tr',VEN:'ve',AUS:'au',SRB:'rs',CIV:'ci'};
function FLAG(code,w){ const iso=TEAM_ISO[code]; return iso?('https://flagcdn.com/w'+(w||40)+'/'+iso+'.png'):''; }

const GAME_BASE = (D.event && D.event.url ? D.event.url : "") + "/games/";
function gameUrl(g){ return GAME_BASE + g.id + "-" + g.a + "-" + g.b; }
const MON3=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtDate(iso){ const p=String(iso||"").split("-"); return p.length<3 ? (iso||"") : (+p[2])+" "+MON3[(+p[1])-1]; }
function gameTime(g){
  if(!g || !g.time) return "Scheduled";
  const d=new Date(g.time); if(isNaN(d)) return "Scheduled";
  try{ return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}); }catch(e){ return "Scheduled"; }
}

function standings(group, meId){
  const ts=(D.groups[group]||[]).map(teamById).filter(t=>t.record)
    .sort((a,b)=> b.record.pts-a.record.pts || (b.record.diff||0)-(a.record.diff||0) || (b.record.w-a.record.w));
  if(!ts.length) return "";
  const rows=ts.map((t,i)=>`<tr class="${t.id===meId?'me':''}"><td>${i+1}</td><td>${t.name}</td><td>${t.record.w}-${t.record.l}</td><td>${t.record.pts}</td></tr>`).join("");
  return `<table class="stand"><thead><tr><th>#</th><th>Team</th><th>W-L</th><th>Pts</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function teamGames(teamId){
  const t=teamById(teamId);
  const gs=(D.games||[]).filter(g=>g.a===t.code||g.b===t.code).slice().sort((x,y)=>(x.date||"").localeCompare(y.date||""));
  if(!gs.length) return `<p class="muted-note">No games scheduled yet.</p>`;
  return gs.map(g=>{
    const home=g.a===t.code, oppCode=home?g.b:g.a, opp=codeToTeam(oppCode);
    const us=home?g.sa:g.sb, them=home?g.sb:g.sa;
    let right;
    if(g.status==='final'){ const win=us>them; right=`<span class="gst ${win?'win':'loss'}">${win?'W':'L'}</span><span class="sc">${us}–${them}</span>`; }
    else right=`<span class="gst upcoming">${gameTime(g)}</span>`;
    return `<a class="gamerow" href="${gameUrl(g)}" target="_blank" rel="noopener" title="Open full game stats on FIBA ↗"><span class="gdate">${fmtDate(g.date)}</span><span class="opp"><span class="cd">vs</span> <b>${opp?opp.name:oppCode}</b></span>${right}<span class="glink">↗</span></a>`;
  }).join("");
}
function teamPanel(teamId){
  const t=teamById(teamId);
  return `<div class="teampanel">
    ${teamProfile(teamId)}
    <div class="panelcard"><h5>Group ${t.group} standings</h5>${standings(t.group,teamId)||'<p class="muted-note">No standings yet.</p>'}</div>
    ${teamLineups(teamId)}
    <div class="panelcard"><h5>${t.name} \u00b7 results</h5>${teamGames(teamId)}</div>
  </div>`;
}
/* ---------- tournament rankings ---------- */
let _teamRebCtx=null;
function teamRebCtx(){
  if(_teamRebCtx) return _teamRebCtx;
  const gt={};
  D.players.forEach(p=>{ (p.gamelog||[]).forEach(g=>{ const m=(g.url||'').match(/games\/(\d+)-/); const gid=m?m[1]:null; if(!gid)return;
    gt[gid]=gt[gid]||{}; const a=gt[gid][p.teamId]=gt[gid][p.teamId]||[0,0]; a[0]+=g.oreb||0; a[1]+=g.dreb||0; }); });
  const out={}; (D.teams||[]).forEach(t=>out[t.id]={oreb:0,dreb:0,oppOreb:0,oppDreb:0});
  (D.games||[]).forEach(g=>{ const A=codeToTeam(g.a), B=codeToTeam(g.b); if(!A||!B||!out[A.id]||!out[B.id])return; const gg=gt[g.id]; if(!gg)return;
    const x=gg[A.id]||[0,0], y=gg[B.id]||[0,0];
    out[A.id].oreb+=x[0]; out[A.id].dreb+=x[1]; out[A.id].oppOreb+=y[0]; out[A.id].oppDreb+=y[1];
    out[B.id].oreb+=y[0]; out[B.id].dreb+=y[1]; out[B.id].oppOreb+=x[0]; out[B.id].oppDreb+=x[1]; });
  _teamRebCtx=out; return out;
}
function teamStatVals(t){
  const G=(t.record&&(t.record.w+t.record.l))||0; if(!G||!t.record) return null;
  let a={fgm:0,fga:0,tpm:0,tpa:0,ftm:0,fta:0,ast:0,tov:0,pts:0,reb:0,stl:0,blk:0};
  D.players.filter(p=>p.teamId===t.id&&p.stats&&p.stats.gp).forEach(p=>{ const s=p.stats,g=s.gp;
    a.fgm+=(s.fgm||0)*g; a.fga+=(s.fga||0)*g; a.tpm+=(s.tpm||0)*g; a.tpa+=(s.tpa||0)*g; a.ftm+=(s.ftm||0)*g; a.fta+=(s.fta||0)*g;
    a.ast+=(s.apg||0)*g; a.tov+=(s.tpg||0)*g; a.pts+=(s.ppg||0)*g; a.reb+=(s.rpg||0)*g; a.stl+=(s.spg||0)*g; a.blk+=(s.bpg||0)*g; });
  const rc=teamRebCtx()[t.id]||{oreb:0,dreb:0,oppOreb:0,oppDreb:0};
  const poss=a.fga - rc.oreb + a.tov + 0.44*a.fta;
  const oppPts=t.record.pf - t.record.diff;
  return { pf:t.record.pf/G, pa:oppPts/G, nd:t.record.diff/G,

/* ---------- tournament averages & percentiles ---------- */
const QUALIFIED = (D.players||[]).filter(p=>p.stats && p.stats.gp>0);
const LEAGUE = {};
["ppg","rpg","apg","spg","bpg","mpg"].forEach(k=>{
  const vals = QUALIFIED.map(p=>p.stats[k]).filter(v=>v!=null && !isNaN(v)).sort((a,b)=>a-b);
  const n = vals.length;
  LEAGUE[k] = { vals, n, mean: n?vals.reduce((a,b)=>a+b,0)/n:0, max: n?vals[n-1]:0 };
});
const POS_KEYS=["G","F","C"];
function posOf(p){ return (p&&p.pos?String(p.pos).charAt(0).toUpperCase():"")||"?"; }
function posName(pos){ return {G:"guards",F:"forwards",C:"centers"}[pos]||"players"; }
const LEAGUE_POS={};
POS_KEYS.forEach(pos=>{ LEAGUE_POS[pos]={};
  ["ppg","rpg","apg","spg","bpg","mpg"].forEach(k=>{
    const vals=QUALIFIED.filter(p=>posOf(p)===pos).map(p=>p.stats[k]).filter(v=>v!=null&&!isNaN(v)).sort((a,b)=>a-b);
    const n=vals.length; LEAGUE_POS[pos][k]={vals,n,mean:n?vals.reduce((a,b)=>a+b,0)/n:0,max:n?vals[n-1]:0};
  });
});
function leagueFor(key,pos){ return (state.posRel&&pos&&LEAGUE_POS[pos]&&LEAGUE_POS[pos][key]&&LEAGUE_POS[pos][key].n>=5)?LEAGUE_POS[pos][key]:LEAGUE[key]; }
function percentile(key,v,pos){
  const L=leagueFor(key,pos); if(!L||!L.n||v==null||isNaN(v)) return null;
  let below=0, equal=0;
  for(const x of L.vals){ if(x<v) below++; else if(x===v) equal++; }
  return Math.round((below + equal/2) / L.n * 100);
}
const pctlColor = p => p>=67 ? "#5E9E5E" : p>=34 ? "#C99A3C" : "#C6755B";
// Matches the player-card rank badges (.rkb tiers): green / yellow / neutral / orange / red.
function rankColor(rank,n){ if(rank==null||!n||n<=1) return "#747C88";
  const P=(n-rank)/(n-1)*100;
  if(P>=97) return "#3C7A3C"; if(P>=90) return "#927714"; if(P<3) return "#B5302A"; if(P<=10) return "#B5651D"; return "#747C88"; }
function ordinal(n){ const s=["th","st","nd","rd"], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }

/* ---------- play-by-play advanced: usage + shot diet ---------- */
const TEAMAGG = {};
(D.players||[]).forEach(p=>{ const s=p.stats; if(!s||!s.gp) return; const t=p.teamId;
  const a=TEAMAGG[t]||(TEAMAGG[t]={fga:0,fta:0,tov:0,mp:0});
  a.fga+=(s.fga||0)*s.gp; a.fta+=(s.fta||0)*s.gp; a.tov+=(s.tpg||0)*s.gp; a.mp+=(s.mpg||0)*s.gp;
});
function usgVal(p){ const s=p.stats||{}; const gp=s.gp||0; if(!gp||!s.mpg) return null;
  const T=TEAMAGG[p.teamId]; if(!T) return null; const pMP=s.mpg*gp; if(pMP<20) return null;
  const den=pMP*(T.fga+0.44*T.fta+T.tov); if(den<=0) return null;
  return 100*((s.fga||0)*gp+0.44*(s.fta||0)*gp+(s.tpg||0)*gp)*(T.mp/5)/den;
}
function shotDiet(p){ const S=window.SHOTS; if(!S||!S.players) return null;
  const z=S.players[String(p.pid)]; if(!z) return null;
  const a=k=>z[k]?z[k][1]:0, m=k=>z[k]?z[k][0]:0;
  const rimA=a('rim'), midA=a('midLeft')+a('midCenter')+a('midRight'),
        threeA=a('cornerL')+a('cornerR')+a('wingL')+a('wingR')+a('top');
  const rimM=m('rim'), midM=m('midLeft')+m('midCenter')+m('midRight'),
        threeM=m('cornerL')+m('cornerR')+m('wingL')+m('wingR')+m('top');
  const tot=rimA+midA+threeA; if(tot<1) return null;
  return {rimA,midA,threeA,tot,rimM,midM,threeM};
}
function shotDietBlock(p){ const d=shotDiet(p); if(!d) return "";
  const pf=a=>Math.round(a/d.tot*100); const fg=(m,a)=>a?Math.round(m/a*100)+"%":"–";

    <div class="dbar"><div class="seg" style="width:${d.rimA/d.tot*100}%;background:#A96A38"></div><div class="seg" style="width:${d.midA/d.tot*100}%;background:#D9B38C"></div><div class="seg" style="width:${d.threeA/d.tot*100}%;background:#6FA39B"></div></div>
    <div class="dleg"><span><span class="sw" style="background:#A96A38"></span>Rim <b>${pf(d.rimA)}%</b> · ${fg(d.rimM,d.rimA)}</span><span><span class="sw" style="background:#D9B38C"></span>Mid <b>${pf(d.midA)}%</b> · ${fg(d.midM,d.midA)}</span><span><span class="sw" style="background:#6FA39B"></span>Three <b>${pf(d.threeA)}%</b> · ${fg(d.threeM,d.threeA)}</span></div></div>`;
}

  const srcs=Array.from(sheet.querySelectorAll("img")).map(im=>im.getAttribute("src")).filter(Boolean);
  const doPrint=()=>{
    prepOverlay(false);
    document.body.classList.add("printing");
    const done=()=>{ document.body.classList.remove("printing"); window.removeEventListener("afterprint",done); };
    window.addEventListener("afterprint",done);
    setTimeout(()=>window.print(),80);
  };
  if(!srcs.length){ doPrint(); return; }
  prepOverlay(true);

function histData(stat,group){
  let base=D.players.filter(p=>p.stats&&p.stats.gp>0);
  if(group&&group!=="all") base=base.filter(p=>teamById(p.teamId).group===group);

function histogramSVG(){
  const stat=state.histStat, group=state.chartGroup;
  const data=histData(stat,group);
  if(data.length<4) return '<div class="muted-note" style="padding:26px 4px">Not enough players have this stat for the current filter.</div>';
  const vals=data.map(d=>d.v);
  let lo=Math.min.apply(null,vals), hi=Math.max.apply(null,vals);
  if(lo===hi){ hi=lo+1; lo=lo-1; }
  const nB=Math.min(16,Math.max(8,Math.round(Math.sqrt(data.length))));
  const bw=(hi-lo)/nB; const bins=new Array(nB).fill(0);
  vals.forEach(v=>{ let i=Math.floor((v-lo)/bw); if(i>=nB)i=nB-1; if(i<0)i=0; bins[i]++; });
  const maxC=Math.max.apply(null,bins);
  const mean=vals.reduce((a,b)=>a+b,0)/vals.length;
  const hp=state.histPlayer?D.players.find(p=>p.id===state.histPlayer):null;
  const hv=hp?chVal(hp,stat):null;
  const W=720,H=420,mL=46,mR=16,mT=22,mB=52,PW=W-mL-mR,PH=H-mT-mB;
  const X=v=>mL+(v-lo)/(hi-lo)*PW, Yc=c=>mT+PH-(c/maxC)*PH;
  let g='';
  for(let i=0;i<=4;i++){ const c=Math.round(maxC*i/4), y=Yc(c); g+='<line class="cg" x1="'+mL+'" y1="'+y.toFixed(1)+'" x2="'+(mL+PW)+'" y2="'+y.toFixed(1)+'"/><text class="cax" x="'+(mL-8)+'" y="'+(y+3).toFixed(1)+'" text-anchor="end">'+c+'</text>'; }
  for(let i=0;i<nB;i++){ if(!bins[i]) continue; const x0=X(lo+i*bw), x1=X(lo+(i+1)*bw), y=Yc(bins[i]), hgt=mT+PH-y;
    const inBin = hv!=null && hv>=lo+i*bw && (hv<lo+(i+1)*bw || (i===nB-1&&hv<=hi));
    g+='<rect class="hbar'+(inBin?' on':'')+'" x="'+(x0+1).toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+Math.max(1,(x1-x0-2)).toFixed(1)+'" height="'+hgt.toFixed(1)+'"><title>'+chFmt(stat,lo+i*bw)+' \u2013 '+chFmt(stat,lo+(i+1)*bw)+': '+bins[i]+' players</title></rect>'; }
  for(let i=0;i<=5;i++){ const v=lo+(hi-lo)*i/5; g+='<text class="cax" x="'+X(v).toFixed(1)+'" y="'+(mT+PH+16)+'" text-anchor="middle">'+chFmt(stat,v)+'</text>'; }
  g+='<line class="hmean" x1="'+X(mean).toFixed(1)+'" y1="'+mT+'" x2="'+X(mean).toFixed(1)+'" y2="'+(mT+PH)+'"/><text class="hml" x="'+X(mean).toFixed(1)+'" y="'+(mT-6)+'" text-anchor="middle">avg '+chFmt(stat,mean)+'</text>';
  if(hv!=null){ const hx=X(Math.max(lo,Math.min(hi,hv))); g+='<line class="hplayer" x1="'+hx.toFixed(1)+'" y1="'+mT+'" x2="'+hx.toFixed(1)+'" y2="'+(mT+PH)+'"/><circle class="hpdot" cx="'+hx.toFixed(1)+'" cy="'+mT+'" r="4"/>'; }
  g+='<text class="cttl" x="'+(mL+PW/2)+'" y="'+(H-8)+'" text-anchor="middle">'+chEsc(chLabel(stat))+'</text>';
  g+='<text class="cttl" x="13" y="'+(mT+PH/2)+'" text-anchor="middle" transform="rotate(-90 13 '+(mT+PH/2)+')">Players</text>';
  return '<svg class="scatter histsvg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+g+'</svg>';
}

function boardOrder(){ const b=NOTES["__board"]; return (b&&Array.isArray(b.order))?b.order.slice():[]; }
function setBoardOrder(order){ NOTES["__board"]={order:order.slice(),updated:Date.now()}; saveNotes(NOTES); pushCloud(); }
function bigBoardIds(){
  // Members of the board = anyone you've rated (stars) OR bookmarked.
  const pf=id=>D.players.find(p=>p.id===id);
  const members=Object.keys(NOTES).filter(id=>id!=="__board"&&NOTES[id]&&(((NOTES[id].rating||0)>0)||NOTES[id].watch)&&D.players.some(p=>p.id===id));
  const ord=boardOrder();
  const rankOf=id=>NOTES[id].rating||0;
  const manual=id=>{ const i=ord.indexOf(id); return i<0?1e9:i; };   // your saved drag order, unplaced last
  return members.slice().sort((a,b)=>{
    const ra=rankOf(a), rb=rankOf(b);
    if(rb!==ra) return rb-ra;                 // star tier ALWAYS wins: 5* above 4* above ... above unrated
    const ma=manual(a), mb=manual(b);
    if(ma!==mb) return ma-mb;                 // within a tier, your manual drag order
    const sa=(pf(a)||{}).stats||{}, sb=(pf(b)||{}).stats||{};
    return (sb.ppg||0)-(sa.ppg||0);           // then by scoring
  });
}

const RAX=["Scoring","Efficiency","Playmaking","Rebounding","Defense","Usage"];
function radarPctls(p){
  const s=p.stats||{}; const pos=posOf(p);
  const ts=metric(p,"ts"), usg=metric(p,"usg");
  return [
    {pct:percentile("ppg",s.ppg,pos), disp:fmt(s.ppg)},
    {pct:pctOf(leagueAdvFor("ts",pos),ts), disp:(ts===-Infinity?"\u2013":pct(ts))},
    {pct:percentile("apg",s.apg,pos), disp:fmt(s.apg)},
    {pct:percentile("rpg",s.rpg,pos), disp:fmt(s.rpg)},
    {pct:pctOf(leagueAdvFor("stk",pos),metric(p,"stk")), disp:fmt(metric(p,"stk"))},
    {pct:(usg===-Infinity?null:pctOf(leagueAdvFor("usg",pos),usg)), disp:(usg===-Infinity?"\u2013":usg.toFixed(1))}
  ];
}
function rPoint(cx,cy,R,frac,i){ const a=(-90+i*60)*Math.PI/180; return [cx+R*frac*Math.cos(a), cy+R*frac*Math.sin(a)]; }
function radarSVG(entries){
  const W=360,H=320,cx=180,cy=150,R=100; let g='';
  [0.25,0.75,1].forEach(fr=>{ const pts=[]; for(let i=0;i<6;i++){ const q=rPoint(cx,cy,R,fr,i); pts.push(q[0].toFixed(1)+','+q[1].toFixed(1)); } g+='<polygon class="rgrid" points="'+pts.join(' ')+'"/>'; });
  for(let i=0;i<6;i++){ const q=rPoint(cx,cy,R,1,i); g+='<line class="rspoke" x1="'+cx+'" y1="'+cy+'" x2="'+q[0].toFixed(1)+'" y2="'+q[1].toFixed(1)+'"/>'; }
  { const ap=[]; for(let i=0;i<6;i++){ const q=rPoint(cx,cy,R,0.5,i); ap.push(q[0].toFixed(1)+','+q[1].toFixed(1)); } g+='<polygon class="ravg" points="'+ap.join(' ')+'"/>'; }
  for(let i=0;i<6;i++){ const q=rPoint(cx,cy,R+20,1,i); const ax=Math.abs(q[0]-cx)<6?"middle":(q[0]>cx?"start":"end"); g+='<text class="rlab" x="'+q[0].toFixed(1)+'" y="'+(q[1]+4).toFixed(1)+'" text-anchor="'+ax+'">'+RAX[i]+'</text>'; }
  entries.forEach(e=>{ const pts=[]; for(let i=0;i<6;i++){ const v=(e.pcts[i]==null?0:e.pcts[i])/100; const q=rPoint(cx,cy,R,v,i); pts.push(q[0].toFixed(1)+','+q[1].toFixed(1)); }
    g+='<polygon class="rpoly" points="'+pts.join(' ')+'" style="fill:'+e.color+'2e;stroke:'+e.color+'"/>';
    for(let i=0;i<6;i++){ const v=(e.pcts[i]==null?0:e.pcts[i])/100; const q=rPoint(cx,cy,R,v,i);
      let title=''; if(e.disps){ const lab=(e.pcts[i]==null?'n/a':e.pcts[i]+'th pct'); title='<title>'+RAX[i]+': '+lab+(e.disps[i]&&e.disps[i]!=='\u2013'?' ('+e.disps[i]+')':'')+'</title>'; }
      g+='<circle class="rdot" r="3.2" cx="'+q[0].toFixed(1)+'" cy="'+q[1].toFixed(1)+'" fill="'+e.color+'">'+title+'</circle>'; } });
  g+='<g class="ravgleg"><line class="ravg" x1="120" y1="305" x2="144" y2="305"/><text class="ravgt" x="150" y="308.5">League average</text></g>';
  return '<svg class="radar" viewBox="0 0 '+W+' '+H+'" role="img" aria-label="Radar chart">'+g+'</svg>';
}
const CMP_ROWS=[["PTS","ppg",1],["REB","rpg",1],["AST","apg",1],["STL","spg",1],["BLK","bpg",1],["TO","tpg",0],["MIN","mpg",1],["FG%","fgPct",1],["3P%","tpPct",1],["FT%","ftPct",1],["TS%","ts",1],["USG%","usg",1],["A/TO","astto",1],["PROD","prod",1]];
function compareTable(A,B,cA,cB){

    let wa="",wb=""; if(va!=null&&vb!=null&&va!==vb){ const aw= hi? va>vb : va<vb; if(aw) wa="win"; else wb="win"; }
    return '<tr><td class="v '+wa+'">'+(va==null?"\u2013":chFmt(key,va))+'</td><td class="lbl">'+lab+'</td><td class="v '+wb+'">'+(vb==null?"\u2013":chFmt(key,vb))+'</td></tr>';

function wireCombo(id,onPick){
  const root=$("#"+id); if(!root) return;
  const inp=root.querySelector(".cbx-in"), pop=root.querySelector(".cbx-pop");
  const allOpts=()=>Array.from(pop.querySelectorAll(".cbx-opt"));
  let savedLabel=inp.value, savedVal=inp.dataset.val||"";
  const open=()=>{ pop.hidden=false; root.classList.add("open"); };
  const close=()=>{ pop.hidden=true; root.classList.remove("open"); };
  const vis=()=>allOpts().filter(o=>!o.hidden);
  const filter=()=>{ const q=deburr(inp.value); let first=null;
    allOpts().forEach(o=>{ const ok=!q||(o.dataset.s||"").indexOf(q)>=0; o.hidden=!ok; o.classList.remove("active"); if(ok&&!first)first=o; });
    if(first) first.classList.add("active"); };
  const pick=o=>{ const v=o.dataset.val||""; close(); onPick(v); };
  inp.addEventListener("focus",()=>{ savedLabel=inp.value; savedVal=inp.dataset.val||""; inp.value=""; filter(); open(); });
  inp.addEventListener("input",()=>{ open(); filter(); });
  inp.addEventListener("keydown",e=>{
    if(e.key==="ArrowDown"||e.key==="ArrowUp"){ e.preventDefault(); const v=vis(); if(!v.length)return; let i=v.findIndex(o=>o.classList.contains("active")); v.forEach(o=>o.classList.remove("active")); i=e.key==="ArrowDown"?Math.min(v.length-1,i+1):Math.max(0,i-1); if(i<0)i=0; v[i].classList.add("active"); v[i].scrollIntoView({block:"nearest"}); }
    else if(e.key==="Enter"){ e.preventDefault(); const a=pop.querySelector(".cbx-opt.active:not([hidden])")||vis()[0]; if(a) pick(a); }
    else if(e.key==="Escape"){ e.preventDefault(); inp.value=savedLabel; inp.dataset.val=savedVal; close(); inp.blur(); }
  });
  allOpts().forEach(o=>o.addEventListener("mousedown",e=>{ e.preventDefault(); pick(o); }));
  inp.addEventListener("blur",()=>{ setTimeout(()=>{ if(root.classList.contains("open")){ inp.value=savedLabel; inp.dataset.val=savedVal; close(); } },140); });
}

  const team=sec('Team stats','Team profiles carry per-game numbers and an Advanced tab. Possessions are estimated (see the note below), so the rating numbers are directional \u2014 the rankings are the reliable part.',[

    gi('Net','Point differential','Average margin per game.','PF \u2212 PA'),
    gi('ORtg / DRtg','Offensive / Defensive rating','Points scored (ORtg) and allowed (DRtg) per 100 possessions \u2014 pace-adjusted, so teams that play fast and slow can be compared. Lower DRtg is better.','points / possessions \u00d7 100'),
    gi('Net /100','Net rating','Efficiency margin per 100 possessions.','ORtg \u2212 DRtg'),

    gi('AST Ratio','Team assist ratio','Share of team possessions ending in an assist \u2014 ball movement. Shown as a %.','AST / (FGA + 0.44 \u00d7 FTA + AST + TOV) \u00d7 100'),
    gi('eFG / TS / FTr / 3PA% / A/TO','Team shooting & style','The same shooting-efficiency and style measures as the player versions, computed from team totals.')

function eventGames(){
  const out=[];
  (D.games||[]).forEach(g=>{ if(g.a&&g.b&&codeToTeam(g.a)&&codeToTeam(g.b)) out.push({a:g.a,b:g.b,t:g.time||g.date||'',st:g.status}); });
  ((D.bracket&&D.bracket.games)||[]).forEach(g=>{ if(g.a&&g.b&&codeToTeam(g.a)&&codeToTeam(g.b)) out.push({a:g.a,b:g.b,t:g.dt||'',st:g.st}); });
  return out;
}
function _isLive(st){ return /live|inprogress|playing/i.test(st||''); }
function smartOpponent(teamId){
  const t=teamById(teamId); if(!t||!t.code) return null; const now=Date.now();
  const cands=eventGames().filter(g=>g.a===t.code||g.b===t.code).map(g=>{
    const oppCode=g.a===t.code?g.b:g.a; const opp=codeToTeam(oppCode); if(!opp) return null;
    return {oppId:opp.id, tm:Date.parse(g.t)||0, live:_isLive(g.st)}; }).filter(Boolean);
  if(!cands.length) return null;
  cands.sort((x,y)=>{ if(x.live!==y.live) return x.live?-1:1; return Math.abs(x.tm-now)-Math.abs(y.tm-now); });
  return cands[0].oppId;
}
function initMatchup(){
  const now=Date.now(); let best=null;
  eventGames().forEach(g=>{ const A=codeToTeam(g.a), B=codeToTeam(g.b); if(!A||!B) return;
    const score=(_isLive(g.st)?0:1)*1e15 + Math.abs((Date.parse(g.t)||0)-now);
    if(!best||score<best.score) best={a:A.id,b:B.id,score}; });
  if(best){ state.matchA=best.a; state.matchB=best.b; }
}
function setMatchTeam(which,teamId){ if(which==='a'){ state.matchA=teamId; const o=smartOpponent(teamId); if(o&&o!==teamId) state.matchB=o; } else state.matchB=teamId; }
function openTeamFromMatch(teamId){ if(!teamId) return; state.team=teamId; state.query=''; state.filter=null; state.view='board'; const s=$('#search'); if(s) s.value=''; if(activeId) closeDrawer(); else render(); try{ window.scrollTo({top:0,behavior:'smooth'}); }catch(e){} }

const SMART_FIELDS=[
  ["pos","Position","pos"],
  ["height","Height","height"],
  ["birthYear","Birth year","year"],
  ["ppg","Points / g","num"],["rpg","Rebounds / g","num"],["apg","Assists / g","num"],
  ["spg","Steals / g","num"],["bpg","Blocks / g","num"],["tpg","Turnovers / g","num"],
  ["mpg","Minutes / g","num"],["orpg","OReb / g","num"],["drpg","DReb / g","num"],["stk","Stocks / g","num"],
  ["fgPct","FG%","pct01"],["tpPct","3P%","pct01"],["ftPct","FT%","pct01"],
  ["ts","TS%","pct01"],["efg","eFG%","pct01"],["rimfg","Rim FG%","pct01"],["tovpct","TOV%","pct01"],
  ["usg","Usage%","num100"],["astratio","Assist ratio","num100"],["scshare","Scoring share","num100"],["astto","A/TO","num"],
  ["tag","My tag","tag"]
];
const SMART_FIELD_MAP=Object.fromEntries(SMART_FIELDS.map(f=>[f[0],f]));
const SMART_PRESETS=[
  ["Crafty guards \u2265188cm, 3P>35%", [{f:"pos",op:"is",v:"G"},{f:"height",op:"gte",v:"188"},{f:"tpPct",op:"gte",v:"35"}]],
  ["Tall shooters \u2265195cm, 3P\u226535%", [{f:"height",op:"gte",v:"195"},{f:"tpPct",op:"gte",v:"35"}]],
  ["Rim-running bigs", [{f:"pos",op:"is",v:"C"},{f:"rimfg",op:"gte",v:"60"},{f:"orpg",op:"gte",v:"2"}]],
  ["Young risers 2010+, 15+ pts", [{f:"birthYear",op:"gte",v:"2010"},{f:"ppg",op:"gte",v:"15"}]],
  ["3&D wings", [{f:"pos",op:"is",v:"F"},{f:"tpPct",op:"gte",v:"34"},{f:"stk",op:"gte",v:"1.5"}]],
  ["High-usage creators", [{f:"usg",op:"gte",v:"24"},{f:"astratio",op:"gte",v:"15"}]]
];
function smartFieldVal(p,key,kind){
  if(kind==="pos") return p.pos||"";
  if(kind==="height") return p.height||null;
  if(kind==="year") return p.birthYear||null;
  const v=metric(p,key);
  if(v===-Infinity||v==null||(typeof v==="number"&&isNaN(v))) return null;
  return kind==="pct01" ? v*100 : v;
}
function smartMatch(p,conds){
  if(!conds||!conds.length) return true;
  return conds.every(c=>{
    const fld=SMART_FIELD_MAP[c.f]; if(!fld) return true; const kind=fld[2];
    if(c.op==="is"){ return (p.pos||"")===c.v; }
    if(c.op==="has"){ const tags=(NOTES[p.id]&&NOTES[p.id].tags)||[]; const q=String(c.v||"").toLowerCase().trim(); return q?tags.some(t=>String(t).toLowerCase().includes(q)):true; }
    const val=smartFieldVal(p,c.f,kind); if(val==null) return false;
    const num=parseFloat(c.v); if(isNaN(num)) return true;
    if(c.op==="gte") return val>=num;
    if(c.op==="lte") return val<=num;
    return true;
  });
}
function smartDescribe(conds){
  const sym={gte:"\u2265",lte:"\u2264"};
  return (conds||[]).map(c=>{ const fld=SMART_FIELD_MAP[c.f]; if(!fld) return "";
    if(c.f==="pos") return ({G:"Guards",F:"Forwards",C:"Centers"}[c.v]||("Pos "+c.v));
    if(c.f==="tag") return "tag \u201c"+c.v+"\u201d";
    const suff=fld[2]==="pct01"?"%":(c.f==="height"?" cm":"");
    return fld[1]+" "+(sym[c.op]||c.op)+" "+c.v+suff;
  }).filter(Boolean).join(" \u00b7 ");
}
function sfDefaultOp(kind){ return kind==="pos"?"is":kind==="tag"?"has":"gte"; }
function sfDefaultVal(kind){ return kind==="pos"?"G":kind==="tag"?"":kind==="height"?"190":kind==="year"?"2010":kind==="pct01"?"35":kind==="num100"?"20":"10"; }

function sfOpSel(i,c){ const kind=SMART_FIELD_MAP[c.f][2]; const ops=kind==="pos"?[["is","is"]]:kind==="tag"?[["has","contains"]]:[["gte","\u2265"],["lte","\u2264"]]; return '<select class="sf-sel sf-op" onchange="sfSetOp('+i+',this.value)">'+ops.map(o=>'<option value="'+o[0]+'"'+(o[0]===c.op?" selected":"")+'>'+o[1]+'</option>').join("")+'</select>'; }
function sfValInput(i,c){ const kind=SMART_FIELD_MAP[c.f][2];
  if(kind==="pos"){ return '<select class="sf-sel" onchange="sfSetVal('+i+',this.value)">'+[["G","Guards"],["F","Forwards"],["C","Centers"]].map(o=>'<option value="'+o[0]+'"'+(o[0]===c.v?" selected":"")+'>'+o[1]+'</option>').join("")+'</select>'; }
  if(kind==="tag"){ return '<input class="sf-txt" type="text" value="'+chEsc(String(c.v||""))+'" placeholder="e.g. crafty" oninput="sfSetVal('+i+',this.value)">'; }
  const unit=kind==="pct01"?"%":(c.f==="height"?"cm":"");
  return '<input class="sf-num" type="number" step="any" value="'+chEsc(String(c.v))+'" oninput="sfSetVal('+i+',this.value)">'+(unit?'<span class="sf-unit">'+unit+'</span>':""); }

function pctOf(L,v){ if(!L||!L.n||v==null||!isFinite(v)) return null; let below=0,equal=0; for(const x of L.vals){ if(x<v)below++; else if(x===v)equal++; } return Math.round((below+equal/2)/L.n*100); }
const ADV = [
  ["TS%","ts",    v=>pct(v)],
  ["USG%","usg",  v=>v.toFixed(1)],
  ["A/TO","astto",v=> isFinite(v)?v.toFixed(2):"\u221e"],
  ["P36","p36",   v=>fmt(v)],
  ["STK","stk",   v=>fmt(v)]
];
const LEAGUE_ADV = {};
ADV.forEach(([lab,key])=>{
  const vals = QUALIFIED.map(p=>metric(p,key)).filter(v=>v!=null && isFinite(v)).sort((a,b)=>a-b);
  const n=vals.length;
  LEAGUE_ADV[key]={vals,n,mean:n?vals.reduce((a,b)=>a+b,0)/n:0};
});
const LEAGUE_ADV_POS={};
POS_KEYS.forEach(pos=>{ LEAGUE_ADV_POS[pos]={};
  ADV.forEach(([lab,key])=>{ const vals=QUALIFIED.filter(p=>posOf(p)===pos).map(p=>metric(p,key)).filter(v=>v!=null&&isFinite(v)).sort((a,b)=>a-b); const n=vals.length; LEAGUE_ADV_POS[pos][key]={vals,n,mean:n?vals.reduce((a,b)=>a+b,0)/n:0}; });
});
function leagueAdvFor(key,pos){ return (state.posRel&&pos&&LEAGUE_ADV_POS[pos]&&LEAGUE_ADV_POS[pos][key]&&LEAGUE_ADV_POS[pos][key].n>=5)?LEAGUE_ADV_POS[pos][key]:LEAGUE_ADV[key]; }
function advBars(p){
  const pos=posOf(p);

    let v=metric(p,key); const L=leagueAdvFor(key,pos);
    let pl, disp;
    if(v===Infinity){ pl=100; disp=vfmt(v); }
    else if(v==null || v===-Infinity || isNaN(v)){ pl=null; disp="\u2013"; v=null; }
    else { pl=pctOf(L,v); disp=vfmt(v); }
    const w = pl==null?0:pl;
    const avgPos = (L&&L.n)? pctOf(L,L.mean) : 50;

    return `<div class="bar2">
      <span class="lab">${lab}</span>

  }).join("");

}

/* ---------- shot chart (play-by-play zones) ---------- */
function szFill(m,a){ if(a===0) return '#eae3d6';
  const lp=(x,y,t)=>x+(y-x)*t, p=m/a, t=Math.max(0,Math.min(1,(p-0.20)/0.45)),
    lo=[244,236,224],mid=[201,134,82],hi=[120,66,33]; let c;
  if(t<.5){const u=t/.5;c=[lp(lo[0],mid[0],u),lp(lo[1],mid[1],u),lp(lo[2],mid[2],u)];}
  else{const u=(t-.5)/.5;c=[lp(mid[0],hi[0],u),lp(mid[1],hi[1],u),lp(mid[2],hi[2],u)];}
  return 'rgb('+c.map(Math.round).join(',')+')'; }
function szText(m,a){ if(a===0) return '#9a8f7b'; return (m/a>0.45)?'#fff':'#3a3027'; }
function shotChartSVG(z,g){
  let s='';
  g.zones.forEach(k=>{ const v=z[k]||[0,0]; s+=`<polygon points="${g.poly[k]}" fill="${szFill(v[0],v[1])}" stroke="${g.line}" stroke-width="1.9" stroke-linejoin="round"/>`; });
  s+=g.detail;
  g.zones.forEach(k=>{ const v=z[k]||[0,0],m=v[0],a=v[1],pc=a?Math.round(m/a*100)+'%':'–',ma=a?(m+' – '+a):'';
    if(k==='cornerL'||k==='cornerR'){ const c=g.call[k],col='#3a3027',dot=a?szFill(m,a):g.line;
      s+=`<line x1="${c.lx0}" y1="${c.ty-4}" x2="${c.t[0]}" y2="${c.t[1]}" stroke="${g.line}" stroke-width="1.3"/>`
        +`<circle cx="${c.t[0]}" cy="${c.t[1]}" r="2.2" fill="${dot}"/>`
        +`<text x="${c.tx}" y="${c.ty}" text-anchor="${c.anchor}" font-size="19" font-weight="800" fill="${col}">${pc}</text>`
        +(a?`<text x="${c.tx}" y="${c.ty+13}" text-anchor="${c.anchor}" font-size="11" font-weight="600" fill="${col}" opacity=".92">${ma}</text>`:'');
    } else { const f=g.fs[k],col=szText(m,a),x=g.cen[k][0],y=g.cen[k][1];
      s+=`<text x="${x}" y="${y}" text-anchor="middle" font-size="${f}" font-weight="800" fill="${col}">${pc}</text>`
        +(a?`<text x="${x}" y="${y+f*0.8}" text-anchor="middle" font-size="${(f*0.58).toFixed(1)}" font-weight="600" fill="${col}" opacity=".92">${ma}</text>`:'');
    }});
  return `<svg viewBox="${g.vb}" class="shotsvg" xmlns="http://www.w3.org/2000/svg">${s}</svg>`;
}
function shotChartBlock(p){
  const S=window.SHOTS;
  if(!S||!S.geo) return `<p class="muted-note">Shot-location data isn't loaded.</p>`;
  const z = S.players ? S.players[String(p.pid)] : null;
  let att=0,mk=0; if(z) S.geo.zones.forEach(k=>{ const v=z[k]; if(v){att+=v[1];mk+=v[0];} });
  if(!z||!att) return `<p class="muted-note">No shot-location data for ${p.name} yet — no field-goal attempts recorded in the games parsed so far.</p>`;
  const games=(p.stats&&p.stats.gp)||(S.meta&&S.meta.games)||1;
  return `<div class="shotwrap">${shotChartSVG(z,S.geo)}</div>
    <div class="shotfoot"><span>cold</span><span class="legramp"></span><span>hot · FG%</span><span class="shottot">${mk}/${att} FG · ${games} game${games>1?'s':''}</span></div>`;
}

function toggleMic(fid){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR) return;
  if(_rec && _recField===fid){ try{_rec.stop();}catch(_){} return; }
  if(_rec){ try{_rec.stop();}catch(_){} }
  const ta=$("#"+fid); if(!ta) return;
  const rec=new SR(); _rec=rec; _recField=fid;
  rec.lang=navigator.language||"en-US"; rec.interimResults=true; rec.continuous=true;
  const mark=(on)=>{ const b=document.querySelector('.micbtn[data-mic="'+fid+'"]'); if(b) b.classList.toggle("on",on); const st=$("#micStatus"); if(st) st.textContent=on?"Listening\u2026":""; };
  rec.onresult=e=>{ let fin=""; for(let i=e.resultIndex;i<e.results.length;i++){ const r=e.results[i]; if(r.isFinal) fin+=r[0].transcript; }
    if(fin){ ta.value=(ta.value.replace(/\s*$/,"")+" "+fin.trim()).replace(/^\s+/,""); markDirty(); scheduleSave(); }
    const inter=Array.from(e.results).slice(e.resultIndex).filter(r=>!r.isFinal).map(r=>r[0].transcript).join(""); const st=$("#micStatus"); if(st) st.textContent=inter?("\u2026 "+inter):"Listening\u2026";

function noteCtx(p, arr){

/* ---------- shareable deep links (hash routing) ---------- */
function currentHash(){
  if(activeId) return "#p/"+activeId;
  if(state.view==="stats") return "#stats";
  if(state.view==="charts") return "#charts";
  if(state.view==="bigboard") return "#bigboard";

  if(state.view==="glossary") return "#glossary";
  if(state.filter && state.filter.type==="watch") return "#watchlist";
  if(state.team) return "#t/"+state.team;
  return "";
}
function writeHash(){
  const target=currentHash(), cur=location.hash||"";

function routeTo(h){
  h=h||"";
  const pm=h.match(/^#p\/(.+)$/);
  if(pm){ const id=pm[1]; if(D.players.some(p=>p.id===id)){ if(!activeId) render(); openPlayer(id); return; } }
  if(activeId) closeDrawerSilent();
  state.query=""; const sb=$("#search"); if(sb) sb.value="";
  const tm=h.match(/^#t\/(.+)$/);
  if(h==="#stats"){ state.view="stats"; state.team=null; state.filter=null; }
  else if(h==="#charts"){ state.view="charts"; state.team=null; state.filter=null; }
  else if(h==="#bigboard"){ state.view="bigboard"; state.team=null; state.filter=null; }
  else if(h==="#bracket"){ state.view="bracket"; state.team=null; state.filter=null; }
  else if(h==="#glossary"){ state.view="glossary"; state.team=null; state.filter=null; }
  else if(h==="#watchlist"){ state.view="board"; state.team=null; state.filter={type:"watch",value:"1",label:"Watchlist"}; }
  else if(tm && D.teams.some(t=>t.id===tm[1])){ state.view="board"; state.team=tm[1]; state.filter=null; }
  else { state.view="board"; state.team=null; state.filter=null; }
  render();
}
function applyHash(){ const h=location.hash||""; if(h===currentHash()) return; routeTo(h); }
