<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MT Scouting · U17 World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F4EE; --panel:#FFFFFF; --panel-2:#FBFAF5; --panel-3:#F0ECE3;
  --line:#E7E2D6; --line-soft:#EFEBE1;
  --text:#2F333B; --muted:#747C88; --muted-2:#A0A6B0;
  --clay:#C5824E; --clay-deep:#A96A38; --clay-soft:#F2E4D4;
  --sage:#6FA39B; --good:#6E9F6A; --warn:#C6755B;
  --parch:#FBF4E4; --parch-2:#F5EAD2; --parch-line:#E7DBBE; --ink-note:#4A4234;
  --disp:"Saira Condensed","Oswald",system-ui,sans-serif;
  --body:"IBM Plex Sans",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --r:13px; --maxw:1180px;
  --shadow:0 1px 2px rgba(47,51,59,.04); --shadow-lift:0 10px 28px rgba(47,51,59,.10);
}
html{color-scheme:light}
html[data-theme="dark"]{
  color-scheme:dark;
  --bg:#16181C; --panel:#202329; --panel-2:#1B1E23; --panel-3:#2A2E35;
  --line:#33373F; --line-soft:#2A2E35;
  --text:#E7E4DD; --muted:#9AA1AC; --muted-2:#727A86;
  --clay:#D2925E; --clay-deep:#E1A877; --clay-soft:#37291C;
  --sage:#7FB3AB; --good:#83BA7E; --warn:#DD8C72;
  --parch:#272320; --parch-2:#2F2920; --parch-line:#43392A; --ink-note:#E2D8C5;
  --shadow:0 1px 2px rgba(0,0,0,.45); --shadow-lift:0 12px 30px rgba(0,0,0,.6);
}
html[data-theme="dark"] .team .code{background:#2A2E35;color:#A7AEB9}
html[data-theme="dark"] .dr-head{background:linear-gradient(165deg,#24272E,#1B1E23)}
html[data-theme="dark"] .tags-in:focus{background:var(--panel)}
html[data-theme="dark"] .note-area:focus{background-color:var(--panel)}
html[data-theme="dark"] .card:hover{border-color:#474C56}
html[data-theme="dark"] .bbrow:hover{border-color:#474C56}
html[data-theme="dark"] .gst.live,html[data-theme="dark"] .gst.loss{background:#3A241E}
html[data-theme="dark"] .gst.upcoming{background:#1D2E2B}
.iconbtn{padding:7px 9px}
.themeic{vertical-align:-2px}
.themeic.sun{display:none}
html[data-theme="dark"] .themeic.moon{display:none}
html[data-theme="dark"] .themeic.sun{display:inline}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:
    radial-gradient(1100px 520px at 86% -14%, rgba(197,130,78,.07), transparent 62%),
    var(--bg);
  color:var(--text); font-family:var(--body); font-size:15px; line-height:1.45;
  -webkit-font-smoothing:antialiased; min-height:100vh;
}
button{font-family:inherit; cursor:pointer}
input,textarea{font-family:inherit}
::selection{background:rgba(197,130,78,.22)}

/* top bar */
.top{position:sticky; top:0; z-index:30; background:rgba(246,244,238,.82);
  backdrop-filter:blur(10px); border-bottom:1px solid var(--line)}
.top-in{max-width:var(--maxw); margin:0 auto; padding:14px 20px; display:flex; align-items:center; gap:18px; flex-wrap:wrap}
.brand{display:flex; align-items:center; gap:11px; min-width:0}
.brand .brand-logo{width:32px; height:32px; border-radius:8px; display:block; flex:none}
.brand .mark{font-family:var(--disp); font-weight:800; font-size:26px; letter-spacing:.04em; color:var(--text); line-height:1; white-space:nowrap}
.brand .mark b{color:var(--clay)}
.brand .sub{color:var(--muted); font-size:12px; letter-spacing:.12em; text-transform:uppercase}
.top-meta{margin-left:auto; display:flex; align-items:center; gap:14px}
.evt{display:flex; flex-direction:column; align-items:flex-end; line-height:1.2}
.evt .a{font-family:var(--disp); font-weight:600; font-size:15px; letter-spacing:.05em; text-transform:uppercase}
.evt .b{color:var(--muted-2); font-size:11px; font-family:var(--mono)}

.search{position:relative}
.search input{width:230px; max-width:46vw; background:var(--panel); border:1px solid var(--line);
  color:var(--text); border-radius:999px; padding:9px 14px 9px 34px; font-size:14px; outline:none;
  box-shadow:var(--shadow); transition:border-color .15s, box-shadow .15s}
.search input:focus{border-color:var(--clay); box-shadow:0 0 0 3px rgba(197,130,78,.15)}
.search svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted-2)}

.io{display:flex; gap:8px}
.btn{background:var(--panel); border:1px solid var(--line); color:var(--text); border-radius:9px;
  padding:8px 12px; font-size:13px; font-weight:500; display:inline-flex; align-items:center; gap:7px;
  box-shadow:var(--shadow); transition:background .15s,border-color .15s}
.btn:hover{background:var(--panel-2); border-color:#D9D2C4}
.btn svg{color:var(--muted)}

/* filters */
.wrap{max-width:var(--maxw); margin:0 auto; padding:22px 20px 80px}
.groups{display:flex; gap:22px; flex-wrap:wrap; margin-bottom:8px}
.grp{flex:1 1 200px; min-width:170px}
.grp h3{font-family:var(--disp); font-weight:700; letter-spacing:.14em; font-size:12px; color:var(--muted);
  text-transform:uppercase; margin:0 0 8px; display:flex; align-items:center; gap:8px}
.grp h3::before{content:""; width:18px; height:2px; background:var(--clay); display:inline-block}
.teamrow{display:flex; flex-direction:column; gap:5px}
.team{display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:transparent;
  border:1px solid transparent; color:var(--muted); padding:7px 9px; border-radius:9px; font-size:14px; transition:.13s}
.team:hover{background:var(--panel); color:var(--text); box-shadow:var(--shadow)}
.team.active{background:var(--panel); border-color:var(--clay); color:var(--text); box-shadow:var(--shadow)}
.team .code{font-family:var(--mono); font-size:11px; font-weight:600; color:#5C636E; background:#ECE7DC;
  border-radius:5px; padding:2px 5px; letter-spacing:.02em; min-width:38px; text-align:center}
.team.active .code{background:var(--clay); color:#fff}
.team .nm{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.team .ct{font-family:var(--mono); font-size:11px; color:var(--muted-2)}

.divider{height:1px; background:var(--line-soft); margin:22px 0 18px}

/* section head */
.sechead{display:flex; align-items:flex-end; gap:14px; margin-bottom:16px; flex-wrap:wrap}
.sechead .t{font-family:var(--disp); font-weight:700; font-size:30px; letter-spacing:.02em; line-height:1; color:var(--text)}
.sechead .c{font-family:var(--mono); font-size:11px; color:#fff; background:var(--clay); padding:3px 7px; border-radius:5px; letter-spacing:.03em}
.sechead .meta{color:var(--muted); font-size:13px; margin-left:auto}
.sechead .meta a{color:var(--clay-deep); text-decoration:none}
.sechead .meta a:hover{text-decoration:underline}

/* grid */
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(248px,1fr)); gap:12px}
.card{position:relative; text-align:left; background:var(--panel); border:1px solid var(--line);
  border-radius:var(--r); padding:14px; box-shadow:var(--shadow); transition:.15s; overflow:hidden}
.card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:transparent; transition:.15s}
.card:hover{border-color:#DCD4C5; transform:translateY(-2px); box-shadow:var(--shadow-lift)}
.card:hover::before{background:var(--clay)}
.card-top{display:flex; align-items:flex-start; gap:12px}
.num{font-family:var(--disp); font-weight:800; font-size:40px; line-height:.85; color:var(--text); min-width:46px; letter-spacing:-.01em}
.num .tbd,.dr-num .tbd{color:var(--muted-2); font-weight:600}
.poolnote{font-family:var(--mono); font-size:11px; color:var(--sage); border:1px solid rgba(111,163,155,.45);
  border-radius:5px; padding:2px 7px; margin-left:2px; cursor:help}
.card .pname{font-family:var(--disp); font-weight:600; font-size:19px; letter-spacing:.01em; line-height:1.05}
.card .pmeta{color:var(--muted); font-size:12px; margin-top:3px; font-family:var(--mono)}
.card .pmeta .dot{color:var(--muted-2); padding:0 5px}
.statline{display:flex; gap:0; margin-top:13px; border-top:1px solid var(--line-soft); padding-top:11px}
.statline .s{flex:1; text-align:center; border-right:1px solid var(--line-soft)}
.statline .s:last-child{border-right:0}
.statline .v{font-family:var(--mono); font-weight:600; font-size:16px; color:var(--text)}
.statline .k{font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted-2); margin-top:2px}
.badges{position:absolute; top:12px; right:12px; display:flex; gap:6px; align-items:center}
.notedot{width:9px; height:9px; border-radius:50%; background:var(--sage); box-shadow:0 0 0 3px rgba(111,163,155,.18)}
.rate-chip{font-family:var(--mono); font-size:11px; font-weight:600; color:var(--clay-deep); display:flex; align-items:center; gap:2px}
.sample-tag{font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--warn); border:1px solid var(--warn); border-radius:4px; padding:1px 4px}

.empty{border:1px dashed var(--line); border-radius:var(--r); padding:38px 24px; text-align:center; color:var(--muted); background:var(--panel)}
.empty .big{font-family:var(--disp); font-weight:600; font-size:22px; color:var(--text); margin-bottom:6px}
.empty code{font-family:var(--mono); font-size:12px; background:var(--panel-3); padding:2px 6px; border-radius:5px; color:var(--clay-deep)}

/* drawer */
.scrim{position:fixed; inset:0; background:rgba(60,55,46,.32); opacity:0; pointer-events:none; transition:.2s; z-index:40}
.scrim.on{opacity:1; pointer-events:auto}
.drawer{position:fixed; top:0; right:0; height:100%; width:680px; max-width:96vw; z-index:50;
  background:var(--bg); border-left:1px solid var(--line); transform:translateX(100%);
  transition:transform .26s cubic-bezier(.2,.7,.2,1); display:flex; flex-direction:column;
  box-shadow:-30px 0 60px rgba(47,51,59,.14)}
.drawer.on{transform:translateX(0)}
.dr-scroll{overflow-y:auto; padding:0 0 40px}
.dr-head{position:relative; padding:22px 24px 20px; background:linear-gradient(165deg,#FBF6EE,#FFFFFF); border-bottom:1px solid var(--line)}
.dr-close{position:absolute; top:16px; right:16px; width:34px; height:34px; border-radius:9px;
  background:var(--panel); border:1px solid var(--line); color:var(--muted); display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow)}
.dr-close:hover{color:var(--text); background:var(--panel-2)}
.dr-num-name{display:flex; align-items:center; gap:16px}
.dr-num{font-family:var(--disp); font-weight:800; font-size:66px; line-height:.8; color:var(--clay)}
.dr-name{font-family:var(--disp); font-weight:700; font-size:32px; line-height:1; letter-spacing:.01em; color:var(--text)}
.dr-tags{display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; align-items:center}
.chip{font-family:var(--mono); font-size:12px; color:var(--text); background:var(--panel); border:1px solid var(--line); border-radius:7px; padding:4px 9px}
.chip b{color:var(--clay-deep); font-weight:600}

.dr-sec{padding:20px 24px; border-bottom:1px solid var(--line-soft)}
.dr-sec h4{font-family:var(--disp); font-weight:700; letter-spacing:.14em; font-size:12px; text-transform:uppercase; color:var(--muted); margin:0 0 14px; display:flex; align-items:center; gap:9px}
.dr-sec h4::before{content:""; width:16px; height:2px; background:var(--clay)}
.shotwrap{margin-top:2px}
.shotsvg{display:block;width:100%;max-width:460px;height:auto;margin:0 auto}
.shotsvg text{font-family:var(--disp),'Segoe UI',Arial,sans-serif}
.shotfoot{display:flex;align-items:center;gap:8px;justify-content:center;font-size:11px;color:var(--muted);margin-top:10px;flex-wrap:wrap}
.legramp{height:10px;width:130px;border-radius:6px;background:linear-gradient(90deg,#f4ece0,#c9864e,#784221)}
.shottot{margin-left:auto;font-weight:600;color:var(--text)}
.diet{margin-top:16px}
.diet .dlabel{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted-2);margin-bottom:7px}
.diet .dbar{display:flex;height:15px;border-radius:8px;overflow:hidden;border:1px solid var(--line-soft)}
.diet .seg{height:100%}
.diet .dleg{display:flex;gap:16px;margin-top:8px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.diet .dleg b{color:var(--text)}
.diet .sw{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle}
.icards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.icards .ic{flex:1;min-width:92px;background:var(--panel-2);border:1px solid var(--line-soft);border-radius:10px;padding:11px 12px;text-align:center}
.icards .ic .v{font-family:var(--mono);font-weight:700;font-size:18px;color:var(--text)}
.icards .ic .k{font-size:10px;letter-spacing:.04em;color:var(--muted);margin-top:4px;text-transform:uppercase}
.icards .ic .k .sub{display:block;text-transform:none;letter-spacing:0;color:var(--muted-2);font-size:10px;margin-top:2px}
.anet{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:16px}
.anet .acol{flex:1;min-width:130px}
.al{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted-2);margin-bottom:8px}
.achips{display:flex;flex-wrap:wrap;gap:6px}
.achip{background:var(--clay-soft);color:var(--text);border-radius:999px;padding:4px 10px;font-size:12px}
.achip i{color:var(--clay-deep);font-style:normal;font-weight:700;margin-left:3px}
.lus{margin-top:2px}
.lurow{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line-soft);font-size:13px}
.lurow .lp{flex:1;color:var(--text)}
.lurow .lm{color:var(--muted-2);font-family:var(--mono);font-size:12px;white-space:nowrap}
.lurow .ln{font-family:var(--mono);min-width:62px;text-align:right;white-space:nowrap}
.caveat{margin-top:14px;font-size:11px;color:var(--muted-2);font-style:italic;line-height:1.55}

.avg{display:grid; grid-template-columns:repeat(6,1fr); gap:1px; background:var(--line-soft); border:1px solid var(--line-soft); border-radius:11px; overflow:hidden}
.avg .a{background:var(--panel); padding:11px 6px; text-align:center}
.avg .a .v{font-family:var(--mono); font-weight:600; font-size:19px; color:var(--text)}
.avg .a .k{font-size:9.5px; letter-spacing:.09em; text-transform:uppercase; color:var(--muted-2); margin-top:2px}
.shoot{display:flex; gap:10px; margin-top:10px}
.shoot .a{flex:1; background:var(--panel); border:1px solid var(--line-soft); border-radius:9px; padding:9px; text-align:center}
.shoot .a .v{font-family:var(--mono); font-weight:600; font-size:16px; color:var(--text)}
.shoot .a .k{font-size:10px; letter-spacing:.06em; color:var(--muted-2); margin-top:2px}

.bars{margin-top:16px; display:flex; flex-direction:column; gap:9px}
.bar{display:grid; grid-template-columns:42px 1fr 40px; align-items:center; gap:10px}
.bar .lab{font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted)}
.bar .track{height:7px; background:var(--panel-3); border-radius:99px; overflow:hidden}
.bar .fill{height:100%; background:linear-gradient(90deg,var(--clay-deep),var(--clay)); border-radius:99px}
.bar .val{font-family:var(--mono); font-size:12px; color:var(--text); text-align:right}

.logwrap{overflow-x:auto; margin:0 -4px}
table.log{width:100%; border-collapse:collapse; font-family:var(--mono); font-size:12px}
table.log th{text-align:right; color:var(--muted-2); font-weight:500; font-size:10px; letter-spacing:.04em; text-transform:uppercase; padding:0 6px 8px; border-bottom:1px solid var(--line); white-space:nowrap}
table.log th:first-child,table.log td:first-child{text-align:left}
table.log td{text-align:right; padding:8px 6px; border-bottom:1px solid var(--line-soft); white-space:nowrap; color:var(--text)}
table.log tr:last-child td{border-bottom:0}
table.log .pts{color:var(--clay-deep); font-weight:600}
table.log .res-w{color:var(--good)}
table.log .res-l{color:var(--warn)}

/* notes (parchment) */
.notes{background:var(--parch); color:var(--ink-note); padding:20px 24px 24px; border-top:1px solid var(--parch-line)}
.notes h4{color:#8A754A}
.notes h4::before{background:var(--clay-deep)}
.rate{display:flex; align-items:center; gap:10px; margin-bottom:14px}
.rate .lbl{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#8A754A; font-weight:600}
.stars{display:flex; gap:4px}
.star{width:26px; height:26px; border:0; background:transparent; padding:0; color:#DCCDA9; line-height:0; transition:transform .1s}
.star.on{color:var(--clay-deep)}
.star:hover{transform:scale(1.12)}
.rate .clr{margin-left:4px; font-size:11px; color:#A8946A; background:transparent; border:0; text-decoration:underline; padding:2px}

.tags-in{width:100%; background:rgba(255,255,255,.7); border:1px solid var(--parch-line); color:var(--ink-note); border-radius:9px; padding:9px 11px; font-size:13px; margin-bottom:12px; outline:none}
.tags-in::placeholder{color:#A8946A}
.tags-in:focus{border-color:var(--clay-deep); background:#fff}
.taglist{display:flex; flex-wrap:wrap; gap:6px; margin:-4px 0 12px}
.tg{font-size:11px; font-family:var(--mono); background:rgba(197,130,78,.14); color:#8A5A28; border:1px solid rgba(197,130,78,.32); padding:2px 8px; border-radius:99px; cursor:pointer}

.note-area{width:100%; min-height:150px; resize:vertical; background:rgba(255,255,255,.72); border:1px solid var(--parch-line);
  border-radius:11px; padding:13px 15px; font-size:14.5px; line-height:1.55; color:var(--ink-note); outline:none;
  background-image:repeating-linear-gradient(transparent,transparent 27px,rgba(74,66,52,.08) 28px)}
.note-area:focus{border-color:var(--clay-deep); background-color:#fff}
.note-area::placeholder{color:#A8946A}
.note-foot{display:flex; align-items:center; justify-content:space-between; margin-top:9px; font-size:11px; color:#9A865C}
.authbtn .av{width:18px;height:18px;border-radius:50%;object-fit:cover;margin-right:5px;vertical-align:middle}
.authbtn.in{border-color:var(--clay);color:var(--clay-deep)}
.synchint{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--muted-2);margin:2px 0 10px}
.synchint .dot{width:6px;height:6px;border-radius:50%;background:#C6755B;flex:none}
.synchint.on .dot{background:#5E9E5E}
.saved{display:inline-flex; align-items:center; gap:5px; font-family:var(--mono)}
.saved .d{width:7px; height:7px; border-radius:50%; background:var(--good)}
.saved.dirty .d{background:var(--clay-deep)}

/* toast */
.toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--panel); border:1px solid var(--line); color:var(--text); padding:11px 18px; border-radius:11px;
  font-size:13px; opacity:0; pointer-events:none; transition:.2s; z-index:60; box-shadow:var(--shadow-lift)}
.toast.on{opacity:1; transform:translateX(-50%) translateY(0)}

@media (max-width:640px){
  .sechead .t{font-size:24px}
  .dr-num{font-size:52px} .dr-name{font-size:26px}
  .avg{grid-template-columns:repeat(3,1fr)}
  .top-meta{width:100%; justify-content:space-between}
  .search input{max-width:none; width:100%}
  .search{flex:1}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}

/* brand as button */
button.brand{background:none;border:0;padding:0;cursor:pointer;align-items:center}
button.brand:hover .mark b{color:var(--clay-deep)}

/* avatars */
.avatar{width:46px;height:46px;border-radius:11px;object-fit:cover;object-position:top center;background:var(--panel-3);border:1px solid var(--line);flex:none}
.card-top{align-items:center}
.dr-avatar{width:80px;height:80px;border-radius:16px;object-fit:cover;object-position:top center;background:var(--panel-3);border:1px solid var(--line);flex:none}
.dr-num-name{align-items:center}

/* team panel: standings + results */
.teampanel{display:grid;grid-template-columns:minmax(210px,1fr) minmax(230px,1.3fr);gap:14px;margin-bottom:20px}
@media (max-width:700px){.teampanel{grid-template-columns:1fr}}
.panelcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow)}
.panelcard h5{margin:0 0 10px;font-family:var(--disp);font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px}
.panelcard h5::before{content:"";width:14px;height:2px;background:var(--clay)}
.stand{width:100%;border-collapse:collapse;font-size:13px}
.stand th{font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted-2);font-weight:500;border-bottom:1px solid var(--line-soft);padding:0 6px 6px;text-align:right}
.stand td{padding:6px;text-align:right;border-bottom:1px solid var(--line-soft);font-family:var(--mono)}
.stand tr:last-child td{border-bottom:0}
.stand td:nth-child(2),.stand th:nth-child(2){text-align:left;font-family:var(--body)}
.stand td:first-child{color:var(--muted-2)}
.stand tr.me td{background:var(--clay-soft);color:var(--clay-deep);font-weight:600}
.gamerow{display:flex;align-items:center;gap:10px;padding:9px 6px;border-bottom:1px solid var(--line-soft);text-decoration:none;color:var(--text);border-radius:7px;transition:background .12s}
.gamerow:last-child{border-bottom:0}
.gamerow:hover{background:var(--clay-soft)}
.gamerow .gdate{font-family:var(--mono);font-size:11px;color:var(--muted-2);min-width:40px}
.gamerow .opp{flex:1;min-width:0;font-size:14px}
.gamerow .opp b{font-family:var(--disp);font-weight:600;font-size:15px}
.gamerow .glink{font-size:11px;color:var(--clay);opacity:0;transition:opacity .12s}
.gamerow:hover .glink{opacity:1}
.cd{font-family:var(--mono);font-size:11px;color:var(--muted-2)}
.sc{font-family:var(--mono);font-weight:600;font-size:14px;color:var(--text)}
.gst{font-size:9px;letter-spacing:.07em;text-transform:uppercase;padding:2px 6px;border-radius:5px;font-weight:700}
.gst.final{background:var(--panel-3);color:var(--muted)}
.gst.live{background:#FBE7DF;color:var(--warn)}
.gst.upcoming{background:#E7F0EE;color:var(--sage)}
.gst.win{background:rgba(110,159,106,.18);color:var(--good)}
.gst.loss{background:#FBE7DF;color:var(--warn)}
.muted-note{color:var(--muted);font-size:13px;margin:0}
.home-note{color:var(--muted);font-size:13px;margin:0 0 14px;font-family:var(--mono)}
.home-results{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:12px}
.gamecard .gc-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.gamecard .gc-teams{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px;font-family:var(--disp);font-size:16px}
.win-name{font-weight:700;color:var(--text)}
.lose-name{font-weight:500;color:var(--muted)}
a.gamecard{text-decoration:none;color:inherit;display:block;transition:border-color .12s,transform .12s}
a.gamecard:hover{border-color:var(--clay);transform:translateY(-1px)}
.day-block{margin-bottom:18px}
.day-label{font-family:var(--disp);font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:12px;color:var(--muted);margin:0 0 10px;display:flex;align-items:center;gap:9px}
.day-label::before{content:"";width:16px;height:2px;background:var(--clay)}
a.logopp{text-decoration:none}
a.logopp:hover{text-decoration:underline}

/* stats button active + sortable stats table */
.btn.on{background:var(--clay);border-color:var(--clay);color:#fff}
.btn.on svg{stroke:#fff}
.statswrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:var(--panel)}
.statstable{width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap}
.statstable thead th{position:sticky;top:0;background:var(--panel);z-index:2;font-family:var(--disp);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;text-align:right;padding:12px 10px;border-bottom:2px solid var(--line)}
.statstable th.sortable{cursor:pointer;user-select:none;transition:color .12s}
.statstable th.sortable:hover,.statstable th.sortable.on{color:var(--clay-deep)}
.statstable th.rk{text-align:right;width:34px;color:var(--muted-2)}
.statstable th.pl{text-align:left;min-width:160px}
.sortar{font-size:8px;margin-left:3px;vertical-align:middle}
.statstable td{text-align:right;padding:9px 10px;border-bottom:1px solid var(--line-soft);font-family:var(--mono);color:var(--text)}
.statstable tbody tr:last-child td{border-bottom:0}
.statstable td.rk{color:var(--muted-2);font-size:12px}
.statstable td.pl{text-align:left;font-family:var(--body);font-weight:500}
.statstable td.pl .snum{font-family:var(--mono);font-size:11px;color:var(--muted-2);margin-right:4px}
.statstable td.tm{text-align:left;font-family:var(--mono);font-size:11px;color:var(--muted)}
.statstable td.hi{color:var(--clay-deep);font-weight:700;background:var(--clay-soft)}
.statstable tbody tr{cursor:pointer;transition:background .1s}
.statstable tbody tr:hover td{background:var(--clay-soft)}
.statstable tbody tr:hover td.hi{background:var(--clay);color:#fff}
.statsubtabs{display:inline-flex;gap:4px;background:var(--panel-3);border:1px solid var(--line);border-radius:9px;padding:3px;margin-bottom:14px}
.statsubtabs .subtab{font-family:var(--disp);font-size:12px;font-weight:600;letter-spacing:.03em;color:var(--muted);background:none;border:0;border-radius:6px;padding:6px 15px;cursor:pointer;transition:.12s}
.statsubtabs .subtab:hover{color:var(--clay-deep)}
.statsubtabs .subtab.on{background:var(--panel);color:var(--clay-deep);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.adv-note{margin-top:12px;font-size:11px;line-height:1.55;max-width:760px}

/* clickable filter chips */
.chip-btn{cursor:pointer;font-family:var(--mono);font-size:12px;color:var(--text);background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:4px 9px;transition:.12s;line-height:1.3}
.chip-btn:hover{border-color:var(--clay);background:var(--clay-soft);color:var(--clay-deep)}
.chip-btn b{color:var(--clay-deep);font-weight:600}

/* percentile + average bars */
.bar2{display:grid;grid-template-columns:38px 1fr 38px 30px;align-items:center;gap:10px}
.bar2 .lab{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.track2{position:relative;height:8px;background:var(--panel-3);border-radius:99px}
.fill2{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--clay-deep),var(--clay));border-radius:99px}
.avgmark{position:absolute;top:-3px;width:2px;height:14px;background:var(--text);opacity:.5;transform:translateX(-1px);border-radius:1px}
.bar2 .val2{font-family:var(--mono);font-size:12px;color:var(--text);text-align:right}
.pctl{font-family:var(--mono);font-size:11px;font-weight:700;color:#fff;text-align:center;border-radius:6px;padding:2px 0;min-width:26px}
.barkey{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:10px;color:var(--muted-2);flex-wrap:wrap}
.chartwrap{padding:2px 0 8px}
.chartctrls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.chartctrls .chf{display:flex;flex-direction:column;gap:4px;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.chartctrls select{font-family:var(--body);font-size:13px;color:var(--text);background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:7px 9px;cursor:pointer;min-width:124px;text-transform:none;letter-spacing:0}
.scatter{width:100%;height:auto;display:block;background:var(--panel);border:1px solid var(--line-soft);border-radius:12px;padding:4px}
.scatter .cg{stroke:var(--line-soft);stroke-width:1}
.scatter .cmean{stroke:var(--muted-2);stroke-width:1.4;stroke-dasharray:5 4;opacity:.85}
.scatter .cax{fill:var(--muted-2);font-family:var(--mono);font-size:10px}
.scatter .cttl{fill:var(--muted);font-family:var(--disp);font-size:13px;font-weight:600;letter-spacing:.04em}
.scatter .cdot{stroke:#fff;stroke-width:1.4;cursor:pointer;transition:r .08s}
.scatter .cdot:hover{stroke:var(--text)}
.chleg{display:flex;flex-wrap:wrap;gap:9px 14px;margin-top:12px}
.chleg .chl{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.chleg .sw{width:10px;height:10px;border-radius:50%}
.chartnote{margin-top:10px;font-size:11px;color:var(--muted-2);line-height:1.5}
.ctip{position:fixed;z-index:60;pointer-events:none;background:var(--text);color:#fff;font-size:11.5px;line-height:1.45;padding:6px 9px;border-radius:7px;box-shadow:0 4px 14px rgba(0,0,0,.18);max-width:210px}
.chartmodes{margin-bottom:16px}
.radarwrap{display:flex;justify-content:center;padding:4px 0 0}
.radar{width:100%;max-width:380px;height:auto}
.radar .rgrid{fill:none;stroke:var(--line-soft);stroke-width:1}
.radar .rspoke{stroke:var(--line-soft);stroke-width:1}
.radar .ravg{fill:none;stroke:var(--muted);stroke-width:2;stroke-dasharray:5 4}
.radar .ravgt{fill:var(--muted);font-family:var(--body);font-size:10px}
.radar .rlab{fill:var(--muted);font-family:var(--disp);font-size:12.5px;font-weight:600}
.radar .rpoly{stroke-width:2;stroke-linejoin:round}
.radarnote{text-align:center;font-size:11px;color:var(--muted-2);margin-top:2px}
.rleg{display:flex;justify-content:center;flex-wrap:wrap;gap:8px 18px;margin-top:6px}
.rleg .rl{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text)}
.rleg .sw{width:11px;height:11px;border-radius:3px}
.lblist{display:flex;flex-direction:column;gap:2px}
.lbrow{display:grid;grid-template-columns:26px 1fr auto;align-items:center;gap:11px;padding:6px 8px;border-radius:9px;cursor:pointer;transition:background .1s}
.lbrow:hover{background:var(--panel-2)}
.lbrk{font-family:var(--mono);font-size:11px;color:var(--muted-2);text-align:right}
.lbmid{min-width:0}
.lbnm{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lbnm .tm{color:var(--muted);font-size:11px;margin-left:6px;font-family:var(--mono)}
.lbbar{display:block;height:7px;border-radius:4px;margin-top:5px;min-width:3px}
.lbval{font-family:var(--disp);font-weight:700;font-size:14.5px;color:var(--text);min-width:50px;text-align:right;font-variant-numeric:tabular-nums}
.lbdir{padding:7px 11px;font-size:12px}
.cmpsel{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:6px}
.cmpsel .chf{flex:1;min-width:150px}
.cmptbl{width:100%;border-collapse:collapse;margin-top:12px}
.cmptbl th,.cmptbl td{padding:7px 8px;border-bottom:1px solid var(--line-soft)}
.cmptbl .nm{font-family:var(--disp);font-weight:700;font-size:14px;text-align:center}
.cmptbl .lbl{color:var(--muted);text-align:center;width:78px;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.cmptbl td.v{text-align:center;font-size:14px;font-variant-numeric:tabular-nums;color:var(--text)}
.cmptbl td.win{color:var(--clay-deep);font-weight:700;background:var(--clay-soft)}
.card{position:relative}
.watchtoggle{position:absolute;top:9px;right:9px;width:27px;height:27px;display:flex;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;color:var(--muted-2);transition:.12s;z-index:3}
.watchtoggle:hover{background:var(--clay-soft);color:var(--clay-deep)}
.watchtoggle.on{color:var(--clay-deep)}
.wl-count{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 4px;margin-left:6px;border-radius:9px;background:var(--clay);color:#fff;font-family:var(--mono);font-size:10.5px;font-weight:600}
.scoutbar{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
.scoutchip{font-family:var(--disp);font-size:12.5px;font-weight:600;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:6px 12px;cursor:pointer;transition:.12s}
.scoutchip:hover{border-color:var(--clay);color:var(--clay-deep)}
.scoutchip.on{background:var(--clay);border-color:var(--clay);color:#fff}
.dr-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.dr-act{display:inline-flex;align-items:center;gap:6px;font-family:var(--disp);font-size:12.5px;font-weight:600;color:var(--text);background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:7px 13px;cursor:pointer;transition:.12s}
.dr-act:hover{border-color:var(--clay);color:var(--clay-deep);background:var(--clay-soft)}
.dr-act.on{border-color:var(--clay);color:var(--clay-deep);background:var(--clay-soft)}
.dr-act svg{width:15px;height:15px}
#printsheet{display:none}
@media print{
  body.printing > *{display:none !important}
  html,body{background:#fff !important; color-scheme:light !important}
  body.printing #printsheet{display:block !important; background:#fff !important;
    --bg:#F6F4EE;--panel:#FFFFFF;--panel-2:#FBFAF5;--panel-3:#F0ECE3;--line:#E7E2D6;--line-soft:#EFEBE1;--text:#2F333B;--muted:#747C88;--muted-2:#A0A6B0;--clay:#C5824E;--clay-deep:#A96A38;--clay-soft:#F2E4D4;--sage:#6FA39B;--good:#6E9F6A;--warn:#C6755B}
  body.printing #printsheet .op{break-after:page;page-break-after:always;max-width:none;margin:0;padding:12mm;box-sizing:border-box;background:#fff !important;color:#1c1f24 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body.printing #printsheet .op:last-child{break-after:auto;page-break-after:auto}
  @page{margin:0}
}
.op{font-family:var(--body);color:#1c1f24;background:#fff;max-width:760px;margin:0 auto;padding:6px}

.op-tags{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0}
.op-tag{background:#F2E4D4;color:#A96A38;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600}
.op-notes{font-size:12.5px;line-height:1.55;color:#333;margin-top:8px}
.op-foot{margin-top:18px;font-size:10px;color:#aaa;text-align:center}
.qfbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:18px}
.qfbar .qfl{font-family:var(--disp);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-right:2px}
.recpill{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--muted);background:var(--panel-3);border-radius:6px;padding:1px 7px;margin-left:6px;vertical-align:middle}
.tprofile{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:6px}

.lutable{margin-top:4px}

.barpane .bars{margin-top:10px}
.barpane.bp-hide{display:none}
.barkey .mk{width:2px;height:11px;background:var(--text);opacity:.5;display:inline-block}
.barkey .sw{width:11px;height:11px;border-radius:3px;display:inline-block}
.bbhead{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.bbcount{font-family:var(--mono);font-size:12px;color:var(--muted)}
.bbhead .btn{margin-left:auto}
.bblist{display:flex;flex-direction:column;gap:8px}
.bbrow{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 14px;box-shadow:var(--shadow);cursor:pointer;transition:border-color .12s,box-shadow .12s}
.bbrow:hover{border-color:#DCD4C5}
.bbrow.bbdragging{opacity:.45}
.bbrow.bbover{border-color:var(--clay);box-shadow:0 0 0 2px rgba(197,130,78,.2)}
.bbrk{font-family:var(--disp);font-weight:800;font-size:22px;color:var(--clay);min-width:28px;text-align:center;flex:none}
.bbgrip{color:var(--muted-2);cursor:grab;font-size:13px;letter-spacing:-3px;user-select:none;flex:none}
.bbav{width:38px;height:38px;border-radius:9px;object-fit:cover;object-position:top center;background:var(--panel-3);border:1px solid var(--line);flex:none}
.bbmain{flex:1;min-width:0}
.bbnm{font-family:var(--disp);font-weight:600;font-size:17px;color:var(--text);display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;line-height:1.15}
.bbtm{font-family:var(--mono);font-size:11px;color:var(--muted);font-weight:400}
.bbstat{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bbstars{color:var(--clay-deep);font-family:var(--body);letter-spacing:1px}
.bbmove{display:flex;flex-direction:column;gap:3px;flex:none}
.bbbtn{width:26px;height:18px;line-height:1;border:1px solid var(--line);background:var(--panel-2);color:var(--muted);border-radius:6px;font-size:8px;padding:0;display:flex;align-items:center;justify-content:center}
.bbbtn:hover{border-color:var(--clay);color:var(--clay-deep)}
.bbrm{width:28px;height:28px;border:1px solid var(--line);background:var(--panel);color:var(--muted-2);border-radius:8px;font-size:12px;padding:0;flex:none}
.bbrm:hover{border-color:var(--warn);color:var(--warn)}
@media (max-width:560px){ .bbstat{white-space:normal} .bbav{display:none} }
.cbx{position:relative;min-width:160px}
.cbx-in{font-family:var(--body);font-size:13px;color:var(--text);background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:7px 9px;width:100%;text-transform:none;letter-spacing:0}
.cbx-in:focus{outline:none;border-color:var(--clay)}
.cbx.open .cbx-in{border-color:var(--clay)}
.cbx-pop{position:absolute;z-index:50;left:0;right:0;top:calc(100% + 4px);max-height:300px;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow-lift);padding:4px}
.cbx-opt{display:flex;align-items:baseline;justify-content:space-between;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text);white-space:nowrap}
.cbx-opt .cbx-tm{color:var(--muted);font-family:var(--mono);font-size:11px;flex:none}
.cbx-opt.active,.cbx-opt:hover{background:var(--panel-3)}
.cbx-opt.sel{color:var(--clay-deep);font-weight:600}
.cbx-opt[hidden]{display:none}
.notegrid{display:flex;flex-direction:column}
.nlab{font-family:var(--disp);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--clay-deep);margin:11px 0 5px}
.note-area.na-s{min-height:74px;margin-bottom:0;background-image:none}
.roles{margin:0 0 12px;border:1px solid var(--parch-line);border-radius:10px;background:rgba(255,255,255,.35);overflow:hidden}
html[data-theme="dark"] .roles{background:rgba(255,255,255,.04)}
.roleshd{width:100%;text-align:left;background:none;border:0;font-family:var(--disp);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-note);padding:9px 11px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.rolesarrow{transition:transform .15s;font-size:10px;color:var(--muted)}
.roles.open .rolesarrow{transform:rotate(180deg)}
.rolesbody{display:none;padding:0 11px 9px}
.roles.open .rolesbody{display:block}
.rolegrp{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-top:1px solid var(--parch-line)}
.rolelab{flex:none;width:60px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding-top:6px}
.rolewrap{display:flex;flex-wrap:wrap;gap:5px}
.rolechip{font-family:var(--body);font-size:11.5px;color:var(--ink-note);background:rgba(255,255,255,.55);border:1px solid var(--parch-line);border-radius:7px;padding:3px 9px;cursor:pointer;transition:.12s}
html[data-theme="dark"] .rolechip{background:rgba(255,255,255,.05);color:var(--text)}
.rolechip:hover{border-color:var(--clay)}
.rolechip.on{background:var(--clay);border-color:var(--clay);color:#fff}
html[data-theme="dark"] .tags-in,html[data-theme="dark"] .note-area{background:rgba(255,255,255,.04);color:var(--ink-note)}
html[data-theme="dark"] .note-area{background-image:repeating-linear-gradient(transparent,transparent 27px,rgba(255,255,255,.06) 28px)}
html[data-theme="dark"] .tags-in:focus,html[data-theme="dark"] .note-area:focus{background-color:rgba(255,255,255,.07)}
html[data-theme="dark"] .tg{color:#E3C7A0}
.op-nrow{margin-top:7px}
.op-nk{font-family:var(--disp);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#999;display:block;margin-bottom:1px}
.op-nv{font-size:12px;line-height:1.5;color:#333}

<script>
const D = window.HOOPDATA || {event:{},groups:{},teams:[],players:[]};
const NOTE_KEY = "hoopscout:notes:v1";
const $ = (s,r=document)=>r.querySelector(s);

/* ---------- notes store ---------- */
function migrateNote(n){ if(n && n.text && n.text.trim() && !n.nAth && !n.nOff && !n.nDef){ n.nOff=n.text; delete n.text; } return n; }
function loadNotes(){ try{ const o=JSON.parse(localStorage.getItem(NOTE_KEY))||{}; for(const id in o){ if(id!=="__board") migrateNote(o[id]); } return o; }catch{return{}} }
function saveNotes(n){ try{localStorage.setItem(NOTE_KEY,JSON.stringify(n))}catch{toast("Couldn't save — storage blocked")} }
let NOTES = loadNotes();
let cloudUser=null;
function noteFor(id){ return NOTES[id] || {rating:0,tags:[],nAth:"",nOff:"",nDef:""} }

/* ---------- helpers ---------- */
const teamById = id => D.teams.find(t=>t.id===id) || {name:"?",code:"?"};
const fmt = (v,d=1)=> (v==null||isNaN(v)) ? "–" : Number(v).toFixed(d);
const pct = v => (v==null||isNaN(v)) ? "–" : (Number(v)*100).toFixed(1)+"%";
function hasContent(n){ return !!(n && ((n.nAth&&n.nAth.trim()) || (n.nOff&&n.nOff.trim()) || (n.nDef&&n.nDef.trim()) || (n.text&&n.text.trim()) || n.rating>0 || (n.tags&&n.tags.length))) }

/* ---------- images / games / standings ---------- */
const IMG = pid => pid ? `https://assets.fiba.basketball/image/upload/c_fill,g_face,w_200,h_200/q_auto/f_auto/.headshot--person_${pid}--competition_208545` : "";
const avatarHTML = (p,cls)=>{ const u=IMG(p.pid); return u?`<img class="${cls}" loading="lazy" src="${u}" alt="" onerror="this.remove()">`:""; };
const codeToTeam = code => D.teams.find(t=>t.code===code);

const GAME_BASE = (D.event && D.event.url ? D.event.url : "") + "/games/";
function gameUrl(g){ return GAME_BASE + g.id + "-" + g.a + "-" + g.b; }
const MON3=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtDate(iso){ const p=String(iso||"").split("-"); return p.length<3 ? (iso||"") : (+p[2])+" "+MON3[(+p[1])-1]; }
function gameTime(g){
  if(!g || !g.time) return "Scheduled";
  const d=new Date(g.time); if(isNaN(d)) return "Scheduled";
  try{ return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}); }catch(e){ return "Scheduled"; }
}

function standings(group, meId){
  const ts=(D.groups[group]||[]).map(teamById).filter(t=>t.record)
    .sort((a,b)=> b.record.pts-a.record.pts || (b.record.diff||0)-(a.record.diff||0) || (b.record.w-a.record.w));
  if(!ts.length) return "";
  const rows=ts.map((t,i)=>`<tr class="${t.id===meId?'me':''}"><td>${i+1}</td><td>${t.name}</td><td>${t.record.w}-${t.record.l}</td><td>${t.record.pts}</td></tr>`).join("");
  return `<table class="stand"><thead><tr><th>#</th><th>Team</th><th>W-L</th><th>Pts</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function teamGames(teamId){
  const t=teamById(teamId);
  const gs=(D.games||[]).filter(g=>g.a===t.code||g.b===t.code).slice().sort((x,y)=>(x.date||"").localeCompare(y.date||""));
  if(!gs.length) return `<p class="muted-note">No games scheduled yet.</p>`;
  return gs.map(g=>{
    const home=g.a===t.code, oppCode=home?g.b:g.a, opp=codeToTeam(oppCode);
    const us=home?g.sa:g.sb, them=home?g.sb:g.sa;
    let right;
    if(g.status==='final'){ const win=us>them; right=`<span class="gst ${win?'win':'loss'}">${win?'W':'L'}</span><span class="sc">${us}–${them}</span>`; }
    else right=`<span class="gst upcoming">${gameTime(g)}</span>`;
    return `<a class="gamerow" href="${gameUrl(g)}" target="_blank" rel="noopener" title="Open full game stats on FIBA ↗"><span class="gdate">${fmtDate(g.date)}</span><span class="opp"><span class="cd">vs</span> <b>${opp?opp.name:oppCode}</b></span>${right}<span class="glink">↗</span></a>`;
  }).join("");
}
function teamPanel(teamId){
  const t=teamById(teamId);
  return `<div class="teampanel">
    ${teamProfile(teamId)}
    <div class="panelcard"><h5>Group ${t.group} standings</h5>${standings(t.group,teamId)||'<p class="muted-note">No standings yet.</p>'}</div>
    ${teamLineups(teamId)}
    <div class="panelcard"><h5>${t.name} \u00b7 results</h5>${teamGames(teamId)}</div>
  </div>`;
}
/* ---------- tournament rankings ---------- */
function teamStatVals(t){
  const G=(t.record&&(t.record.w+t.record.l))||0; if(!G||!t.record) return null;
  let a={fgm:0,fga:0,tpm:0,tpa:0,fta:0,ast:0,tov:0,pts:0};
  D.players.filter(p=>p.teamId===t.id&&p.stats&&p.stats.gp).forEach(p=>{ const s=p.stats,g=s.gp;
    a.fgm+=(s.fgm||0)*g; a.fga+=(s.fga||0)*g; a.tpm+=(s.tpm||0)*g; a.tpa+=(s.tpa||0)*g; a.fta+=(s.fta||0)*g; a.ast+=(s.apg||0)*g; a.tov+=(s.tpg||0)*g; a.pts+=(s.ppg||0)*g; });
  return { pf:t.record.pf/G, pa:(t.record.pf-t.record.diff)/G, nd:t.record.diff/G,
    efg:a.fga?(a.fgm+0.5*a.tpm)/a.fga:null, ts:(a.fga||a.fta)?a.pts/(2*(a.fga+0.44*a.fta)):null,
    tr:a.fga?a.tpa/a.fga:null, ftr:a.fga?a.fta/a.fga:null, astto:a.tov?a.ast/a.tov:null };
}
const TEAM_RANK_DIR={pf:1,pa:-1,nd:1,efg:1,ts:1,tr:1,ftr:1,astto:1};
let _teamRankCache=null;
function teamRanks(){
  if(_teamRankCache) return _teamRankCache;
  const teams=(D.teams||[]).map(t=>({id:t.id,v:teamStatVals(t)})).filter(x=>x.v);

function playerRanks(){

  else if(_playerRankCache) return _playerRankCache;
  const qual=D.players.filter(p=>p.stats&&p.stats.gp>0);
  const out={}; qual.forEach(p=>out[p.id]={});
  PLAYER_RANK_DEFS.forEach(def=>{ const key=def[0],vf=def[1],dir=def[2],qf=def[3];
    let groups;
    if(state.posRel){ groups={}; qual.forEach(p=>{ const g=posOf(p); (groups[g]=groups[g]||[]).push(p); }); }

      const arr=groups[gk].filter(p=>{ const s=p.stats; if(!qf(p,s)) return false; const v=vf(p,s); return v!=null&&isFinite(v); })
        .map(p=>({p,v:vf(p,p.stats)})).sort((a,b)=> dir>0 ? b.v-a.v : a.v-b.v);
      arr.forEach((x,i)=>{ out[x.p.id][key]={rank:i+1,n:arr.length}; });

let state = { team:null, query:"", filter:null, view:"board", statsTab:"basic", sortKey:"ppg", sortDir:"desc", chartX:"usg", chartY:"ts", chartColor:"pos", chartGroup:"all", chartMode:"scatter", lbStat:"ppg", lbN:15, lbDir:"desc", cmpA:null, cmpB:null, histStat:"ppg", histPlayer:null, posRel:false };

/* ---------- tournament averages & percentiles ---------- */
const QUALIFIED = (D.players||[]).filter(p=>p.stats && p.stats.gp>0);
const LEAGUE = {};
["ppg","rpg","apg","spg","bpg","mpg"].forEach(k=>{
  const vals = QUALIFIED.map(p=>p.stats[k]).filter(v=>v!=null && !isNaN(v)).sort((a,b)=>a-b);
  const n = vals.length;
  LEAGUE[k] = { vals, n, mean: n?vals.reduce((a,b)=>a+b,0)/n:0, max: n?vals[n-1]:0 };
});
const POS_KEYS=["G","F","C"];
function posOf(p){ return (p&&p.pos?String(p.pos).charAt(0).toUpperCase():"")||"?"; }
function posName(pos){ return {G:"guards",F:"forwards",C:"centers"}[pos]||"players"; }
const LEAGUE_POS={};
POS_KEYS.forEach(pos=>{ LEAGUE_POS[pos]={};
  ["ppg","rpg","apg","spg","bpg","mpg"].forEach(k=>{
    const vals=QUALIFIED.filter(p=>posOf(p)===pos).map(p=>p.stats[k]).filter(v=>v!=null&&!isNaN(v)).sort((a,b)=>a-b);
    const n=vals.length; LEAGUE_POS[pos][k]={vals,n,mean:n?vals.reduce((a,b)=>a+b,0)/n:0,max:n?vals[n-1]:0};
  });
});
function leagueFor(key,pos){ return (state.posRel&&pos&&LEAGUE_POS[pos]&&LEAGUE_POS[pos][key]&&LEAGUE_POS[pos][key].n>=5)?LEAGUE_POS[pos][key]:LEAGUE[key]; }
function percentile(key,v,pos){
  const L=leagueFor(key,pos); if(!L||!L.n||v==null||isNaN(v)) return null;
  let below=0, equal=0;
  for(const x of L.vals){ if(x<v) below++; else if(x===v) equal++; }
  return Math.round((below + equal/2) / L.n * 100);
}

function rankColor(rank,n){ if(rank==null||!n||n<=1) return "#747C88";
  const P=(n-rank)/(n-1)*100;
  if(P>=97) return "#3C7A3C"; if(P>=90) return "#927714"; if(P<3) return "#B5302A"; if(P<=10) return "#B5651D"; return "#747C88"; }
function ordinal(n){ const s=["th","st","nd","rd"], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }

/* ---------- play-by-play advanced: usage + shot diet ---------- */
const TEAMAGG = {};
(D.players||[]).forEach(p=>{ const s=p.stats; if(!s||!s.gp) return; const t=p.teamId;
  const a=TEAMAGG[t]||(TEAMAGG[t]={fga:0,fta:0,tov:0,mp:0});
  a.fga+=(s.fga||0)*s.gp; a.fta+=(s.fta||0)*s.gp; a.tov+=(s.tpg||0)*s.gp; a.mp+=(s.mpg||0)*s.gp;
});
function usgVal(p){ const s=p.stats||{}; const gp=s.gp||0; if(!gp||!s.mpg) return null;
  const T=TEAMAGG[p.teamId]; if(!T) return null; const pMP=s.mpg*gp; if(pMP<20) return null;
  const den=pMP*(T.fga+0.44*T.fta+T.tov); if(den<=0) return null;
  return 100*((s.fga||0)*gp+0.44*(s.fta||0)*gp+(s.tpg||0)*gp)*(T.mp/5)/den;
}
function shotDiet(p){ const S=window.SHOTS; if(!S||!S.players) return null;
  const z=S.players[String(p.pid)]; if(!z) return null;
  const a=k=>z[k]?z[k][1]:0, m=k=>z[k]?z[k][0]:0;
  const rimA=a('rim'), midA=a('midLeft')+a('midCenter')+a('midRight'),
        threeA=a('cornerL')+a('cornerR')+a('wingL')+a('wingR')+a('top');
  const rimM=m('rim'), midM=m('midLeft')+m('midCenter')+m('midRight'),
        threeM=m('cornerL')+m('cornerR')+m('wingL')+m('wingR')+m('top');
  const tot=rimA+midA+threeA; if(tot<1) return null;
  return {rimA,midA,threeA,tot,rimM,midM,threeM};
}

  return `<div class="diet"><div class="dlabel">Shot diet · ${d.tot} FGA</div>
    <div class="dbar"><div class="seg" style="width:${d.rimA/d.tot*100}%;background:#A96A38"></div><div class="seg" style="width:${d.midA/d.tot*100}%;background:#D9B38C"></div><div class="seg" style="width:${d.threeA/d.tot*100}%;background:#6FA39B"></div></div>
    <div class="dleg"><span><span class="sw" style="background:#A96A38"></span>Rim <b>${pf(d.rimA)}%</b> · ${fg(d.rimM,d.rimA)}</span><span><span class="sw" style="background:#D9B38C"></span>Mid <b>${pf(d.midA)}%</b> · ${fg(d.midM,d.midA)}</span><span><span class="sw" style="background:#6FA39B"></span>Three <b>${pf(d.threeA)}%</b> · ${fg(d.threeM,d.threeA)}</span></div></div>`;
}

function matchesFilter(p,f){
  if(f.type==="group") return teamById(p.teamId).group===f.value;
  if(f.type==="pos")   return (p.pos||"")===f.value;
  if(f.type==="birthYear") return String(p.birthYear)===f.value;
  if(f.type==="young") return (p.birthYear||0)>=2010;
  if(f.type==="club")  return (p.club||"")===f.value;
  if(f.type==="watch"){ const nn=NOTES[p.id]; return !!(nn&&nn.watch); }
  if(f.type==="r4"){ const nn=NOTES[p.id]; return !!(nn&&nn.rating>=4); }
  if(f.type==="r3"){ const nn=NOTES[p.id]; return !!(nn&&nn.rating>=3); }
  if(f.type==="tagged"){ const nn=NOTES[p.id]; return !!(nn&&nn.tags&&nn.tags.length); }
  if(f.type==="untagged"){ const nn=NOTES[p.id]; return !!(nn&&(nn.watch||nn.rating>0||(nn.text&&nn.text.trim()))&&!(nn.tags&&nn.tags.length)); }
  if(f.type==="notes"){ const nn=NOTES[p.id]; return !!(nn&&nn.text&&nn.text.trim()); }
  if(f.type==="unseen"){ const nn=NOTES[p.id]; return !hasContent(nn) && !(nn&&nn.watch); }
  return false;
}

function totByLog(p,k){ const g=p.gamelog||[]; if(g.length){ let s=0; for(const x of g) s+=(x[k]||0); return s; }

function sortedPlayers(){
  const key=state.sortKey||"ppg", dir=state.sortDir||"desc";

            : key==="team" ? teamById(p.teamId).name.toLowerCase()
            : key==="pos"  ? (p.pos||"")
            : metric(p,key);
  list.sort((a,b)=>{
    const x=val(a), y=val(b);
    if(typeof x==="string"){ return dir==="asc" ? x.localeCompare(y) : y.localeCompare(x); }
    if(x===y) return 0;
    return dir==="asc" ? (x-y) : (y-x);

const TEAM_PAL=["#C5824E","#4F86C6","#5E9E5E","#9B6FB0","#C6755B","#C99A3C","#5BA7A0","#B0556F","#7A86C0","#6FA35E","#CB8A3A","#8E7CC3","#D08C6A","#5E9E8C","#A86AA0","#6E94B8"];
function chColor(p){ const mode=state.chartColor;
  if(mode==="pos") return POS_COL[(p.pos||"").charAt(0)]||"#A0A6B0";
  if(mode==="group"){ const g=teamById(p.teamId).group; return GRP_COL[g]||"#A0A6B0"; }
  const idx=D.teams.findIndex(t=>t.id===p.teamId); return TEAM_PAL[((idx%TEAM_PAL.length)+TEAM_PAL.length)%TEAM_PAL.length]||"#A0A6B0"; }
function chLegend(){ const mode=state.chartColor; let items;
  if(mode==="pos") items=[["Guards",POS_COL.G],["Forwards",POS_COL.F],["Centers",POS_COL.C]];
  else if(mode==="group") items=["A","B","C","D"].map(g=>["Group "+g,GRP_COL[g]]);
  else items=D.teams.map((t,i)=>[t.code,TEAM_PAL[i%TEAM_PAL.length]]);
  return '<div class="chleg">'+items.map(it=>'<span class="chl"><span class="sw" style="background:'+it[1]+'"></span>'+chEsc(it[0])+'</span>').join('')+'</div>'; }
function scatterSVG(){
  const xk=state.chartX, yk=state.chartY;
  let base=D.players.filter(p=>p.stats&&p.stats.gp>0);
  if(state.chartGroup!=="all") base=base.filter(p=>teamById(p.teamId).group===state.chartGroup);
  const pts=base.map(p=>({p,x:chVal(p,xk),y:chVal(p,yk)})).filter(d=>d.x!=null&&d.y!=null);
  if(pts.length<2) return '<div class="muted-note" style="padding:26px 4px">Not enough players have both of these stats for this filter — try different axes or a wider group.</div>';
  const W=720,H=470,mL=58,mR=20,mT=18,mB=46,PW=W-mL-mR,PH=H-mT-mB;
  const xs=pts.map(d=>d.x), ys=pts.map(d=>d.y);
  let xmin=Math.min.apply(null,xs),xmax=Math.max.apply(null,xs),ymin=Math.min.apply(null,ys),ymax=Math.max.apply(null,ys);
  const padx=(xmax-xmin)*0.07||1, pady=(ymax-ymin)*0.07||1; xmin-=padx;xmax+=padx;ymin-=pady;ymax+=pady;
  const X=v=>mL+(v-xmin)/(xmax-xmin)*PW, Y=v=>mT+PH-(v-ymin)/(ymax-ymin)*PH;
  const xmean=xs.reduce((a,b)=>a+b,0)/xs.length, ymean=ys.reduce((a,b)=>a+b,0)/ys.length;
  const ticks=(mn,mx)=>{const o=[];for(let i=0;i<=4;i++)o.push(mn+(mx-mn)*i/4);return o;};
  let g="";
  ticks(xmin,xmax).forEach(t=>{ g+='<line class="cg" x1="'+X(t).toFixed(1)+'" y1="'+mT+'" x2="'+X(t).toFixed(1)+'" y2="'+(mT+PH)+'"/><text class="cax" x="'+X(t).toFixed(1)+'" y="'+(mT+PH+16)+'" text-anchor="middle">'+chFmt(xk,t)+'</text>'; });
  ticks(ymin,ymax).forEach(t=>{ g+='<line class="cg" x1="'+mL+'" y1="'+Y(t).toFixed(1)+'" x2="'+(mL+PW)+'" y2="'+Y(t).toFixed(1)+'"/><text class="cax" x="'+(mL-9)+'" y="'+(Y(t)+3).toFixed(1)+'" text-anchor="end">'+chFmt(yk,t)+'</text>'; });
  g+='<line class="cmean" x1="'+X(xmean).toFixed(1)+'" y1="'+mT+'" x2="'+X(xmean).toFixed(1)+'" y2="'+(mT+PH)+'"/>';
  g+='<line class="cmean" x1="'+mL+'" y1="'+Y(ymean).toFixed(1)+'" x2="'+(mL+PW)+'" y2="'+Y(ymean).toFixed(1)+'"/>';
  const xl=chLabel(xk), yl=chLabel(yk);
  pts.forEach(d=>{ g+='<circle class="cdot" cx="'+X(d.x).toFixed(1)+'" cy="'+Y(d.y).toFixed(1)+'" r="5" fill="'+chColor(d.p)+'" data-id="'+d.p.id+'" data-nm="'+chEsc(d.p.name)+'" data-xl="'+chEsc(xl)+'" data-yl="'+chEsc(yl)+'" data-xv="'+chFmt(xk,d.x)+'" data-yv="'+chFmt(yk,d.y)+'"><title>'+chEsc(d.p.name)+' - '+chEsc(yl)+' '+chFmt(yk,d.y)+', '+chEsc(xl)+' '+chFmt(xk,d.x)+'</title></circle>'; });
  g+='<text class="cttl" x="'+(mL+PW/2)+'" y="'+(H-7)+'" text-anchor="middle">'+chEsc(xl)+'</text>';
  g+='<text class="cttl" x="14" y="'+(mT+PH/2)+'" text-anchor="middle" transform="rotate(-90 14 '+(mT+PH/2)+')">'+chEsc(yl)+'</text>';
  return '<svg class="scatter" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Scatter plot">'+g+'</svg>';
}
function chartsView(){
  const modes=[["scatter","Scatter"],["board","Leaderboards"],["compare","Compare"],["hist","Distribution"],["lineups","Lineups"]];
  const tabs='<div class="statsubtabs chartmodes">'+modes.map(m=>'<button class="subtab'+(state.chartMode===m[0]?" on":"")+'" data-cm="'+m[0]+'">'+m[1]+'</button>').join('')+'</div>';
  let body;
  if(state.chartMode==="board") body=leaderboardView();
  else if(state.chartMode==="compare") body=compareView();
  else if(state.chartMode==="lineups") body=lineupView();
  else if(state.chartMode==="hist") body=histogramView();
  else body=scatterView();
  return '<div class="chartwrap">'+tabs+body+'<div class="ctip" id="ctip" hidden></div></div>';
}
function histData(stat,group){
  let base=D.players.filter(p=>p.stats&&p.stats.gp>0);
  if(group&&group!=="all") base=base.filter(p=>teamById(p.teamId).group===group);
  return base.map(p=>({p,v:chVal(p,stat)})).filter(d=>d.v!=null);
}
function histogramSVG(){
  const stat=state.histStat, group=state.chartGroup;
  const data=histData(stat,group);
  if(data.length<4) return '<div class="muted-note" style="padding:26px 4px">Not enough players have this stat for the current filter.</div>';
  const vals=data.map(d=>d.v);
  let lo=Math.min.apply(null,vals), hi=Math.max.apply(null,vals);
  if(lo===hi){ hi=lo+1; lo=lo-1; }
  const nB=Math.min(16,Math.max(8,Math.round(Math.sqrt(data.length))));
  const bw=(hi-lo)/nB; const bins=new Array(nB).fill(0);
  vals.forEach(v=>{ let i=Math.floor((v-lo)/bw); if(i>=nB)i=nB-1; if(i<0)i=0; bins[i]++; });
  const maxC=Math.max.apply(null,bins);
  const mean=vals.reduce((a,b)=>a+b,0)/vals.length;
  const hp=state.histPlayer?D.players.find(p=>p.id===state.histPlayer):null;
  const hv=hp?chVal(hp,stat):null;
  const W=720,H=420,mL=46,mR=16,mT=22,mB=52,PW=W-mL-mR,PH=H-mT-mB;
  const X=v=>mL+(v-lo)/(hi-lo)*PW, Yc=c=>mT+PH-(c/maxC)*PH;
  let g='';
  for(let i=0;i<=4;i++){ const c=Math.round(maxC*i/4), y=Yc(c); g+='<line class="cg" x1="'+mL+'" y1="'+y.toFixed(1)+'" x2="'+(mL+PW)+'" y2="'+y.toFixed(1)+'"/><text class="cax" x="'+(mL-8)+'" y="'+(y+3).toFixed(1)+'" text-anchor="end">'+c+'</text>'; }
  for(let i=0;i<nB;i++){ if(!bins[i]) continue; const x0=X(lo+i*bw), x1=X(lo+(i+1)*bw), y=Yc(bins[i]), hgt=mT+PH-y;
    const inBin = hv!=null && hv>=lo+i*bw && (hv<lo+(i+1)*bw || (i===nB-1&&hv<=hi));
    g+='<rect class="hbar'+(inBin?' on':'')+'" x="'+(x0+1).toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+Math.max(1,(x1-x0-2)).toFixed(1)+'" height="'+hgt.toFixed(1)+'"><title>'+chFmt(stat,lo+i*bw)+' \u2013 '+chFmt(stat,lo+(i+1)*bw)+': '+bins[i]+' players</title></rect>'; }
  for(let i=0;i<=5;i++){ const v=lo+(hi-lo)*i/5; g+='<text class="cax" x="'+X(v).toFixed(1)+'" y="'+(mT+PH+16)+'" text-anchor="middle">'+chFmt(stat,v)+'</text>'; }
  g+='<line class="hmean" x1="'+X(mean).toFixed(1)+'" y1="'+mT+'" x2="'+X(mean).toFixed(1)+'" y2="'+(mT+PH)+'"/><text class="hml" x="'+X(mean).toFixed(1)+'" y="'+(mT-6)+'" text-anchor="middle">avg '+chFmt(stat,mean)+'</text>';
  if(hv!=null){ const hx=X(Math.max(lo,Math.min(hi,hv))); g+='<line class="hplayer" x1="'+hx.toFixed(1)+'" y1="'+mT+'" x2="'+hx.toFixed(1)+'" y2="'+(mT+PH)+'"/><circle class="hpdot" cx="'+hx.toFixed(1)+'" cy="'+mT+'" r="4"/>'; }
  g+='<text class="cttl" x="'+(mL+PW/2)+'" y="'+(H-8)+'" text-anchor="middle">'+chEsc(chLabel(stat))+'</text>';
  g+='<text class="cttl" x="13" y="'+(mT+PH/2)+'" text-anchor="middle" transform="rotate(-90 13 '+(mT+PH/2)+')">Players</text>';
  return '<svg class="scatter histsvg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+g+'</svg>';
}

      cap='<div class="histcap"><span class="hpsw"></span><b>'+chEsc(hp.name)+'</b>: '+chFmt(state.histStat,hv)+(pctl!=null?' \u00b7 '+ordinal(pctl)+' percentile':'')+'</div>'; }

function compareSplits(A,B,cA,cB){
  const dA=shotDiet(A), dB=shotDiet(B);
  if(!dA&&!dB) return '';
  const mini=d=>{ if(!d) return '<div style="font-size:12px;color:var(--muted-2);padding:8px 0">No shot-location data.</div>';
    const pf=a=>Math.round(a/d.tot*100); const fg=(m,a)=>a?Math.round(m/a*100)+'%':'\u2013';
    return '<div class="csbar"><div class="seg" style="width:'+(d.rimA/d.tot*100)+'%;background:#A96A38"></div><div class="seg" style="width:'+(d.midA/d.tot*100)+'%;background:#D9B38C"></div><div class="seg" style="width:'+(d.threeA/d.tot*100)+'%;background:#6FA39B"></div></div>'
      +'<div class="csrows">'
      +'<div class="csr"><span class="csw" style="background:#A96A38"></span>Rim <b>'+pf(d.rimA)+'%</b><span class="csfg">'+fg(d.rimM,d.rimA)+'</span></div>'
      +'<div class="csr"><span class="csw" style="background:#D9B38C"></span>Mid <b>'+pf(d.midA)+'%</b><span class="csfg">'+fg(d.midM,d.midA)+'</span></div>'
      +'<div class="csr"><span class="csw" style="background:#6FA39B"></span>Three <b>'+pf(d.threeA)+'%</b><span class="csfg">'+fg(d.threeM,d.threeA)+'</span></div>'
      +'</div><div class="cstot">'+d.tot+' FGA</div>'; };
  return '<div class="cssplit"><div class="csh">Shot profile</div><div class="cscols">'
    +'<div class="cscol"><div class="csname" style="color:'+cA+'">'+chEsc(lastName(A.name))+'</div>'+mini(dA)+'</div>'
    +'<div class="cscol"><div class="csname" style="color:'+cB+'">'+chEsc(lastName(B.name))+'</div>'+mini(dB)+'</div>'
    +'</div><div class="chartnote">Share of field-goal attempts by zone (rim / mid / three), with FG% in each, from play-by-play.</div></div>';
}
function exportWatchlist(){
  const ids=Object.keys(NOTES).filter(id=>NOTES[id]&&NOTES[id].watch);
  const players=ids.map(id=>D.players.find(p=>p.id===id)).filter(Boolean)
    .sort((a,b)=>{ const na=noteFor(a.id),nb=noteFor(b.id); return (nb.rating||0)-(na.rating||0) || a.name.localeCompare(b.name); });
  if(!players.length){ toast("Your watchlist is empty \u2014 bookmark some players first."); return; }
  const sheet=$("#printsheet"); if(!sheet) return;

  const done=()=>{ document.body.classList.remove("printing"); window.removeEventListener("afterprint",done); };
  window.addEventListener("afterprint",done);

}

/* ---------- big board (draggable, synced ranking) ---------- */
let _bbDrag=null;
function boardOrder(){ const b=NOTES["__board"]; return (b&&Array.isArray(b.order))?b.order.slice():[]; }
function setBoardOrder(order){ NOTES["__board"]={order:order.slice(),updated:Date.now()}; saveNotes(NOTES); pushCloud(); }
function bigBoardIds(){
  // Members of the board = anyone you've rated (stars) OR bookmarked.
  const members=Object.keys(NOTES).filter(id=>id!=="__board"&&NOTES[id]&&(((NOTES[id].rating||0)>0)||NOTES[id].watch)&&D.players.some(p=>p.id===id));
  const set=new Set(members);
  const ord=boardOrder().filter(id=>set.has(id));            // your saved manual order wins for players already placed
  const rest=members.filter(id=>!ord.includes(id));          // newly rated/bookmarked, not yet hand-ranked
  rest.sort((a,b)=>{                                          // default order: 5-star first, then by scoring
    const ra=NOTES[a].rating||0, rb=NOTES[b].rating||0; if(rb!==ra) return rb-ra;
    const pa=(D.players.find(p=>p.id===a)||{}).stats||{}, pb=(D.players.find(p=>p.id===b)||{}).stats||{};
    return (pb.ppg||0)-(pa.ppg||0);
  });
  return ord.concat(rest);
}
function moveBoard(id,dir){ const ord=bigBoardIds(); const i=ord.indexOf(id), j=i+dir; if(i<0||j<0||j>=ord.length) return; const t=ord[i]; ord[i]=ord[j]; ord[j]=t; setBoardOrder(ord); render(); }
function reorderBoard(from,to){ const ord=bigBoardIds(); const fi=ord.indexOf(from), ti=ord.indexOf(to); if(fi<0||ti<0) return; const x=ord.splice(fi,1)[0]; ord.splice(ti,0,x); setBoardOrder(ord); render(); }
function exportBigBoard(){
  const ids=bigBoardIds(); const players=ids.map(id=>D.players.find(p=>p.id===id)).filter(Boolean);
  if(!players.length){ toast("Your big board is empty \u2014 bookmark some players first."); return; }
  const sheet=$("#printsheet"); if(!sheet) return;
  sheet.innerHTML=players.map(p=>onePagerHTML(p)).join("");
  document.body.classList.add("printing");
  const done=()=>{ document.body.classList.remove("printing"); window.removeEventListener("afterprint",done); };
  window.addEventListener("afterprint",done);
  setTimeout(()=>window.print(),120);
}
function bigBoardView(){
  const ids=bigBoardIds();
  if(!ids.length) return '<div class="empty"><div class="big">Your big board is empty</div>Give players a star rating in their profile (or bookmark them) and they\'ll appear here, ranked 5\u2605 first \u2014 then drag to fine-tune.</div>';
  const rows=ids.map((id,i)=>{ const p=D.players.find(x=>x.id===id); if(!p) return ""; const n=noteFor(id); const s=p.stats||{}; const t=teamById(p.teamId);
    const stars=n.rating?'<b class="bbstars">'+"\u2605".repeat(n.rating)+'</b>':'';
    const tags=(n.tags&&n.tags.length)?' \u00b7 '+chEsc(n.tags.slice(0,3).join(", ")):'';
    return '<div class="bbrow" draggable="true" data-id="'+id+'">'
      +'<span class="bbrk">'+(i+1)+'</span>'
      +'<span class="bbgrip" title="Drag to reorder">\u2807\u2807</span>'
      +avatarHTML(p,"bbav")
      +'<span class="bbmain"><span class="bbnm">'+chEsc(p.name)+'<span class="bbtm">'+chEsc(t.code)+' \u00b7 '+(p.pos||"\u2013")+'</span></span>'
      +'<span class="bbstat">'+fmt(s.ppg)+' pts \u00b7 '+fmt(s.rpg)+' reb \u00b7 '+fmt(s.apg)+' ast'+(stars?' \u00b7 '+stars:'')+tags+'</span></span>'
      +'<span class="bbmove"><button class="bbbtn" data-mv="up" title="Move up" aria-label="Move up">\u25b2</button><button class="bbbtn" data-mv="down" title="Move down" aria-label="Move down">\u25bc</button></span>'
      +'<button class="bbrm" title="Remove from board" aria-label="Remove">\u2715</button>'
      +'</div>';
  }).join("");
  return '<div class="bbhead"><div class="bbcount">'+ids.length+' player'+(ids.length!==1?'s':'')+' ranked</div>'
    +'<button class="btn" id="bbExport"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:5px"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>Export board PDF</button></div>'
    +'<div class="bblist" id="bbList">'+rows+'</div>'
    +'<div class="muted-note" style="margin-top:14px">Drag a row (or use \u25b2\u25bc) to rank your targets. The order syncs to your account and sets the page order of the PDF export.</div>';
}
function wireBigBoard(board){
  const ex=$("#bbExport"); if(ex) ex.onclick=exportBigBoard;
  board.querySelectorAll(".bbrow").forEach(row=>{
    const id=row.dataset.id;
    row.addEventListener("click",e=>{ if(e.target.closest(".bbbtn")||e.target.closest(".bbrm")||e.target.closest(".bbgrip")) return; openPlayer(id); });
    const up=row.querySelector('[data-mv="up"]'); if(up) up.onclick=e=>{ e.stopPropagation(); moveBoard(id,-1); };
    const dn=row.querySelector('[data-mv="down"]'); if(dn) dn.onclick=e=>{ e.stopPropagation(); moveBoard(id,1); };
    const rm=row.querySelector(".bbrm"); if(rm) rm.onclick=e=>{ e.stopPropagation(); setNote(id,{watch:false,rating:0}); updateWatchCount(); render(); };
    row.addEventListener("dragstart",e=>{ _bbDrag=id; row.classList.add("bbdragging"); try{ e.dataTransfer.effectAllowed="move"; e.dataTransfer.setData("text/plain",id); }catch(_){} });
    row.addEventListener("dragend",()=>{ _bbDrag=null; board.querySelectorAll(".bbrow").forEach(r=>r.classList.remove("bbover","bbdragging")); });
    row.addEventListener("dragover",e=>{ e.preventDefault(); if(_bbDrag&&_bbDrag!==id) row.classList.add("bbover"); });
    row.addEventListener("dragleave",()=>row.classList.remove("bbover"));
    row.addEventListener("drop",e=>{ e.preventDefault(); row.classList.remove("bbover"); if(_bbDrag&&_bbDrag!==id) reorderBoard(_bbDrag,id); });
  });
}

function leaderboardList(){

  let base=D.players.filter(p=>p.stats&&p.stats.gp>0);
  if(state.chartGroup!=="all") base=base.filter(p=>teamById(p.teamId).group===state.chartGroup);
  let rows=base.map(p=>({p,v:chVal(p,stat)})).filter(d=>d.v!=null);
  rows.sort((a,b)=> state.lbDir==="asc" ? a.v-b.v : b.v-a.v);
  rows=rows.slice(0,state.lbN);
  if(!rows.length) return '<div class="muted-note" style="padding:20px 4px">No qualified players for this stat and filter.</div>';
  const maxv=Math.max.apply(null,rows.map(r=>Math.abs(r.v)))||1;
  const out=rows.map((r,i)=>{ const t=teamById(r.p.teamId); const w=Math.max(3,Math.abs(r.v)/maxv*100);
    return '<div class="lbrow" data-id="'+r.p.id+'">'
      +'<span class="lbrk">'+(i+1)+'</span>'
      +'<span class="lbmid"><span class="lbnm">'+chEsc(r.p.name)+'<span class="tm">'+chEsc(t.code)+'</span></span>'
      +'<span class="lbbar" style="width:'+w.toFixed(1)+'%;background:'+chColorPos(r.p)+'"></span></span>'
      +'<span class="lbval">'+chFmt(stat,r.v)+'</span></div>';
  }).join('');
  return '<div class="lblist">'+out+'</div>'+posLegend();
}
const RAX=["Scoring","Efficiency","Playmaking","Rebounding","Defense","Usage"];
function radarPctls(p){
  const s=p.stats||{}; const pos=posOf(p);
  const ts=metric(p,"ts"), usg=metric(p,"usg");
  return [
    {pct:percentile("ppg",s.ppg,pos), disp:fmt(s.ppg)},
    {pct:pctOf(leagueAdvFor("ts",pos),ts), disp:(ts===-Infinity?"\u2013":pct(ts))},
    {pct:percentile("apg",s.apg,pos), disp:fmt(s.apg)},
    {pct:percentile("rpg",s.rpg,pos), disp:fmt(s.rpg)},
    {pct:pctOf(leagueAdvFor("stk",pos),metric(p,"stk")), disp:fmt(metric(p,"stk"))},
    {pct:(usg===-Infinity?null:pctOf(leagueAdvFor("usg",pos),usg)), disp:(usg===-Infinity?"\u2013":usg.toFixed(1))}
  ];
}
function rPoint(cx,cy,R,frac,i){ const a=(-90+i*60)*Math.PI/180; return [cx+R*frac*Math.cos(a), cy+R*frac*Math.sin(a)]; }
function radarSVG(entries){
  const W=360,H=320,cx=180,cy=150,R=100; let g='';
  [0.25,0.75,1].forEach(fr=>{ const pts=[]; for(let i=0;i<6;i++){ const q=rPoint(cx,cy,R,fr,i); pts.push(q[0].toFixed(1)+','+q[1].toFixed(1)); } g+='<polygon class="rgrid" points="'+pts.join(' ')+'"/>'; });
  for(let i=0;i<6;i++){ const q=rPoint(cx,cy,R,1,i); g+='<line class="rspoke" x1="'+cx+'" y1="'+cy+'" x2="'+q[0].toFixed(1)+'" y2="'+q[1].toFixed(1)+'"/>'; }
  { const ap=[]; for(let i=0;i<6;i++){ const q=rPoint(cx,cy,R,0.5,i); ap.push(q[0].toFixed(1)+','+q[1].toFixed(1)); } g+='<polygon class="ravg" points="'+ap.join(' ')+'"/>'; }
  for(let i=0;i<6;i++){ const q=rPoint(cx,cy,R+20,1,i); const ax=Math.abs(q[0]-cx)<6?"middle":(q[0]>cx?"start":"end"); g+='<text class="rlab" x="'+q[0].toFixed(1)+'" y="'+(q[1]+4).toFixed(1)+'" text-anchor="'+ax+'">'+RAX[i]+'</text>'; }
  entries.forEach(e=>{ const pts=[]; for(let i=0;i<6;i++){ const v=(e.pcts[i]==null?0:e.pcts[i])/100; const q=rPoint(cx,cy,R,v,i); pts.push(q[0].toFixed(1)+','+q[1].toFixed(1)); }
    g+='<polygon class="rpoly" points="'+pts.join(' ')+'" style="fill:'+e.color+'2e;stroke:'+e.color+'"/>';
    for(let i=0;i<6;i++){ const v=(e.pcts[i]==null?0:e.pcts[i])/100; const q=rPoint(cx,cy,R,v,i);
      let title=''; if(e.disps){ const lab=(e.pcts[i]==null?'n/a':e.pcts[i]+'th pct'); title='<title>'+RAX[i]+': '+lab+(e.disps[i]&&e.disps[i]!=='\u2013'?' ('+e.disps[i]+')':'')+'</title>'; }
      g+='<circle class="rdot" r="3.2" cx="'+q[0].toFixed(1)+'" cy="'+q[1].toFixed(1)+'" fill="'+e.color+'">'+title+'</circle>'; } });
  g+='<g class="ravgleg"><line class="ravg" x1="120" y1="305" x2="144" y2="305"/><text class="ravgt" x="150" y="308.5">League average</text></g>';
  return '<svg class="radar" viewBox="0 0 '+W+' '+H+'" role="img" aria-label="Radar chart">'+g+'</svg>';
}
const CMP_ROWS=[["PTS","ppg",1],["REB","rpg",1],["AST","apg",1],["STL","spg",1],["BLK","bpg",1],["TO","tpg",0],["MIN","mpg",1],["FG%","fgPct",1],["3P%","tpPct",1],["FT%","ftPct",1],["TS%","ts",1],["USG%","usg",1],["A/TO","astto",1],["PROD","prod",1]];
function compareTable(A,B,cA,cB){
  const rows=CMP_ROWS.map(r=>{ const lab=r[0],key=r[1],hi=r[2]; const va=chVal(A,key), vb=chVal(B,key);
    let wa="",wb=""; if(va!=null&&vb!=null&&va!==vb){ const aw= hi? va>vb : va<vb; if(aw) wa="win"; else wb="win"; }
    return '<tr><td class="v '+wa+'">'+(va==null?"\u2013":chFmt(key,va))+'</td><td class="lbl">'+lab+'</td><td class="v '+wb+'">'+(vb==null?"\u2013":chFmt(key,vb))+'</td></tr>';
  }).join('');
  return '<table class="cmptbl"><thead><tr><th class="nm" style="color:'+cA+'">'+chEsc(A.name)+'</th><th class="k"></th><th class="nm" style="color:'+cB+'">'+chEsc(B.name)+'</th></tr></thead><tbody>'+rows+'</tbody></table>';
}
function comboOpts(players){ return players.map(p=>{ const t=teamById(p.teamId); return {val:p.id,label:p.name,tm:t.code,s:deburr(p.name+" "+t.code)}; }); }
function comboHTML(id,options,curId,placeholder,allowNone){

function wireCombo(id,onPick){
  const root=$("#"+id); if(!root) return;
  const inp=root.querySelector(".cbx-in"), pop=root.querySelector(".cbx-pop");
  const allOpts=()=>Array.from(pop.querySelectorAll(".cbx-opt"));
  let savedLabel=inp.value, savedVal=inp.dataset.val||"";
  const open=()=>{ pop.hidden=false; root.classList.add("open"); };
  const close=()=>{ pop.hidden=true; root.classList.remove("open"); };
  const vis=()=>allOpts().filter(o=>!o.hidden);
  const filter=()=>{ const q=deburr(inp.value); let first=null;
    allOpts().forEach(o=>{ const ok=!q||(o.dataset.s||"").indexOf(q)>=0; o.hidden=!ok; o.classList.remove("active"); if(ok&&!first)first=o; });
    if(first) first.classList.add("active"); };
  const pick=o=>{ const v=o.dataset.val||""; close(); onPick(v); };
  inp.addEventListener("focus",()=>{ savedLabel=inp.value; savedVal=inp.dataset.val||""; inp.value=""; filter(); open(); });
  inp.addEventListener("input",()=>{ open(); filter(); });
  inp.addEventListener("keydown",e=>{
    if(e.key==="ArrowDown"||e.key==="ArrowUp"){ e.preventDefault(); const v=vis(); if(!v.length)return; let i=v.findIndex(o=>o.classList.contains("active")); v.forEach(o=>o.classList.remove("active")); i=e.key==="ArrowDown"?Math.min(v.length-1,i+1):Math.max(0,i-1); if(i<0)i=0; v[i].classList.add("active"); v[i].scrollIntoView({block:"nearest"}); }
    else if(e.key==="Enter"){ e.preventDefault(); const a=pop.querySelector(".cbx-opt.active:not([hidden])")||vis()[0]; if(a) pick(a); }
    else if(e.key==="Escape"){ e.preventDefault(); inp.value=savedLabel; inp.dataset.val=savedVal; close(); inp.blur(); }
  });
  allOpts().forEach(o=>o.addEventListener("mousedown",e=>{ e.preventDefault(); pick(o); }));
  inp.addEventListener("blur",()=>{ setTimeout(()=>{ if(root.classList.contains("open")){ inp.value=savedLabel; inp.dataset.val=savedVal; close(); } },140); });
}

  const vals = QUALIFIED.map(p=>metric(p,key)).filter(v=>v!=null && isFinite(v)).sort((a,b)=>a-b);
  const n=vals.length;
  LEAGUE_ADV[key]={vals,n,mean:n?vals.reduce((a,b)=>a+b,0)/n:0};
});
const LEAGUE_ADV_POS={};
POS_KEYS.forEach(pos=>{ LEAGUE_ADV_POS[pos]={};
  ADV.forEach(([lab,key])=>{ const vals=QUALIFIED.filter(p=>posOf(p)===pos).map(p=>metric(p,key)).filter(v=>v!=null&&isFinite(v)).sort((a,b)=>a-b); const n=vals.length; LEAGUE_ADV_POS[pos][key]={vals,n,mean:n?vals.reduce((a,b)=>a+b,0)/n:0}; });
});
function leagueAdvFor(key,pos){ return (state.posRel&&pos&&LEAGUE_ADV_POS[pos]&&LEAGUE_ADV_POS[pos][key]&&LEAGUE_ADV_POS[pos][key].n>=5)?LEAGUE_ADV_POS[pos][key]:LEAGUE_ADV[key]; }
function advBars(p){
  const pos=posOf(p);

    if(v===Infinity){ pl=100; disp=vfmt(v); }
    else if(v==null || v===-Infinity || isNaN(v)){ pl=null; disp="\u2013"; v=null; }
    else { pl=pctOf(L,v); disp=vfmt(v); }
    const w = pl==null?0:pl;
    const avgPos = (L&&L.n)? pctOf(L,L.mean) : 50;
    const col = pl==null?"var(--muted-2)":pctlColor(pl);
    return `<div class="bar2">

      <span class="val2">${disp}</span>
      <span class="pctl" style="background:${col}" title="${pl!=null?ordinal(pl)+' percentile at the event':'not enough data'}">${pl!=null?pl:"\u2013"}</span>
    </div>`;
  }).join("");
  return `<div class="bars">${rows}

}

function statBars(p){

function gameLog(rows){

/* ---------- shot chart (play-by-play zones) ---------- */
function szFill(m,a){ if(a===0) return '#eae3d6';
  const lp=(x,y,t)=>x+(y-x)*t, p=m/a, t=Math.max(0,Math.min(1,(p-0.20)/0.45)),
    lo=[244,236,224],mid=[201,134,82],hi=[120,66,33]; let c;
  if(t<.5){const u=t/.5;c=[lp(lo[0],mid[0],u),lp(lo[1],mid[1],u),lp(lo[2],mid[2],u)];}
  else{const u=(t-.5)/.5;c=[lp(mid[0],hi[0],u),lp(mid[1],hi[1],u),lp(mid[2],hi[2],u)];}
  return 'rgb('+c.map(Math.round).join(',')+')'; }
function szText(m,a){ if(a===0) return '#9a8f7b'; return (m/a>0.45)?'#fff':'#3a3027'; }
function shotChartSVG(z,g){
  let s='';
  g.zones.forEach(k=>{ const v=z[k]||[0,0]; s+=`<polygon points="${g.poly[k]}" fill="${szFill(v[0],v[1])}" stroke="${g.line}" stroke-width="1.9" stroke-linejoin="round"/>`; });
  s+=g.detail;
  g.zones.forEach(k=>{ const v=z[k]||[0,0],m=v[0],a=v[1],pc=a?Math.round(m/a*100)+'%':'–',ma=a?(m+' – '+a):'';
    if(k==='cornerL'||k==='cornerR'){ const c=g.call[k],col='#3a3027',dot=a?szFill(m,a):g.line;
      s+=`<line x1="${c.lx0}" y1="${c.ty-4}" x2="${c.t[0]}" y2="${c.t[1]}" stroke="${g.line}" stroke-width="1.3"/>`
        +`<circle cx="${c.t[0]}" cy="${c.t[1]}" r="2.2" fill="${dot}"/>`
        +`<text x="${c.tx}" y="${c.ty}" text-anchor="${c.anchor}" font-size="19" font-weight="800" fill="${col}">${pc}</text>`
        +(a?`<text x="${c.tx}" y="${c.ty+13}" text-anchor="${c.anchor}" font-size="11" font-weight="600" fill="${col}" opacity=".92">${ma}</text>`:'');
    } else { const f=g.fs[k],col=szText(m,a),x=g.cen[k][0],y=g.cen[k][1];
      s+=`<text x="${x}" y="${y}" text-anchor="middle" font-size="${f}" font-weight="800" fill="${col}">${pc}</text>`
        +(a?`<text x="${x}" y="${y+f*0.8}" text-anchor="middle" font-size="${(f*0.58).toFixed(1)}" font-weight="600" fill="${col}" opacity=".92">${ma}</text>`:'');
    }});
  return `<svg viewBox="${g.vb}" class="shotsvg" xmlns="http://www.w3.org/2000/svg">${s}</svg>`;
}
function shotChartBlock(p){
  const S=window.SHOTS;
  if(!S||!S.geo) return `<p class="muted-note">Shot-location data isn't loaded.</p>`;
  const z = S.players ? S.players[String(p.pid)] : null;
  let att=0,mk=0; if(z) S.geo.zones.forEach(k=>{ const v=z[k]; if(v){att+=v[1];mk+=v[0];} });
  if(!z||!att) return `<p class="muted-note">No shot-location data for ${p.name} yet — no field-goal attempts recorded in the games parsed so far.</p>`;
  const games=(p.stats&&p.stats.gp)||(S.meta&&S.meta.games)||1;
  return `<div class="shotwrap">${shotChartSVG(z,S.geo)}</div>
    <div class="shotfoot"><span>cold</span><span class="legramp"></span><span>hot · FG%</span><span class="shottot">${mk}/${att} FG · ${games} game${games>1?'s':''}</span></div>`;
}
