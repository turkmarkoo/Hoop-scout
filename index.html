<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HoopScout · U17 World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0E1116; --panel:#161B22; --panel-2:#1C222B; --panel-3:#232A34;
  --line:#2A313C; --line-soft:#222933;
  --text:#E7EAF0; --muted:#949CAB; --muted-2:#69727F;
  --hardwood:#E0913E; --hardwood-deep:#C2752A;
  --teal:#46A89F; --good:#5DB874; --warn:#D9694B;
  --parchment:#F2E9D2; --parchment-2:#EBE0C2; --parchment-line:#DBCDA3; --ink-note:#2C2517;
  --disp:"Saira Condensed","Oswald",system-ui,sans-serif;
  --body:"IBM Plex Sans",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --r:12px; --maxw:1180px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(224,145,62,.07), transparent 60%),
    var(--ink);
  color:var(--text); font-family:var(--body); font-size:15px; line-height:1.45;
  -webkit-font-smoothing:antialiased; min-height:100vh;
}
button{font-family:inherit; cursor:pointer}
input,textarea{font-family:inherit}
::selection{background:rgba(224,145,62,.3)}

/* ---- top bar ---- */
.top{
  position:sticky; top:0; z-index:30; background:rgba(14,17,22,.86);
  backdrop-filter:blur(10px); border-bottom:1px solid var(--line);
}
.top-in{max-width:var(--maxw); margin:0 auto; padding:14px 20px;
  display:flex; align-items:center; gap:18px; flex-wrap:wrap}
.brand{display:flex; align-items:baseline; gap:10px; min-width:0}
.brand .mark{
  font-family:var(--disp); font-weight:800; font-size:26px; letter-spacing:.04em;
  color:var(--text); line-height:1; white-space:nowrap;
}
.brand .mark b{color:var(--hardwood)}
.brand .sub{color:var(--muted); font-size:12px; letter-spacing:.12em; text-transform:uppercase}
.top-meta{margin-left:auto; display:flex; align-items:center; gap:14px}
.evt{display:flex; flex-direction:column; align-items:flex-end; line-height:1.2}
.evt .a{font-family:var(--disp); font-weight:600; font-size:15px; letter-spacing:.05em; text-transform:uppercase}
.evt .b{color:var(--muted-2); font-size:11px; font-family:var(--mono)}

.search{position:relative}
.search input{
  width:230px; max-width:46vw; background:var(--panel); border:1px solid var(--line);
  color:var(--text); border-radius:999px; padding:9px 14px 9px 34px; font-size:14px; outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.search input:focus{border-color:var(--hardwood-deep); box-shadow:0 0 0 3px rgba(224,145,62,.14)}
.search svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted-2)}

.io{display:flex; gap:8px}
.btn{
  background:var(--panel); border:1px solid var(--line); color:var(--text);
  border-radius:8px; padding:8px 12px; font-size:13px; font-weight:500;
  display:inline-flex; align-items:center; gap:7px; transition:background .15s,border-color .15s;
}
.btn:hover{background:var(--panel-2); border-color:#39424f}
.btn svg{color:var(--muted)}

/* ---- filters ---- */
.wrap{max-width:var(--maxw); margin:0 auto; padding:22px 20px 80px}
.groups{display:flex; gap:22px; flex-wrap:wrap; margin-bottom:8px}
.grp{flex:1 1 200px; min-width:170px}
.grp h3{
  font-family:var(--disp); font-weight:700; letter-spacing:.14em; font-size:12px;
  color:var(--muted); text-transform:uppercase; margin:0 0 8px;
  display:flex; align-items:center; gap:8px;
}
.grp h3::before{content:""; width:18px; height:2px; background:var(--hardwood); display:inline-block}
.teamrow{display:flex; flex-direction:column; gap:5px}
.team{
  display:flex; align-items:center; gap:10px; width:100%; text-align:left;
  background:transparent; border:1px solid transparent; color:var(--muted);
  padding:7px 9px; border-radius:8px; font-size:14px; transition:.13s;
}
.team:hover{background:var(--panel); color:var(--text)}
.team.active{background:var(--panel-2); border-color:var(--hardwood-deep); color:var(--text)}
.team .code{
  font-family:var(--mono); font-size:11px; font-weight:600; color:var(--ink);
  background:var(--muted); border-radius:4px; padding:2px 5px; letter-spacing:.02em; min-width:38px; text-align:center;
}
.team.active .code{background:var(--hardwood)}
.team .nm{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.team .ct{font-family:var(--mono); font-size:11px; color:var(--muted-2)}

.divider{height:1px; background:var(--line-soft); margin:22px 0 18px}

/* ---- section head ---- */
.sechead{display:flex; align-items:flex-end; gap:14px; margin-bottom:16px; flex-wrap:wrap}
.sechead .t{font-family:var(--disp); font-weight:700; font-size:30px; letter-spacing:.02em; line-height:1}
.sechead .c{font-family:var(--mono); font-size:11px; color:var(--ink); background:var(--hardwood); padding:3px 7px; border-radius:5px; letter-spacing:.03em}
.sechead .meta{color:var(--muted); font-size:13px; margin-left:auto}
.sechead .meta a{color:var(--hardwood); text-decoration:none}
.sechead .meta a:hover{text-decoration:underline}

/* ---- player grid ---- */
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(248px,1fr)); gap:12px}
.card{
  position:relative; text-align:left; background:linear-gradient(180deg,var(--panel),var(--panel-2));
  border:1px solid var(--line); border-radius:var(--r); padding:14px; transition:.15s;
  overflow:hidden;
}
.card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:transparent; transition:.15s}
.card:hover{border-color:#3a4350; transform:translateY(-2px)}
.card:hover::before{background:var(--hardwood)}
.card-top{display:flex; align-items:flex-start; gap:12px}
.num{
  font-family:var(--disp); font-weight:800; font-size:40px; line-height:.85; color:var(--text);
  min-width:46px; letter-spacing:-.01em;
}
.card .pname{font-family:var(--disp); font-weight:600; font-size:19px; letter-spacing:.01em; line-height:1.05}
.card .pmeta{color:var(--muted); font-size:12px; margin-top:3px; font-family:var(--mono)}
.card .pmeta .dot{color:var(--muted-2); padding:0 5px}
.statline{display:flex; gap:0; margin-top:13px; border-top:1px solid var(--line-soft); padding-top:11px}
.statline .s{flex:1; text-align:center; border-right:1px solid var(--line-soft)}
.statline .s:last-child{border-right:0}
.statline .v{font-family:var(--mono); font-weight:600; font-size:16px; color:var(--text)}
.statline .k{font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted-2); margin-top:2px}
.badges{position:absolute; top:12px; right:12px; display:flex; gap:6px; align-items:center}
.notedot{width:9px; height:9px; border-radius:50%; background:var(--teal); box-shadow:0 0 0 3px rgba(70,168,159,.18)}
.rate-chip{font-family:var(--mono); font-size:11px; font-weight:600; color:var(--hardwood); display:flex; align-items:center; gap:2px}
.sample-tag{font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--warn); border:1px solid var(--warn); border-radius:4px; padding:1px 4px}

.empty{
  border:1px dashed var(--line); border-radius:var(--r); padding:38px 24px; text-align:center;
  color:var(--muted); background:var(--panel);
}
.empty .big{font-family:var(--disp); font-weight:600; font-size:22px; color:var(--text); margin-bottom:6px}
.empty code{font-family:var(--mono); font-size:12px; background:var(--panel-3); padding:2px 6px; border-radius:5px; color:var(--hardwood)}

/* ---- drawer ---- */
.scrim{position:fixed; inset:0; background:rgba(6,8,11,.62); opacity:0; pointer-events:none; transition:.2s; z-index:40}
.scrim.on{opacity:1; pointer-events:auto}
.drawer{
  position:fixed; top:0; right:0; height:100%; width:560px; max-width:94vw; z-index:50;
  background:var(--ink); border-left:1px solid var(--line); transform:translateX(100%);
  transition:transform .26s cubic-bezier(.2,.7,.2,1); display:flex; flex-direction:column;
  box-shadow:-30px 0 60px rgba(0,0,0,.4);
}
.drawer.on{transform:translateX(0)}
.dr-scroll{overflow-y:auto; padding:0 0 40px}
.dr-head{
  position:relative; padding:22px 24px 20px;
  background:linear-gradient(160deg,#1A212B,#13181F);
  border-bottom:1px solid var(--line);
}
.dr-close{
  position:absolute; top:16px; right:16px; width:34px; height:34px; border-radius:8px;
  background:var(--panel); border:1px solid var(--line); color:var(--muted);
  display:flex; align-items:center; justify-content:center;
}
.dr-close:hover{color:var(--text); background:var(--panel-2)}
.dr-num-name{display:flex; align-items:center; gap:16px}
.dr-num{font-family:var(--disp); font-weight:800; font-size:66px; line-height:.8; color:var(--hardwood)}
.dr-name{font-family:var(--disp); font-weight:700; font-size:32px; line-height:1; letter-spacing:.01em}
.dr-tags{display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; align-items:center}
.chip{font-family:var(--mono); font-size:12px; color:var(--text); background:var(--panel-2); border:1px solid var(--line); border-radius:6px; padding:4px 9px}
.chip b{color:var(--hardwood); font-weight:600}

.dr-sec{padding:20px 24px; border-bottom:1px solid var(--line-soft)}
.dr-sec h4{
  font-family:var(--disp); font-weight:700; letter-spacing:.14em; font-size:12px; text-transform:uppercase;
  color:var(--muted); margin:0 0 14px; display:flex; align-items:center; gap:9px;
}
.dr-sec h4::before{content:""; width:16px; height:2px; background:var(--hardwood)}

.avg{display:grid; grid-template-columns:repeat(6,1fr); gap:1px; background:var(--line-soft); border:1px solid var(--line-soft); border-radius:10px; overflow:hidden}
.avg .a{background:var(--panel); padding:11px 6px; text-align:center}
.avg .a .v{font-family:var(--mono); font-weight:600; font-size:19px}
.avg .a .k{font-size:9.5px; letter-spacing:.09em; text-transform:uppercase; color:var(--muted-2); margin-top:2px}
.shoot{display:flex; gap:10px; margin-top:10px}
.shoot .a{flex:1; background:var(--panel); border:1px solid var(--line-soft); border-radius:8px; padding:9px; text-align:center}
.shoot .a .v{font-family:var(--mono); font-weight:600; font-size:16px}
.shoot .a .k{font-size:10px; letter-spacing:.06em; color:var(--muted-2); margin-top:2px}

.bars{margin-top:16px; display:flex; flex-direction:column; gap:9px}
.bar{display:grid; grid-template-columns:42px 1fr 40px; align-items:center; gap:10px}
.bar .lab{font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted)}
.bar .track{height:7px; background:var(--panel-3); border-radius:99px; overflow:hidden}
.bar .fill{height:100%; background:linear-gradient(90deg,var(--hardwood-deep),var(--hardwood)); border-radius:99px}
.bar .val{font-family:var(--mono); font-size:12px; color:var(--text); text-align:right}

/* game log */
.logwrap{overflow-x:auto; margin:0 -4px}
table.log{width:100%; border-collapse:collapse; font-family:var(--mono); font-size:12.5px}
table.log th{
  text-align:right; color:var(--muted-2); font-weight:500; font-size:10px; letter-spacing:.06em;
  text-transform:uppercase; padding:0 8px 8px; border-bottom:1px solid var(--line); white-space:nowrap;
}
table.log th:first-child,table.log td:first-child{text-align:left}
table.log td{text-align:right; padding:9px 8px; border-bottom:1px solid var(--line-soft); white-space:nowrap}
table.log tr:last-child td{border-bottom:0}
table.log .pts{color:var(--hardwood); font-weight:600}
table.log .res-w{color:var(--good)}
table.log .res-l{color:var(--warn)}

/* ---- notes (parchment) ---- */
.notes{background:var(--parchment); color:var(--ink-note); padding:20px 24px 24px}
.notes h4{color:#6b5d3a; }
.notes h4::before{background:var(--hardwood-deep)}
.rate{display:flex; align-items:center; gap:10px; margin-bottom:14px}
.rate .lbl{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#7a6c45; font-weight:600}
.stars{display:flex; gap:4px}
.star{width:26px; height:26px; border:0; background:transparent; padding:0; color:#cdbd92; line-height:0}
.star.on{color:var(--hardwood-deep)}
.star:hover{transform:scale(1.12)}
.rate .clr{margin-left:4px; font-size:11px; color:#9a8a5e; background:transparent; border:0; text-decoration:underline; padding:2px}

.tags-in{
  width:100%; background:rgba(255,255,255,.5); border:1px solid var(--parchment-line); color:var(--ink-note);
  border-radius:8px; padding:9px 11px; font-size:13px; margin-bottom:12px; outline:none;
}
.tags-in::placeholder{color:#9b8d63}
.tags-in:focus{border-color:var(--hardwood-deep); background:#fff}
.taglist{display:flex; flex-wrap:wrap; gap:6px; margin:-4px 0 12px}
.tg{font-size:11px; font-family:var(--mono); background:rgba(194,117,42,.14); color:#7c4f12; border:1px solid rgba(194,117,42,.3); padding:2px 8px; border-radius:99px}

.note-area{
  width:100%; min-height:150px; resize:vertical; background:rgba(255,255,255,.55);
  border:1px solid var(--parchment-line); border-radius:10px; padding:13px 15px; font-size:14.5px;
  line-height:1.55; color:var(--ink-note); outline:none;
  background-image:repeating-linear-gradient(transparent,transparent 27px,rgba(0,0,0,.05) 28px);
}
.note-area:focus{border-color:var(--hardwood-deep); background-color:rgba(255,255,255,.8)}
.note-area::placeholder{color:#9b8d63}
.note-foot{display:flex; align-items:center; justify-content:space-between; margin-top:9px; font-size:11px; color:#8a7c52}
.saved{display:inline-flex; align-items:center; gap:5px; font-family:var(--mono)}
.saved .d{width:7px; height:7px; border-radius:50%; background:var(--good)}
.saved.dirty .d{background:var(--hardwood-deep)}

/* toast */
.toast{
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--panel-2); border:1px solid var(--line); color:var(--text);
  padding:11px 18px; border-radius:10px; font-size:13px; opacity:0; pointer-events:none;
  transition:.2s; z-index:60; box-shadow:0 12px 30px rgba(0,0,0,.4);
}
.toast.on{opacity:1; transform:translateX(-50%) translateY(0)}

@media (max-width:640px){
  .sechead .t{font-size:24px}
  .dr-num{font-size:52px} .dr-name{font-size:26px}
  .avg{grid-template-columns:repeat(3,1fr)}
  .top-meta{width:100%; justify-content:space-between}
  .search input{max-width:none; width:100%}
  .search{flex:1}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header class="top">
  <div class="top-in">
    <div class="brand">
      <span class="mark">Hoop<b>Scout</b></span>
      <span class="sub">Field Notes</span>
    </div>
    <div class="top-meta">
      <div class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" type="search" placeholder="Search players…" autocomplete="off">
      </div>
      <div class="io">
        <button class="btn" id="export" title="Download all your notes as a JSON backup">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"/></svg>Notes
        </button>
        <button class="btn" id="import" title="Restore notes from a backup file">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21V9m0 0 4 4m-4-4-4 4M5 3h14"/></svg>Import
        </button>
        <input type="file" id="importfile" accept="application/json" hidden>
      </div>
      <div class="evt">
        <span class="a" id="evtName">U17 World Cup 2026</span>
        <span class="b" id="evtMeta">Istanbul · 27 Jun–5 Jul</span>
      </div>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="groups" id="groups"></div>
  <div class="divider"></div>
  <div class="sechead">
    <span class="t" id="secTitle">Select a team</span>
    <span class="c" id="secCount" hidden></span>
    <span class="meta" id="secMeta"></span>
  </div>
  <div id="board"></div>
</main>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-hidden="true"></aside>
<div class="toast" id="toast"></div>

<script>
const D = window.HOOPDATA || {event:{},groups:{},teams:[],players:[]};
const NOTE_KEY = "hoopscout:notes:v1";
const $ = (s,r=document)=>r.querySelector(s);

/* ---------- notes store ---------- */
function loadNotes(){ try{return JSON.parse(localStorage.getItem(NOTE_KEY))||{}}catch{return{}} }
function saveNotes(n){ try{localStorage.setItem(NOTE_KEY,JSON.stringify(n))}catch{toast("Couldn't save — storage blocked")} }
let NOTES = loadNotes();
function noteFor(id){ return NOTES[id] || {text:"",rating:0,tags:[]} }

/* ---------- helpers ---------- */
const teamById = id => D.teams.find(t=>t.id===id) || {name:"?",code:"?"};
const fmt = (v,d=1)=> (v==null||isNaN(v)) ? "–" : Number(v).toFixed(d);
const pct = v => (v==null||isNaN(v)) ? "–" : (Number(v)*100).toFixed(1)+"%";
function hasContent(n){ return !!(n && (n.text?.trim() || n.rating>0 || (n.tags&&n.tags.length))) }

let state = { team:null, query:"" };

/* ---------- top meta ---------- */
$("#evtName").textContent = D.event.short || D.event.name || "";
$("#evtMeta").textContent = (D.event.city? D.event.city.split(",")[0] : "") + (D.event.dates? " · "+D.event.dates.replace(/ /g,"") : "");

/* ---------- group / team rail ---------- */
function renderGroups(){
  const wrap = $("#groups"); wrap.innerHTML="";
  const order = Object.keys(D.groups);
  order.forEach(g=>{
    const col = document.createElement("div"); col.className="grp";
    col.innerHTML = `<h3>Group ${g}</h3>`;
    const row = document.createElement("div"); row.className="teamrow";
    D.groups[g].forEach(tid=>{
      const t = teamById(tid);
      const count = D.players.filter(p=>p.teamId===tid).length;
      const b = document.createElement("button");
      b.className = "team"+(state.team===tid?" active":"");
      b.innerHTML = `<span class="code">${t.code}</span><span class="nm">${t.name}</span><span class="ct">${count||""}</span>`;
      b.onclick = ()=>{ state.team=tid; state.query=""; $("#search").value=""; render(); };
      row.appendChild(b);
    });
    col.appendChild(row); wrap.appendChild(col);
  });
}

/* ---------- board (grid) ---------- */
function playerCard(p){
  const n = noteFor(p.id);
  const s = p.stats||{};
  const card = document.createElement("button");
  card.className="card"; card.onclick=()=>openPlayer(p.id);
  const badges = [];
  if(p._sample) badges.push(`<span class="sample-tag">sample</span>`);
  if(n.rating>0) badges.push(`<span class="rate-chip">★ ${n.rating}</span>`);
  if(hasContent(n) && !n.rating) badges.push(`<span class="notedot" title="Has notes"></span>`);
  else if(n.text?.trim()||(n.tags&&n.tags.length)) badges.push(`<span class="notedot" title="Has notes"></span>`);
  card.innerHTML = `
    <div class="badges">${badges.join("")}</div>
    <div class="card-top">
      <div class="num">${p.number??""}</div>
      <div>
        <div class="pname">${p.name}</div>
        <div class="pmeta">${p.pos||"–"}<span class="dot">·</span>${p.height?p.height+"m":"–"}<span class="dot">·</span>${p.birthYear?"'"+String(p.birthYear).slice(2):"–"}</div>
      </div>
    </div>
    <div class="statline">
      <div class="s"><div class="v">${fmt(s.ppg)}</div><div class="k">PPG</div></div>
      <div class="s"><div class="v">${fmt(s.rpg)}</div><div class="k">RPG</div></div>
      <div class="s"><div class="v">${fmt(s.apg)}</div><div class="k">APG</div></div>
      <div class="s"><div class="v">${s.gp??0}</div><div class="k">GP</div></div>
    </div>`;
  return card;
}

function render(){
  renderGroups();
  const board = $("#board"); board.innerHTML="";
  let list, title, count, meta="";

  if(state.query){
    const q = state.query.toLowerCase();
    list = D.players.filter(p=> p.name.toLowerCase().includes(q) || String(p.number)===q || teamById(p.teamId).name.toLowerCase().includes(q));
    title = "Search"; count = list.length;
    meta = `“${state.query}” · ${list.length} player${list.length!==1?"s":""}`;
  } else if(state.team){
    const t = teamById(state.team);
    list = D.players.filter(p=>p.teamId===state.team).sort((a,b)=>(a.number??99)-(b.number??99));
    title = t.name; count = list.length;
    meta = `Group ${t.group} · <a href="${t.rosterUrl}" target="_blank" rel="noopener">FIBA roster ↗</a>`;
  } else {
    title = "Select a team"; list=null;
  }

  $("#secTitle").textContent = title;
  const cEl = $("#secCount");
  if(count!=null){ cEl.hidden=false; cEl.textContent = count+" players"; } else cEl.hidden=true;
  $("#secMeta").innerHTML = meta;

  if(list===null){
    board.innerHTML = `<div class="empty"><div class="big">Pick a team to begin</div>Choose any of the 16 teams above to see its roster, event stats and your notes.</div>`;
    return;
  }
  if(list.length===0){
    board.innerHTML = `<div class="empty"><div class="big">No players yet</div>${state.query?"Nothing matches your search.":`Roster not loaded for this team. Run <code>scraper.js</code> on the FIBA roster page and add the players to <code>players.js</code>.`}</div>`;
    return;
  }
  const grid = document.createElement("div"); grid.className="grid";
  list.forEach(p=> grid.appendChild(playerCard(p)));
  board.appendChild(grid);
}

/* ---------- drawer ---------- */
let activeId=null, dirtyTimer=null;

function statBars(s){
  const defs=[["PTS",s.ppg,30],["REB",s.rpg,15],["AST",s.apg,12],["STL",s.spg,5],["BLK",s.bpg,5]];
  return `<div class="bars">${defs.map(([lab,v,max])=>{
    const w = Math.max(0,Math.min(100, (Number(v)||0)/max*100));
    return `<div class="bar"><span class="lab">${lab}</span><span class="track"><span class="fill" style="width:${w}%"></span></span><span class="val">${fmt(v)}</span></div>`;
  }).join("")}</div>`;
}

function gameLog(rows){
  if(!rows||!rows.length) return `<p style="color:var(--muted-2);font-size:13px;margin:0">No games logged yet.</p>`;
  const head = ["Game","MIN","PTS","REB","AST","STL","BLK","TO","FG","3P","FT"];
  const body = rows.map(g=>{
    const wl = (g.res||"").trim().charAt(0).toUpperCase();
    const resCls = wl==="W"?"res-w":wl==="L"?"res-l":"";
    const opp = g.opp? `vs ${g.opp}` : (g.date||"");
    return `<tr>
      <td><span class="${resCls}">${opp}</span></td>
      <td>${g.min??"–"}</td><td class="pts">${g.pts??"–"}</td><td>${g.reb??"–"}</td>
      <td>${g.ast??"–"}</td><td>${g.stl??"–"}</td><td>${g.blk??"–"}</td><td>${g.to??"–"}</td>
      <td>${g.fgm??"–"}/${g.fga??"–"}</td><td>${g.tpm??"–"}/${g.tpa??"–"}</td><td>${g.ftm??"–"}/${g.fta??"–"}</td>
    </tr>`;
  }).join("");
  return `<div class="logwrap"><table class="log"><thead><tr>${head.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${body}</tbody></table></div>`;
}

function openPlayer(id){
  const p = D.players.find(x=>x.id===id); if(!p) return;
  activeId=id;
  const t = teamById(p.teamId); const s=p.stats||{}; const n=noteFor(id);
  const dr = $("#drawer");
  dr.innerHTML = `
    <div class="dr-head">
      <button class="dr-close" id="drClose" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6 6 18"/></svg>
      </button>
      <div class="dr-num-name">
        <span class="dr-num">${p.number??""}</span>
        <span class="dr-name">${p.name}</span>
      </div>
      <div class="dr-tags">
        <span class="chip"><b>${t.code}</b> ${t.name}</span>
        <span class="chip">Group ${t.group}</span>
        <span class="chip">${p.pos||"–"}</span>
        <span class="chip">${p.height?p.height+" m":"–"}</span>
        <span class="chip">${p.birthYear?"b. "+p.birthYear:"–"}</span>
        ${p._sample?`<span class="sample-tag" style="align-self:center">sample data</span>`:""}
      </div>
    </div>

    <div class="dr-scroll">
      <div class="dr-sec">
        <h4>Event averages · ${s.gp??0} GP</h4>
        <div class="avg">
          <div class="a"><div class="v">${fmt(s.ppg)}</div><div class="k">PTS</div></div>
          <div class="a"><div class="v">${fmt(s.rpg)}</div><div class="k">REB</div></div>
          <div class="a"><div class="v">${fmt(s.apg)}</div><div class="k">AST</div></div>
          <div class="a"><div class="v">${fmt(s.spg)}</div><div class="k">STL</div></div>
          <div class="a"><div class="v">${fmt(s.bpg)}</div><div class="k">BLK</div></div>
          <div class="a"><div class="v">${fmt(s.mpg)}</div><div class="k">MIN</div></div>
        </div>
        <div class="shoot">
          <div class="a"><div class="v">${pct(s.fgPct)}</div><div class="k">FG%</div></div>
          <div class="a"><div class="v">${pct(s.tpPct)}</div><div class="k">3P%</div></div>
          <div class="a"><div class="v">${pct(s.ftPct)}</div><div class="k">FT%</div></div>
          <div class="a"><div class="v">${fmt(s.tpg)}</div><div class="k">TOV</div></div>
        </div>
        ${statBars(s)}
      </div>

      <div class="dr-sec">
        <h4>Game log</h4>
        ${gameLog(p.gamelog)}
      </div>

      <div class="notes">
        <h4>Scout notes</h4>
        <div class="rate">
          <span class="lbl">Interest</span>
          <div class="stars" id="stars">
            ${[1,2,3,4,5].map(i=>`<button class="star ${i<=n.rating?"on":""}" data-v="${i}" aria-label="${i} star">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.7-5.1 4.6 1.4 6.8L12 17.8 5.9 20.4l1.4-6.8L2.2 9l6.9-.7z"/></svg>
            </button>`).join("")}
          </div>
          <button class="clr" id="clrRate">clear</button>
        </div>
        <input class="tags-in" id="tagsIn" placeholder="Add a tag and press Enter (e.g. lefty, rim-runner, motor)">
        <div class="taglist" id="tagList"></div>
        <textarea class="note-area" id="noteArea" placeholder="What did you see? Frame, athleticism, shot mechanics, decision-making, motor, matchup, projection…">${n.text||""}</textarea>
        <div class="note-foot">
          <span class="saved" id="savedFlag"><span class="d"></span><span id="savedTxt">Saved</span></span>
          <span id="charInfo"></span>
        </div>
      </div>
    </div>`;

  // wire up
  $("#drClose").onclick = closeDrawer;
  $("#scrim").classList.add("on");
  dr.classList.add("on"); dr.setAttribute("aria-hidden","false");

  renderTags();
  const area = $("#noteArea");
  area.addEventListener("input", ()=>{ markDirty(); scheduleSave(); });
  $("#stars").querySelectorAll(".star").forEach(btn=>{
    btn.onclick = ()=>{ const v=+btn.dataset.v; const cur=noteFor(id).rating; setNote(id,{rating: cur===v?0:v}); paintStars(); };
  });
  $("#clrRate").onclick = ()=>{ setNote(id,{rating:0}); paintStars(); };
  const tagsIn = $("#tagsIn");
  tagsIn.addEventListener("keydown",e=>{
    if(e.key==="Enter"){ e.preventDefault(); const v=tagsIn.value.trim(); if(!v) return;
      const cur=noteFor(id).tags||[]; if(!cur.includes(v)){ setNote(id,{tags:[...cur,v]}); renderTags(); } tagsIn.value=""; }
  });
  updateCharInfo();
}

function paintStars(){
  const r = noteFor(activeId).rating;
  $("#stars").querySelectorAll(".star").forEach(b=> b.classList.toggle("on", +b.dataset.v<=r));
  render(); // refresh card badge
}
function renderTags(){
  const list=$("#tagList"); const tags=noteFor(activeId).tags||[];
  list.innerHTML = tags.map((t,i)=>`<span class="tg" data-i="${i}">${t} ✕</span>`).join("");
  list.querySelectorAll(".tg").forEach(el=> el.onclick=()=>{
    const tags=noteFor(activeId).tags.slice(); tags.splice(+el.dataset.i,1); setNote(activeId,{tags}); renderTags();
  });
}
function updateCharInfo(){
  const t = $("#noteArea")?.value||""; const ci=$("#charInfo");
  if(ci) ci.textContent = t.trim()? t.trim().split(/\s+/).length+" words" : "";
}

function setNote(id, patch){
  const cur = noteFor(id);
  NOTES[id] = {text:cur.text||"", rating:cur.rating||0, tags:cur.tags||[], ...patch, updated:Date.now()};
  saveNotes(NOTES);
}
function markDirty(){ const f=$("#savedFlag"); if(f){ f.classList.add("dirty"); $("#savedTxt").textContent="Saving…"; } updateCharInfo(); }
let saveTimer=null;
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    setNote(activeId,{text:$("#noteArea").value});
    const f=$("#savedFlag"); if(f){ f.classList.remove("dirty"); $("#savedTxt").textContent="Saved"; }
    render();
  },450);
}
function closeDrawer(){
  // flush any pending text
  if(activeId && $("#noteArea")) setNote(activeId,{text:$("#noteArea").value});
  $("#drawer").classList.remove("on"); $("#drawer").setAttribute("aria-hidden","true");
  $("#scrim").classList.remove("on"); activeId=null; render();
}
$("#scrim").onclick = closeDrawer;
document.addEventListener("keydown", e=>{ if(e.key==="Escape" && activeId) closeDrawer(); });

/* ---------- search ---------- */
let searchTimer=null;
$("#search").addEventListener("input", e=>{
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{ state.query=e.target.value.trim(); render(); },120);
});

/* ---------- export / import notes ---------- */
$("#export").onclick = ()=>{
  const payload = { app:"hoopscout", version:1, event:D.event.short, exported:new Date().toISOString(), notes:NOTES };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download = `hoopscout-notes-${new Date().toISOString().slice(0,10)}.json`; a.click();
  URL.revokeObjectURL(a.href); toast("Notes downloaded");
};
$("#import").onclick = ()=> $("#importfile").click();
$("#importfile").addEventListener("change", e=>{
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload = ()=>{ try{
    const data=JSON.parse(r.result); const incoming = data.notes||data;
    let added=0;
    Object.entries(incoming).forEach(([id,n])=>{
      const ex=NOTES[id];
      if(!ex || (n.updated||0) >= (ex.updated||0)){ NOTES[id]=n; added++; }
    });
    saveNotes(NOTES); render();
    if(activeId) openPlayer(activeId);
    toast(`Imported notes for ${added} player${added!==1?"s":""}`);
  }catch{ toast("That file couldn't be read"); } };
  r.readAsText(file); e.target.value="";
});

/* ---------- toast ---------- */
let toastTimer=null;
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("on");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("on"),2200); }

/* ---------- boot ---------- */
render();
</script>
</body>
</html>
