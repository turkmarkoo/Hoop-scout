    if(activeId){
      ["nAth","nOff","nDef"].forEach(fid=>{ const ta=$("#"+fid); if(ta && document.activeElement!==ta) ta.value=noteFor(activeId)[fid]||""; });
      if($("#stars")&&typeof paintStars==="function") paintStars();
      if($("#tagList")&&typeof renderTags==="function") renderTags(); }
    render(); }
}
function updateAuthUI(user){
  cloudUser = user || null;
  const b=$("#authBtn"), lab=$("#authLabel");
  if(b && lab){
    if(user){ b.classList.add("in"); b.title="Synced as "+(user.email||"your account")+" — click to sign out";
      const nm=(user.displayName||user.email||"Account").split(" ")[0];
      lab.innerHTML=(user.photoURL?('<img class="av" referrerpolicy="no-referrer" src="'+user.photoURL+'" alt="">'):"")+nm; }
    else { b.classList.remove("in"); b.title="Sign in to sync your notes across devices"; lab.textContent="Sign in"; }
  }
  const hh=$("#syncHint"); if(hh){ hh.className="synchint"+(user?" on":""); hh.innerHTML='<span class="dot"></span>'+(user?("Synced to "+(user.email||"your account")):"Saved on this device · sign in to sync across devices"); }
}
if($("#authBtn")) $("#authBtn").onclick=()=>{
  if(!(window.CloudSync && window.CloudSync.enabled)){ toast("Cloud sync isn't set up yet — paste your Firebase keys into index.html (see the CLOUD SYNC SETUP comment)."); return; }
  if(cloudUser){ if(confirm("Sign out of note sync?\nYour notes stay saved on this device.")) window.CloudSync.signOut(); }
  else window.CloudSync.signIn();
};
function wireCloud(cs){
  if(!cs || !cs.enabled){ updateAuthUI(null); return; }
  cs.onAuth(user=>{ updateAuthUI(user); if(user) setTimeout(pushCloud, 1200); });
  cs.onRemote(cloud=>applyRemoteNotes(cloud));
}
if(window.CloudSync) wireCloud(window.CloudSync);
else window.addEventListener("cloud-ready", ()=>wireCloud(window.CloudSync), {once:true});
document.addEventListener("keydown", e=>{ if(e.key==="Escape" && activeId) closeDrawer(); });

/* ---------- search ---------- */
let searchTimer=null;
$("#search").addEventListener("input", e=>{
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{ state.query=e.target.value.trim(); state.filter=null; state.view="board"; render(); },120);
});

/* ---------- stats tab ---------- */
$("#statsBtn").onclick = ()=>{
  state.view = state.view==="stats" ? "board" : "stats";
  state.team=null; state.query=""; state.filter=null;
  const sb=$("#search"); if(sb) sb.value="";
  if(activeId) closeDrawer(); else render();
};

if($("#chartsBtn")) $("#chartsBtn").onclick = ()=>{
  state.view = state.view==="charts" ? "board" : "charts";
  state.team=null; state.query=""; state.filter=null;
  const sb=$("#search"); if(sb) sb.value="";
  if(activeId) closeDrawer(); else render();
};
if($("#watchBtn")) $("#watchBtn").onclick = ()=>{
  if(state.filter && state.filter.type==="watch"){ clearFilter(); }
  else { filterBy("watch","1","Watchlist"); }
};
if($("#bbBtn")) $("#bbBtn").onclick = ()=>{
  state.view = state.view==="bigboard" ? "board" : "bigboard";
  state.team=null; state.query=""; state.filter=null;
  const sb=$("#search"); if(sb) sb.value="";
  if(activeId) closeDrawer(); else render();
};
if($("#posBtn")) $("#posBtn").onclick = ()=>{ state.posRel=!state.posRel; if(activeId) openPlayer(activeId); render(); };
if($("#themeBtn")) $("#themeBtn").onclick = ()=>{ const dark=document.documentElement.getAttribute("data-theme")==="dark"; applyTheme(dark?"light":"dark"); if(activeId) openPlayer(activeId); render(); };

/* ---------- toast ---------- */
let toastTimer=null;
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("on");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("on"),2200); }

/* ---------- shareable deep links (hash routing) ---------- */
function currentHash(){
  if(activeId) return "#p/"+activeId;
  if(state.view==="stats") return "#stats";
  if(state.view==="charts") return "#charts";
  if(state.view==="bigboard") return "#bigboard";
  if(state.filter && state.filter.type==="watch") return "#watchlist";
  if(state.team) return "#t/"+state.team;
  return "";
}
function writeHash(){
  const target=currentHash(), cur=location.hash||"";
  if(cur===target) return;
  if(target){ location.hash=target; }
  else { try{ history.replaceState(null,"",location.pathname+location.search); }catch(_){ location.hash=""; } }
}
function closeDrawerSilent(){
  flushNotes();
  const d=$("#drawer"); if(d){ d.classList.remove("on"); d.setAttribute("aria-hidden","true"); }
  const sc=$("#scrim"); if(sc) sc.classList.remove("on");
  activeId=null;
}
function routeTo(h){
  h=h||"";
  const pm=h.match(/^#p\/(.+)$/);
  if(pm){ const id=pm[1]; if(D.players.some(p=>p.id===id)){ if(!activeId) render(); openPlayer(id); return; } }
  if(activeId) closeDrawerSilent();
  state.query=""; const sb=$("#search"); if(sb) sb.value="";
  const tm=h.match(/^#t\/(.+)$/);
  if(h==="#stats"){ state.view="stats"; state.team=null; state.filter=null; }
  else if(h==="#charts"){ state.view="charts"; state.team=null; state.filter=null; }
  else if(h==="#bigboard"){ state.view="bigboard"; state.team=null; state.filter=null; }
  else if(h==="#watchlist"){ state.view="board"; state.team=null; state.filter={type:"watch",value:"1",label:"Watchlist"}; }
  else if(tm && D.teams.some(t=>t.id===tm[1])){ state.view="board"; state.team=tm[1]; state.filter=null; }
  else { state.view="board"; state.team=null; state.filter=null; }
  render();
}
function applyHash(){ const h=location.hash||""; if(h===currentHash()) return; routeTo(h); }

/* ---------- boot ----------
   Snapshot model: MT Scouting renders the rosters, averages, photos, standings
   and results that ship in players.js. Nothing is fetched from FIBA at runtime
   — the data refreshes only when players.js is updated. */
window.addEventListener("hashchange", applyHash);
if(location.hash){ routeTo(location.hash); } else { render(); }

</script>

  const configured = firebaseConfig.apiKey && !/PASTE_/.test(firebaseConfig.apiKey);
  if(!configured){
    window.CloudSync={enabled:false,signIn(){},signOut(){},pushNotes(){},onAuth(){},onRemote(){}};
    window.dispatchEvent(new Event("cloud-ready"));
  } else {
    const V="https://www.gstatic.com/firebasejs/10.12.2/";
    const appMod=await import(V+"firebase-app.js");
    const authMod=await import(V+"firebase-auth.js");
    const fsMod=await import(V+"firebase-firestore.js");
    const app=appMod.initializeApp(firebaseConfig);
    const auth=authMod.getAuth(app);
    const db=fsMod.getFirestore(app);
    const provider=new authMod.GoogleAuthProvider();
    let authCb=null, remoteCb=null, unsub=null, lastCloud={}, curUser=null, pushT=null, hadUser=false;

    function merge(a,b){ const out=Object.assign({},a||{}); for(const id in (b||{})){ const x=b[id], y=out[id]; if(!y || (x.updated||0) >= (y.updated||0)) out[id]=x; } return out; }
    async function signIn(){ try{ await authMod.signInWithPopup(auth, provider); }catch(e){ try{ await authMod.signInWithRedirect(auth, provider); }catch(_){} } }
    try{ await authMod.getRedirectResult(auth); }catch(_){}

    authMod.onAuthStateChanged(auth, user=>{
      curUser=user||null; hadUser=true;
      if(unsub){ unsub(); unsub=null; }
      if(user){
        const ref=fsMod.doc(db,"scouts",user.uid);
        unsub=fsMod.onSnapshot(ref, snap=>{ const data=(snap.exists()&&snap.data().notes)?snap.data().notes:{}; lastCloud=data; remoteCb&&remoteCb(data); }, ()=>{});
      } else lastCloud={};
      authCb&&authCb(curUser);
    });

    window.CloudSync={
      enabled:true,
      signIn,
      signOut(){ return authMod.signOut(auth); },
      pushNotes(notes){ if(!curUser) return; clearTimeout(pushT); pushT=setTimeout(async()=>{
        const merged=merge(lastCloud, notes); lastCloud=merged;
        try{ await fsMod.setDoc(fsMod.doc(db,"scouts",curUser.uid), {notes:merged, updatedAt:Date.now()}, {merge:true}); }catch(e){}
      }, 800); },
      onAuth(cb){ authCb=cb; if(hadUser) cb(curUser); },
      onRemote(cb){ remoteCb=cb; if(curUser) cb(lastCloud); }
    };
    window.dispatchEvent(new Event("cloud-ready"));
  }
</script>
